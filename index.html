<!doctype html><html lang="th"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Data Structure Learning Platform</title>
<style>body{margin:0;font-family:Tahoma;background:#f5f7f6;color:#263238}header{padding:22px;background:#2e7d32;color:white}.app{display:grid;grid-template-columns:240px 1fr}nav{background:white;padding:12px;height:calc(100vh - 90px);overflow:auto}nav button{width:100%;padding:10px;margin:4px 0;border:0;border-radius:8px;text-align:left;font-weight:bold;cursor:pointer}nav button.active{background:#fff3e0;color:#ef6c00}main{padding:20px}.panel{display:none;background:white;padding:20px;border-radius:14px}.panel.active{display:block}.controls{display:flex;gap:8px;flex-wrap:wrap;background:#e8f5e9;padding:12px;border-radius:10px}.controls input{padding:8px;border:1px solid #aaa;border-radius:7px}.controls button{padding:9px 12px;border:0;border-radius:7px;background:#ef6c00;color:white;font-weight:bold}.visual{margin-top:15px;padding:24px;border:2px dashed #ccd5d0;border-radius:10px;min-height:100px}.array{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}.cell{position:relative;min-width:62px;height:62px;border:3px solid #90a4ae;border-radius:9px;display:flex;align-items:center;justify-content:center;font-weight:bold;background:white}.idx{position:absolute;top:-19px;font-size:11px;color:#607d8b}.ptr{position:absolute;bottom:-19px;font-size:10px}.sorted{background:#c8e6c9;border-color:#2e7d32}.current{background:#fff3e0;border-color:#ef6c00}.compare{background:#e3f2fd;border-color:#1565c0}.status{margin-top:12px;padding:12px;background:#263238;color:white;border-radius:8px}.nodeRow{display:flex;gap:12px;justify-content:center;align-items:center;flex-wrap:wrap}.node{padding:12px 16px;border:3px solid #2e7d32;border-radius:9px;background:white;font-weight:bold}.arrow{font-size:24px;color:#ef6c00}@media(max-width:760px){.app{grid-template-columns:1fr}nav{height:auto;display:flex;overflow:auto}nav button{min-width:170px}}
.learning-tools{display:flex;gap:10px;flex-wrap:wrap;align-items:end;background:#eef6ff;padding:14px;border-radius:12px;margin:14px 0}
.speed-wrap{display:flex;flex-direction:column;gap:5px;font-weight:700}
.speed-wrap input{width:180px}
.learning-grid{display:grid;grid-template-columns:1.2fr .8fr;gap:16px;margin-top:14px}
.log-box{background:#111827;color:#e5e7eb;border-radius:12px;padding:12px;min-height:180px;max-height:260px;overflow:auto;font-family:Consolas,monospace;font-size:13px}
.log-entry{padding:5px 0;border-bottom:1px solid rgba(255,255,255,.08)}
.pseudo-line{display:block;padding:5px 8px;border-radius:6px}
.pseudo-line.active{background:#fff3cd;color:#7a4b00;font-weight:700}
.predict-box{background:#f3e5f5;border:1px solid #ce93d8;border-radius:12px;padding:14px;margin-top:14px}
.predict-box input{min-width:140px}
.feedback-good{color:#1b5e20;font-weight:700}
.feedback-bad{color:#b71c1c;font-weight:700}
.progress{height:12px;background:#e0e0e0;border-radius:999px;overflow:hidden;margin-top:12px}
.progress>div{height:100%;background:linear-gradient(90deg,#43a047,#ef6c00);width:0%}
@media(max-width:900px){.learning-grid{grid-template-columns:1fr}}

</style></head><body>
<header><h1>Data Structure Learning Platform</h1><div>Interactive simulations สำหรับการเรียนโครงสร้างข้อมูลและอัลกอริทึม</div></header><div class="app"><nav id="nav"></nav><main id="main"></main></div>
<script>
const modules=[['home','ภาพรวม'],['stack','Stack'],['physical','Physical Queue'],['linear','Linear Queue'],['circular','Circular Queue'],['arraylist','Array List'],['sll','Singly Linked List'],['dll','Doubly Linked List'],['selection','Selection Sort'],['bubble','Bubble Sort'],['linearsearch','Linear Search'],['binarysearch','Binary Search'],['bst','Binary Search Tree']];
const nav=document.getElementById('nav'),main=document.getElementById('main');modules.forEach((m,i)=>{nav.innerHTML+=`<button data-id="${m[0]}" class="${i?'':'active'}">${m[1]}</button>`});
function panel(id,title,body){main.innerHTML+=`<section id="${id}" class="panel ${id==='home'?'active':''}"><h2>${title}</h2>${body}</section>`}
function c(id,val='10'){return `<input id="${id}" value="${val}">`};function b(t,f){return `<button onclick="${f}">${t}</button>`};function V(id){return `<div id="${id}" class="visual"></div><div id="${id}S" class="status"></div>`}
panel('home','ภาพรวม','<p>เลือกหัวข้อจากเมนู ทดลองคำสั่ง ทำนายผล และอธิบายการเปลี่ยนแปลงของข้อมูลหรือ pointer ในแต่ละขั้นตอน</p>');
panel('stack','Stack',`<div class="controls">${c('stIn')}${b('Push','stPush()')}${b('Pop','stPop()')}${b('Peek','stPeek()')}${b('Clear','stClear()')}</div>${V('stV')}`);
panel('physical','Physical Queue',`<p>Dequeue แล้วเลื่อนข้อมูลที่เหลือไปทางซ้าย โดย front อยู่ index 0</p><div class="controls">${c('pqIn')}${b('Enqueue','pqEnq()')}${b('Dequeue','pqDeq()')}${b('Clear','pqClear()')}</div>${V('pqV')}`);
panel('linear','Linear Queue',`<p>front และ rear เดินหน้า พื้นที่ว่างด้านหน้าไม่ถูกใช้ซ้ำ</p><div class="controls">${c('lqIn')}${b('Enqueue','lqEnq()')}${b('Dequeue','lqDeq()')}${b('Clear','lqClear()')}</div>${V('lqV')}`);
panel('circular','Circular Queue',`<div class="controls">Size ${c('cqMax','6')}${b('Create','cqCreate()')} Data ${c('cqIn')}${b('Enqueue','cqEnq()')}${b('Dequeue','cqDeq()')}${b('Peek','cqPeek()')}${b('isEmpty','cqEmpty()')}${b('isFull','cqFull()')}</div>${V('cqV')}`);
panel('arraylist','Array List',`<div class="controls">Data ${c('alIn','25')} Index ${c('alIdx','0')}${b('Append','alAppend()')}${b('Insert','alInsert()')}${b('Remove','alRemove()')}${b('Clear','alClear()')}</div>${V('alV')}`);
panel('sll','Singly Linked List',`<div class="controls">${c('sllIn')}${b('Add Head','sllHead()')}${b('Add Tail','sllTail()')}${b('Remove Head','sllRemove()')}${b('Clear','sllClear()')}</div>${V('sllV')}`);
panel('dll','Doubly Linked List',`<div class="controls">${c('dllIn')}${b('Add Head','dllHead()')}${b('Add Tail','dllTail()')}${b('Remove Tail','dllRemove()')}${b('Clear','dllClear()')}</div>${V('dllV')}`);
panel('selection','Selection Sort',`<div class="controls">${c('selIn','35,12,48,7,29,18')}${b('Load','selLoad()')}${b('Next Step','selStep()')}${b('Reset','selLoad()')}</div>${V('selV')}`);
panel('bubble','Bubble Sort',`<div class="controls">${c('bubIn','8,3,6,1,5')}${b('Load','bubLoad()')}${b('Next Step','bubStep()')}${b('Reset','bubLoad()')}</div>${V('bubV')}`);
panel('linearsearch','Linear Search',`<div class="controls">${c('lsIn','15,8,22,31,9')} Target ${c('lsT','31')}${b('Load','lsLoad()')}${b('Next Step','lsStep()')}</div>${V('lsV')}`);
panel('binarysearch','Binary Search',`<div class="controls">${c('bsIn','4,8,12,18,25,31,40')} Target ${c('bsT','25')}${b('Load','bsLoad()')}${b('Next Step','bsStep()')}</div>${V('bsV')}`);
panel('bst','Binary Search Tree',`<div class="controls">${c('bstIn','25')}${b('Insert','bstInsert()')}${b('Search','bstSearch()')}${b('Clear','bstClear()')}</div>${V('bstV')}`);
nav.onclick=e=>{if(e.target.tagName!=='BUTTON')return;document.querySelectorAll('nav button,.panel').forEach(x=>x.classList.remove('active'));e.target.classList.add('active');document.getElementById(e.target.dataset.id).classList.add('active')};
function A(a,o={}){return '<div class="array">'+a.map((v,i)=>`<div class="cell ${o.sorted?.includes(i)?'sorted':''} ${o.current===i?'current':''} ${o.compare?.includes(i)?'compare':''}"><span class="idx">${i}</span>${v??'ว่าง'}${o.ptr?.[i]?`<span class="ptr">${o.ptr[i]}</span>`:''}</div>`).join('')+'</div>'};function S(id,t){document.getElementById(id+'S').textContent=t};function n(id){return document.getElementById(id).value};function nums(id){return n(id).split(',').map(Number).filter(x=>!isNaN(x))}
let st=[];function stR(){stV.innerHTML=A(st,{current:st.length-1,ptr:{[st.length-1]:'top'}});S('stV',`top=${st.length-1}, size=${st.length}`)}function stPush(){if(st.length===6)return S('stV','Overflow');st.push(n('stIn'));stR()}function stPop(){if(!st.length)return S('stV','Underflow');let x=st.pop();stR();S('stV','Pop '+x)}function stPeek(){S('stV',st.length?'Peek '+st.at(-1):'Empty')}function stClear(){st=[];stR()}
let pq=[];function pqR(){let a=[...pq,...Array(6-pq.length).fill(null)],p=pq.length?{0:'front',[pq.length-1]:'rear'}:{};pqV.innerHTML=A(a,{ptr:p});S('pqV',`front=${pq.length?0:-1}, rear=${pq.length-1}`)}function pqEnq(){if(pq.length===6)return S('pqV','Overflow');pq.push(n('pqIn'));pqR()}function pqDeq(){if(!pq.length)return S('pqV','Underflow');let x=pq.shift();pqR();S('pqV','Dequeue '+x+' และเลื่อนข้อมูล')}function pqClear(){pq=[];pqR()}
let lq=Array(6).fill(null),lf=-1,lr=-1;function lqR(){let p={};if(lf>=0)p[lf]='front';if(lr>=0)p[lr]=(p[lr]||'')+' rear';lqV.innerHTML=A(lq,{ptr:p});S('lqV',`front=${lf}, rear=${lr}`)}function lqEnq(){if(lr===5)return S('lqV','Overflow');if(lf<0)lf=0;lq[++lr]=n('lqIn');lqR()}function lqDeq(){if(lf<0)return S('lqV','Underflow');let x=lq[lf];lq[lf++]=null;if(lf>lr)lf=lr=-1;lqR();S('lqV','Dequeue '+x)}function lqClear(){lq=Array(6).fill(null);lf=lr=-1;lqR()}
let cq=[],cf=-1,cr=-1,cs=0,cm=6;function cqCreate(){cm=Math.max(3,Math.min(12,+n('cqMax')||6));cq=Array(cm).fill(null);cf=cr=-1;cs=0;cqR()}function cqR(){let p={};if(cf>=0)p[cf]='front';if(cr>=0)p[cr]=(p[cr]||'')+' rear';cqV.innerHTML=A(cq,{ptr:p});S('cqV',`front=${cf}, rear=${cr}, size=${cs}, max=${cm}`)}function cqEnq(){if(cs===cm)return S('cqV','isFull = true');if(!cs)cf=cr=0;else cr=(cr+1)%cm;cq[cr]=n('cqIn');cs++;cqR()}function cqDeq(){if(!cs)return S('cqV','isEmpty = true');let x=cq[cf];cq[cf]=null;cs--;if(!cs)cf=cr=-1;else cf=(cf+1)%cm;cqR();S('cqV','Dequeue '+x)}function cqPeek(){S('cqV',cs?'Peek '+cq[cf]:'Empty')}function cqEmpty(){S('cqV','isEmpty = '+(cs===0))}function cqFull(){S('cqV','isFull = '+(cs===cm))}
let al=[10,20,30];function alR(){alV.innerHTML=A(al);S('alV','size='+al.length)}function alAppend(){al.push(n('alIn'));alR()}function alInsert(){let i=+n('alIdx');if(i<0||i>al.length)return S('alV','Invalid index');al.splice(i,0,n('alIn'));alR()}function alRemove(){let i=+n('alIdx');if(i<0||i>=al.length)return S('alV','Invalid index');al.splice(i,1);alR()}function alClear(){al=[];alR()}
let sl=[10,20,30];function slR(){sllV.innerHTML='<div class="nodeRow">'+(sl.length?sl.map((v,i)=>`<div class="node">${v}|next</div>${i<sl.length-1?'<span class="arrow">→</span>':''}`).join(''):'NULL')+'</div>';S('sllV','head='+(sl[0]??'NULL'))}function sllHead(){sl.unshift(n('sllIn'));slR()}function sllTail(){sl.push(n('sllIn'));slR()}function sllRemove(){sl.shift();slR()}function sllClear(){sl=[];slR()}
let dl=[10,20,30];function dlR(){dllV.innerHTML='<div class="nodeRow">'+(dl.length?dl.map((v,i)=>`${i?'<span class="arrow">↔</span>':''}<div class="node">prev|${v}|next</div>`).join(''):'NULL')+'</div>';S('dllV',`head=${dl[0]??'NULL'}, tail=${dl.at(-1)??'NULL'}`)}function dllHead(){dl.unshift(n('dllIn'));dlR()}function dllTail(){dl.push(n('dllIn'));dlR()}function dllRemove(){dl.pop();dlR()}function dllClear(){dl=[];dlR()}
let sa=[],si=0,sj=1,sm=0;function selLoad(){sa=nums('selIn');si=0;sj=1;sm=0;selR('เริ่มต้น')}function selR(t){selV.innerHTML=A(sa,{sorted:[...Array(si).keys()],current:sm,compare:sj<sa.length?[sj]:[]});S('selV',t)}function selStep(){if(si>=sa.length-1)return S('selV','เรียงเสร็จแล้ว');if(sj<sa.length){if(sa[sj]<sa[sm])sm=sj;return selR(`เปรียบเทียบ index ${sj++}`)}[sa[si],sa[sm]]=[sa[sm],sa[si]];si++;sm=si;sj=si+1;selR('สลับและเริ่มรอบใหม่')}
let ba=[],bi=0,bj=0;function bubLoad(){ba=nums('bubIn');bi=0;bj=0;bubR('เริ่มต้น')}function bubR(t){bubV.innerHTML=A(ba,{sorted:[...Array(bi).keys()].map(x=>ba.length-1-x),compare:bj<ba.length-1-bi?[bj,bj+1]:[]});S('bubV',t)}function bubStep(){if(bi>=ba.length-1)return S('bubV','เรียงเสร็จแล้ว');if(bj<ba.length-1-bi){if(ba[bj]>ba[bj+1])[ba[bj],ba[bj+1]]=[ba[bj+1],ba[bj]];bj++;bubR('เปรียบเทียบและสลับเมื่อจำเป็น')}else{bi++;bj=0;bubR('จบรอบ')}}
let la=[],li=0,lt=0;function lsLoad(){la=nums('lsIn');li=0;lt=+n('lsT');lsR('เริ่มค้นหา')}function lsR(t){lsV.innerHTML=A(la,{current:li});S('lsV',t)}function lsStep(){if(li>=la.length)return S('lsV','ไม่พบ');if(la[li]===lt)return S('lsV','พบที่ index '+li);li++;lsR('ตรวจตำแหน่งถัดไป')}
let bs=[],lo=0,hi=0,mid=-1,bt=0;function bsLoad(){bs=nums('bsIn').sort((a,b)=>a-b);lo=0;hi=bs.length-1;mid=-1;bt=+n('bsT');bsR('เริ่มค้นหา')}function bsR(t){bsV.innerHTML=A(bs,{compare:mid>=0?[mid]:[],ptr:{[lo]:'low',[hi]:'high'}});S('bsV',t)}function bsStep(){if(lo>hi)return S('bsV','ไม่พบ');mid=Math.floor((lo+hi)/2);if(bs[mid]===bt)return bsR('พบที่ index '+mid);if(bt<bs[mid])hi=mid-1;else lo=mid+1;bsR('ปรับขอบเขตการค้นหา')}
class N{constructor(v){this.v=v;this.l=null;this.r=null}}let root=null;function ins(r,v){if(!r)return new N(v);if(v<r.v)r.l=ins(r.l,v);else if(v>r.v)r.r=ins(r.r,v);return r}function bstInsert(){root=ins(root,+n('bstIn'));bstR()}function bstSearch(){let v=+n('bstIn'),r=root,p=[];while(r){p.push(r.v);if(v===r.v)return S('bstV','พบ เส้นทาง '+p.join(' → '));r=v<r.v?r.l:r.r}S('bstV','ไม่พบ เส้นทาง '+p.join(' → '))}function bstClear(){root=null;bstR()}function bstR(){let q=root?[root]:[],out=[];while(q.length&&out.length<5){out.push(q.map(x=>x?x.v:null));let nq=[];q.forEach(x=>x?nq.push(x.l,x.r):nq.push(null,null));if(!nq.some(Boolean))break;q=nq}bstV.innerHTML=out.length?out.map(a=>'<div class="nodeRow">'+a.map(v=>v==null?'<span style="width:50px"></span>':`<div class="node">${v}</div>`).join('')+'</div>').join(''):'ต้นไม้ว่าง';S('bstV','Binary Search Tree')}
stR();pqR();lqR();cqCreate();alR();slR();dlR();selLoad();bubLoad();lsLoad();bsLoad();bstR();
</script></body></html>
