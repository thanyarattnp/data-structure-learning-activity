<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Data Structure Interactive Learning Platform</title>
<style>
:root{--g:#2e7d32;--g2:#e8f5e9;--o:#ef6c00;--o2:#fff3e0;--b:#1565c0;--p:#7b1fa2;--r:#c62828;--d:#263238;--bg:#f4f7f5}
*{box-sizing:border-box}body{margin:0;font-family:Tahoma,Arial,sans-serif;background:var(--bg);color:var(--d)}
header{padding:22px;background:linear-gradient(135deg,var(--g),#43a047);color:#fff}header h1{margin:0 0 6px}
.layout{display:grid;grid-template-columns:245px 1fr;min-height:calc(100vh - 90px)}
aside{background:#fff;border-right:1px solid #ddd;padding:14px;overflow:auto}
aside button{display:block;width:100%;border:0;border-radius:8px;padding:10px;text-align:left;margin:5px 0;background:#f5f7f6;font-weight:700;cursor:pointer}
aside button.active,aside button:hover{background:var(--o2);color:var(--o)}
main{padding:20px;max-width:1250px;width:100%}
.panel{display:none;background:#fff;border-radius:16px;padding:20px;box-shadow:0 8px 24px rgba(0,0,0,.06)}
.panel.active{display:block}h2{color:var(--g);margin-top:0}
.controls,.tools{display:flex;gap:9px;flex-wrap:wrap;align-items:end;padding:13px;border-radius:12px;margin:12px 0}
.controls{background:var(--g2)}.tools{background:#e3f2fd}
label{display:flex;flex-direction:column;gap:5px;font-weight:700;font-size:14px}
input,select{padding:9px;border:1px solid #b0bec5;border-radius:8px;font-size:15px;min-width:100px}
button.action{border:0;border-radius:8px;padding:10px 13px;color:#fff;background:var(--o);font-weight:700;cursor:pointer}
button.green{background:var(--g)}button.blue{background:var(--b)}button.gray{background:#546e7a}
.visual{min-height:170px;border:2px dashed #cfd8dc;border-radius:12px;padding:32px 15px;background:#fafafa;overflow:auto}
.array{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.cell{position:relative;min-width:76px;height:78px;border:3px solid #90a4ae;border-radius:10px;background:#fff;display:flex;align-items:center;justify-content:center;font-size:21px;font-weight:800;transition:.35s}
.cell.empty{background:#f1f3f4;color:#9e9e9e;border-style:dashed}.cell .idx{position:absolute;top:-22px;font-size:12px;color:#607d8b}
.cell .ptr{position:absolute;bottom:-22px;font-size:11px;white-space:nowrap}.cell.front{border-color:var(--b);background:#e3f2fd}.cell.rear{border-color:var(--o);background:var(--o2)}.cell.top{border-color:var(--p);background:#f3e5f5}
.status{background:#263238;color:#fff;border-radius:10px;padding:14px;min-height:54px;margin-top:14px}
.log{background:#111827;color:#e5e7eb;border-radius:10px;padding:10px;height:210px;overflow:auto;font-family:Consolas,monospace;margin-top:12px}
.log div{padding:5px 0;border-bottom:1px solid rgba(255,255,255,.08)}
.info{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:12px 0}.card{text-align:center;background:#fff8e1;padding:12px;border-radius:10px}.card span{display:block;color:#607d8b;font-size:13px}.card strong{font-size:21px}
.linked-stage{display:flex;align-items:center;justify-content:center;gap:12px;flex-wrap:wrap;min-height:130px}
.head-pointer{display:flex;align-items:center;gap:8px;font-weight:800;color:var(--b)}.head-pointer .head-arrow{font-size:28px}
.node-block{display:flex;align-items:center;gap:10px}.node-col{text-align:center}.node-label{font-size:11px;color:#607d8b;margin-bottom:4px}
.node{border:3px solid var(--g);background:#fff;border-radius:10px;padding:12px 16px;font-weight:800;transition:.35s}
.node.active-node{border-color:var(--o);background:var(--o2);transform:translateY(-6px)}
.node.new-node{border-color:var(--p);background:#f3e5f5;animation:nodeIn .45s ease}
.node.delete-node{border-color:var(--r);background:#ffebee;opacity:.6}
.link-arrow{font-size:24px;color:var(--o)}
@keyframes nodeIn{from{opacity:0;transform:scale(.75)}to{opacity:1;transform:scale(1)}}
.progress{height:11px;background:#ddd;border-radius:999px;overflow:hidden;margin:12px 0}.progress div{height:100%;width:0;background:linear-gradient(90deg,var(--g),var(--o))}
.legend{display:flex;gap:14px;flex-wrap:wrap;margin:10px 0;font-size:13px}.dot{width:14px;height:14px;border-radius:4px;display:inline-block}
@media(max-width:800px){.layout{grid-template-columns:1fr}aside{display:flex;overflow:auto;gap:6px}aside button{min-width:180px}.info{grid-template-columns:1fr 1fr}}

.submenu-label{font-size:12px;font-weight:800;color:#607d8b;margin:12px 6px 4px;text-transform:uppercase}
.token-row{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;align-items:center}
.token{min-width:48px;padding:10px 12px;border:2px solid #90a4ae;border-radius:9px;background:#fff;text-align:center;font-weight:800}
.token.active{border-color:var(--o);background:var(--o2)}
.token.output{border-color:var(--g);background:#e8f5e9}
.stack-mini{display:flex;flex-direction:column-reverse;gap:6px;align-items:center;min-height:130px;padding:10px}
.stack-mini .mini-cell{min-width:90px;padding:9px;border:2px solid var(--p);background:#f3e5f5;border-radius:8px;text-align:center;font-weight:800}
.expr-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-top:14px}
.expr-box{background:#fff;border:1px solid #ddd;border-radius:10px;padding:12px}
.recursion-tree{display:flex;flex-direction:column;gap:12px;align-items:center}
.rec-level{display:flex;gap:14px;justify-content:center;flex-wrap:wrap}
.rec-node{border:3px solid var(--g);background:#fff;border-radius:10px;padding:10px 14px;font-weight:800}
.rec-node.active{border-color:var(--o);background:var(--o2)}
.rec-node.done{border-color:var(--b);background:#e3f2fd}
@media(max-width:800px){.expr-grid{grid-template-columns:1fr}}

.algorithm-track{background:#f7f9fa;border-left:5px solid var(--g);padding:10px;margin-top:12px;font-family:Consolas,monospace;border-radius:6px}
.track-line{display:block;padding:5px 8px;border-radius:5px}
.track-line.active{background:#ef6c00;color:#fff;font-weight:800;box-shadow:0 2px 8px rgba(239,108,0,.28)}
.code-box{background:#111827;color:#e5e7eb;border-radius:10px;padding:12px;font-family:Consolas,monospace;white-space:pre-wrap;overflow:auto}
.phase-badge{display:inline-block;padding:4px 9px;border-radius:999px;background:#e3f2fd;color:#1565c0;font-weight:800;margin-bottom:8px}
.expr-result{font-weight:800;color:var(--g);font-size:18px;word-break:break-all}

.call-path{display:flex;flex-direction:column;align-items:center;gap:8px}
.call-frame{min-width:180px;text-align:center;border:3px solid var(--g);background:#fff;border-radius:10px;padding:10px 14px;font-weight:800}
.call-frame.active{border-color:var(--o);background:var(--o2)}
.call-frame.returning{border-color:var(--b);background:#e3f2fd}
.call-down{font-size:22px;color:var(--o)}
.call-summary{margin-top:10px;padding:10px;background:#f7f9fa;border-radius:8px;text-align:center;font-weight:700}

.return-badge{display:block;margin-top:6px;padding:4px 8px;border-radius:999px;background:#1565c0;color:#fff;font-size:12px}

.algo-layout{display:grid;grid-template-columns:1.1fr .9fr;gap:14px;margin-top:14px}
.algo-visual{min-height:260px;border:2px dashed #cfd8dc;border-radius:12px;padding:22px;background:#fafafa;overflow:auto}
.tree-stage{display:flex;flex-direction:column;gap:18px;align-items:center}
.tree-level{display:flex;gap:28px;justify-content:center;flex-wrap:wrap}
.tree-node{width:58px;height:58px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:3px solid var(--g);background:#fff;font-weight:800;transition:.3s}
.tree-node.active{border-color:var(--o);background:var(--o2);transform:scale(1.08)}
.tree-node.found{border-color:var(--b);background:#e3f2fd}
.tree-node.deleted{border-color:var(--r);background:#ffebee;opacity:.55}
.hash-table{display:grid;grid-template-columns:90px 1fr;gap:8px;align-items:center}
.hash-index{font-weight:800;color:#607d8b;text-align:center}
.hash-bucket{min-height:48px;border:2px solid #90a4ae;border-radius:8px;background:#fff;padding:7px;display:flex;gap:7px;align-items:center;flex-wrap:wrap}
.hash-item{padding:6px 9px;border-radius:7px;background:#e8f5e9;border:2px solid var(--g);font-weight:800}
.hash-item.active{background:var(--o2);border-color:var(--o)}
.sort-row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;padding:18px 0}
.sort-cell{position:relative;min-width:62px;height:68px;border:3px solid #90a4ae;border-radius:9px;background:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:20px;transition:.3s}
.sort-cell .sort-index{position:absolute;top:-20px;font-size:11px;color:#607d8b}
.sort-cell.compare{border-color:var(--b);background:#e3f2fd}
.sort-cell.active{border-color:var(--o);background:var(--o2)}
.sort-cell.sorted{border-color:var(--g);background:#c8e6c9}
.sort-cell.pivot{border-color:var(--p);background:#f3e5f5}
.search-cell.found{border-color:var(--g);background:#c8e6c9}
.dashboard{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin:12px 0}
.metric{text-align:center;background:#fff8e1;border-radius:10px;padding:10px}
.metric span{display:block;color:#607d8b;font-size:12px}.metric strong{font-size:20px}
@media(max-width:900px){.algo-layout{grid-template-columns:1fr}.dashboard{grid-template-columns:repeat(2,1fr)}}

.selected-panel{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin:12px 0;padding:12px;background:#fff8e1;border-radius:10px}
.selected-value{display:inline-flex;align-items:center;justify-content:center;min-width:72px;height:48px;border:3px solid var(--p);background:#f3e5f5;border-radius:10px;font-size:20px;font-weight:800}
.radix-wrap{display:flex;flex-direction:column;gap:14px}
.radix-pass{font-weight:800;color:var(--g);text-align:center}
.bucket-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
.bucket-card{border:2px solid #90a4ae;border-radius:10px;background:#fff;min-height:90px;padding:8px}
.bucket-title{text-align:center;font-weight:800;color:#607d8b;margin-bottom:6px}
.bucket-values{display:flex;gap:6px;flex-wrap:wrap;justify-content:center}
.bucket-value{padding:6px 8px;border-radius:7px;background:#e3f2fd;border:2px solid var(--b);font-weight:800}
.bucket-value.active{background:var(--o2);border-color:var(--o)}
@media(max-width:800px){.bucket-grid{grid-template-columns:repeat(2,1fr)}}

.hash-calc-panel{margin:12px 0;padding:12px;background:#fff8e1;border-radius:10px;border-left:5px solid var(--o)}
.hash-calc-panel strong{display:block;margin-bottom:6px}
.hash-formula{font-family:Consolas,monospace;font-size:18px;font-weight:800;color:var(--b);word-break:break-word}

.graph-svg{width:100%;height:380px;background:#fafafa;border-radius:12px}
.graph-edge{stroke:#90a4ae;stroke-width:3}
.graph-edge.active{stroke:#ef6c00;stroke-width:5}
.graph-edge.selected{stroke:#2e7d32;stroke-width:5}
.graph-node circle{fill:#fff;stroke:#2e7d32;stroke-width:3}
.graph-node.active circle{fill:#fff3e0;stroke:#ef6c00;stroke-width:5}
.graph-node.visited circle{fill:#e3f2fd;stroke:#1565c0}
.graph-node text{font-weight:800;text-anchor:middle;dominant-baseline:middle}
.graph-detail{margin-top:10px;padding:10px;background:#f7f9fa;border-radius:8px;font-family:Consolas,monospace}
.avl-badge{display:inline-block;padding:4px 8px;border-radius:999px;background:#e3f2fd;color:#1565c0;font-weight:800}

.matrix-wrap{overflow:auto;margin-top:12px}
.distance-matrix{border-collapse:collapse;width:100%;min-width:420px;font-family:Consolas,monospace}
.distance-matrix th,.distance-matrix td{border:1px solid #b0bec5;padding:7px;text-align:center}
.distance-matrix th{background:#e8f5e9;color:#2e7d32}
.distance-matrix td.active{background:#fff3e0;color:#ef6c00;font-weight:800}
.tree-svg{width:100%;height:390px;background:#fafafa;border-radius:12px}
.tree-edge{stroke:#90a4ae;stroke-width:3}
.tree-edge.active{stroke:#ef6c00;stroke-width:5}
.tree-svg-node circle{fill:#fff;stroke:#2e7d32;stroke-width:3}
.tree-svg-node.active circle{fill:#fff3e0;stroke:#ef6c00;stroke-width:5}
.tree-svg-node.found circle{fill:#e3f2fd;stroke:#1565c0}
.tree-svg-node text{text-anchor:middle;dominant-baseline:middle;font-weight:800}

.link-arrow.creating{color:#7b1fa2;font-weight:900;animation:linkPulse .7s ease infinite}
.link-arrow.removing{color:#c62828;font-weight:900;text-decoration:line-through}
@keyframes linkPulse{0%,100%{opacity:.45;transform:scale(1)}50%{opacity:1;transform:scale(1.18)}}

.dll-link-wrap{display:flex;flex-direction:column;gap:2px;align-items:center;min-width:58px}
.dll-next{color:#ef6c00;font-weight:900;font-size:28px;line-height:1}
.dll-prev{color:#1565c0;font-weight:900;font-size:28px;line-height:1}
.dll-next.creating,.dll-prev.creating{animation:linkPulse .7s ease infinite}
.dll-next.removing,.dll-prev.removing{color:#c62828;text-decoration:line-through}
.heap-dual{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.heap-pane{border:1px solid #d7dde0;border-radius:12px;background:#fff;padding:12px}
.heap-pane h4{margin:0 0 10px;color:#546e7a}
@media(max-width:900px){.heap-dual{grid-template-columns:1fr}}

/* Heap Sort: larger and clearer dual representation */
.heap-dual{
  grid-template-columns:1fr;
  gap:20px;
}
.heap-pane{
  padding:18px;
  min-height:260px;
  overflow:auto;
}
.heap-pane h4{
  font-size:18px;
  text-align:center;
  margin-bottom:20px;
}
#heapsortVisual{
  min-height:720px;
  padding:22px;
}
#heapsortVisual .sort-row{
  gap:14px;
  padding:26px 12px;
  flex-wrap:nowrap;
  min-width:max-content;
}
#heapsortVisual .sort-cell{
  min-width:82px;
  height:86px;
  font-size:25px;
  border-width:4px;
}
#heapsortVisual .sort-cell .sort-index{
  top:-25px;
  font-size:14px;
}
#heapsortVisual .tree-svg{
  height:500px;
  min-width:900px;
}
#heapsortVisual .tree-edge{
  stroke-width:4;
}
#heapsortVisual .tree-edge.active{
  stroke-width:7;
}
#heapsortVisual .tree-svg-node circle{
  r:32px;
  stroke-width:4;
}
#heapsortVisual .tree-svg-node text{
  font-size:20px;
}
@media(max-width:900px){
  #heapsortVisual{min-height:650px;padding:12px}
  #heapsortVisual .sort-cell{min-width:70px;height:76px;font-size:21px}
  #heapsortVisual .tree-svg{min-width:760px;height:460px}
}

/* Heap Sort: controls on the first row and compact visual area */
#heapsort .heap-first-row{
  display:flex;
  flex-wrap:wrap;
  align-items:flex-end;
  gap:8px;
  padding:12px;
  margin:10px 0;
  border-radius:12px;
  background:#e8f5e9;
}
#heapsort .heap-first-row label{
  min-width:130px;
}
#heapsort .heap-first-row input[type="text"],
#heapsort .heap-first-row input:not([type]){
  min-width:235px;
}
#heapsort .heap-first-row input[type="range"]{
  min-width:170px;
}
#heapsort .controls,
#heapsort .tools{
  margin:0;
  padding:0;
  background:transparent;
}
#heapsortVisual{
  min-height:500px;
  padding:12px;
  overflow:auto;
}
#heapsortVisual .heap-dual{
  grid-template-columns:1fr;
  gap:12px;
}
#heapsortVisual .heap-pane{
  min-height:auto;
  padding:12px;
  overflow:auto;
}
#heapsortVisual .heap-pane h4{
  margin:0 0 12px;
  font-size:16px;
  text-align:center;
}
#heapsortVisual .sort-row{
  gap:8px;
  padding:18px 6px;
  flex-wrap:wrap;
  min-width:0;
}
#heapsortVisual .sort-cell{
  min-width:56px;
  height:60px;
  font-size:18px;
  border-width:3px;
}
#heapsortVisual .sort-cell .sort-index{
  top:-20px;
  font-size:11px;
}
#heapsortVisual .tree-svg{
  width:100%;
  height:330px;
  min-width:0;
}
#heapsortVisual .tree-edge{
  stroke-width:3;
}
#heapsortVisual .tree-edge.active{
  stroke-width:5;
}
#heapsortVisual .tree-svg-node text{
  font-size:16px;
}
@media(max-width:900px){
  #heapsort .heap-first-row input[type="text"],
  #heapsort .heap-first-row input:not([type]){
    min-width:190px;
  }
  #heapsortVisual{
    min-height:460px;
  }
  #heapsortVisual .sort-cell{
    min-width:50px;
    height:56px;
    font-size:16px;
  }
  #heapsortVisual .tree-svg{
    height:300px;
  }
}
</style>
</head>
<body>
<header><h1>Data Structure Interactive Learning Platform</h1><div>Stack · Queue · Array List · Linked List</div></header>
<div class="layout">
<aside id="menu"></aside>
<main id="main"></main>
</div>
<script>
"use strict";
const $=id=>document.getElementById(id);
const configs=[
 {id:"stack",title:"Stack",kind:"array",ops:["create","push","pop","isFull","isEmpty","size","popAll"]},
 {id:"stackapp",title:"Stack Application",kind:"stackapp",ops:[]},
 {id:"recursion",title:"Recursion Algorithm",kind:"recursion",ops:[]},
 {id:"physicalq",title:"Physical Queue",kind:"array",ops:["create","enqueue","dequeue","isFull","isEmpty","size","front","rear","print_queue"]},
 {id:"linearq",title:"Linear Queue",kind:"array",ops:["create","enqueue","dequeue","isFull","isEmpty","size","front","rear","print_queue"]},
 {id:"circularq",title:"Circular Queue",kind:"array",ops:["create","enqueue","dequeue","isFull","isEmpty","size","front","rear","print_queue"]},
 {id:"arraylist",title:"Array List",kind:"arraylist",ops:["create","append","insert","delete","delete_index","delete_item","isFull","isEmpty","size","index_of","print_list"]},
 {id:"sll",title:"Singly Linked List",kind:"linked",double:false,ops:["create","append","insert","delete","delete_index","delete_item","isEmpty","size","index_of","print_list"]},
 {id:"dll",title:"Doubly Linked List",kind:"linked",double:true,ops:["create","append","insert","delete","delete_index","delete_item","isEmpty","size","index_of","print_list","print_backward"]},
 {id:"bst",title:"BST",kind:"nonlinear",structure:"bst"},
 {id:"heap",title:"Heap Tree",kind:"nonlinear",structure:"heap"},
 {id:"hash",title:"Hash Table",kind:"nonlinear",structure:"hash"},
 {id:"avl",title:"AVL Tree",kind:"nonlinear",structure:"avl"},
 {id:"graph",title:"Graph",kind:"graph"},
 {id:"dfs",title:"DFS",kind:"graphalgo",algorithm:"dfs"},
 {id:"bfs",title:"BFS",kind:"graphalgo",algorithm:"bfs"},
 {id:"dijkstra",title:"Dijkstra",kind:"graphalgo",algorithm:"dijkstra"},
 {id:"prim",title:"Prim",kind:"graphalgo",algorithm:"prim"},
 {id:"kruskal",title:"Kruskal",kind:"graphalgo",algorithm:"kruskal"},
 {id:"selection",title:"Selection Sort",kind:"sorting",algorithm:"selection"},
 {id:"insertion",title:"Insertion Sort",kind:"sorting",algorithm:"insertion"},
 {id:"bubble",title:"Bubble Sort",kind:"sorting",algorithm:"bubble"},
 {id:"radix",title:"Radix Sort",kind:"sorting",algorithm:"radix"},
 {id:"merge",title:"Merge Sort",kind:"sorting",algorithm:"merge"},
 {id:"quick",title:"Quick Sort",kind:"sorting",algorithm:"quick"},
 {id:"heapsort",title:"Heap Sort",kind:"sorting",algorithm:"heapsort"},
 {id:"sequential",title:"Sequential Search",kind:"searching",algorithm:"sequential"},
 {id:"binary",title:"Binary Search",kind:"searching",algorithm:"binary"}
];
const states={};

function makeState(id){
 return {id,data:[],capacity:6,front:-1,rear:-1,top:-1,steps:[],step:0,pending:null,view:{},timer:null,comparisons:0,swaps:0,active:-1,found:-1};
}
function val(id){const raw=$(id+"Data").value.trim();const n=Number(raw);return Number.isNaN(n)?raw:n}
function idx(id){return Number($(id+"Index").value)}
function addLog(id,t){const d=document.createElement("div");d.textContent=t;$(id+"Log").prepend(d)}
function setStatus(id,t){$(id+"Status").textContent=t}
function updateInfo(id){
 const s=states[id],cfg=configs.find(x=>x.id===id);
 let size=cfg.id==="linearq"||cfg.id==="circularq"?s.data.filter(v=>v!==null).length:s.data.length;
 $(id+"Size").textContent=size;
 $(id+"State").textContent=size===0?"Empty":"Ready";
 if($(id+"Pointer")){
   if(id==="stack")$(id+"Pointer").textContent=`top = ${s.top}`;
   else if(["physicalq","linearq","circularq"].includes(id))$(id+"Pointer").textContent=`front = ${s.front}, rear = ${s.rear}`;
   else $(id+"Pointer").textContent="-";
 }
}
function arrayHTML(a,o={}){
 return '<div class="array">'+a.map((v,i)=>{
   let c="cell"+(v===null?" empty":"");
   if(o.front===i)c+=" front";if(o.rear===i)c+=" rear";if(o.top===i)c+=" top";
   const p=[];if(o.front===i)p.push("front");if(o.rear===i)p.push("rear");if(o.top===i)p.push("top");
   return `<div class="${c}"><span class="idx">index ${i}</span>${v===null?"ว่าง":v}${p.length?`<span class="ptr">${p.join(" / ")}</span>`:""}</div>`;
 }).join("")+"</div>";
}
function linkedHTML(a,double=false,o={}){
 const head=a.length
   ? `<div class="head-pointer"><span>head</span><span class="head-arrow">→</span></div>`
   : `<div class="head-pointer"><span>head</span><span class="head-arrow">→</span><strong>NULL</strong></div>`;

 if(!a.length)return `<div class="linked-stage">${head}</div>`;

 return `<div class="linked-stage">${head}`+a.map((v,i)=>{
   let cls="node";
   if(o.active===i)cls+=" active-node";
   if(o.newIndex===i)cls+=" new-node";
   if(o.deleteIndex===i)cls+=" delete-node";

   const body=double
     ? `<small>prev</small> | <strong>${v}</strong> | <small>next</small>`
     : `<strong>${v}</strong><small><br>next</small>`;

   let connector="";
   if(double){
     const nextCreating=o.nextCreating===i;
     const prevCreating=o.prevCreating===i;
     const nextRemoving=o.nextRemoving===i;
     const prevRemoving=o.prevRemoving===i;

     connector=i<a.length-1
       ? `<span class="dll-link-wrap">
            <span class="dll-next ${nextCreating?"creating":""} ${nextRemoving?"removing":""}">→</span>
            <span class="dll-prev ${prevCreating?"creating":""} ${prevRemoving?"removing":""}">←</span>
          </span>`
       : `<span class="dll-link-wrap">
            <span class="dll-next ${nextCreating?"creating":""} ${nextRemoving?"removing":""}">→ NULL</span>
            <span class="dll-prev ${prevCreating?"creating":""} ${prevRemoving?"removing":""}">←</span>
          </span>`;
   }else{
     const creating=o.linkCreating===i;
     const removing=o.linkRemoving===i;
     connector=i<a.length-1
       ? `<span class="link-arrow ${creating?"creating":""} ${removing?"removing":""}">→</span>`
       : `<span class="link-arrow ${creating?"creating":""} ${removing?"removing":""}">→ NULL</span>`;
   }

   return `<div class="node-block">
     <div class="node-col">
       <div class="node-label">node ${i}</div>
       <div class="${cls}">${body}</div>
     </div>
     ${connector}
   </div>`;
 }).join("")+"</div>";
}

 });

 configs.forEach((c,i)=>{
   states[c.id]=makeState(c.id);
   if(c.kind==="array"||c.kind==="arraylist"||c.kind==="linked")operate(c.id,"create");
   if(c.kind==="nonlinear")prepareStructureOperation(c.id,"create");

 });

function clearLog(id){$(id+"Log").innerHTML=""}

function operate(id,op){
 const s=states[id],cfg=configs.find(x=>x.id===id),item=val(id),index=idx(id),cap=Math.max(1,Number($(id+"Capacity").value)||6);
 if(op==="create"){states[id]=makeState(id);states[id].capacity=cap;if(id==="linearq"||id==="circularq")states[id].data=Array(cap).fill(null);setStatus(id,cfg.kind==="linked"?"create: head → NULL":`สร้างอาร์เรย์ขนาด ${cap} ช่องแล้ว`);addLog(id,"create");render(id);return}
 if(cfg.kind==="linked"&&["append","insert","delete","delete_index","delete_item"].includes(op)){prepareLinked(id,op,item,index);return}
 if(id==="stack"){
   if(op==="push"){if(s.data.length>=s.capacity)return setStatus(id,"Stack Overflow");s.data.push(item);s.top=s.data.length-1;setStatus(id,`push ${item} ลงใน array[${s.top}]`)}
   if(op==="pop"){if(!s.data.length)return setStatus(id,"Stack Underflow");const x=s.data.pop();s.top=s.data.length-1;setStatus(id,`pop ${x}`)}
   if(op==="isFull")setStatus(id,`isFull = ${s.data.length===s.capacity}`);
   if(op==="isEmpty")setStatus(id,`isEmpty = ${s.data.length===0}`);
   if(op==="size")setStatus(id,`size = ${s.data.length}`);
   if(op==="popAll"){const out=[];while(s.data.length)out.push(s.data.pop());s.top=-1;setStatus(id,`popAll: ${out.join(" → ")}`)}
 }
 if(["physicalq","linearq","circularq"].includes(id)){
   const qsize=id==="physicalq"?s.data.length:s.data.filter(v=>v!==null).length;
   if(op==="enqueue"){
     if(qsize>=s.capacity)return setStatus(id,"Queue Overflow");
     if(id==="physicalq"){s.data.push(item);s.front=0;s.rear=s.data.length-1}
     if(id==="linearq"){if(s.rear===s.capacity-1)return setStatus(id,"Queue Overflow");if(s.front===-1)s.front=0;s.rear++;s.data[s.rear]=item}
     if(id==="circularq"){if(s.front===-1)s.front=s.rear=0;else s.rear=(s.rear+1)%s.capacity;s.data[s.rear]=item}
     setStatus(id,`enqueue ${item} ลงใน array[${s.rear}]`);
   }
   if(op==="dequeue"){
     if(s.front===-1)return setStatus(id,"Queue Underflow");
     if(id==="physicalq"){const x=s.data.shift();s.front=s.data.length?0:-1;s.rear=s.data.length-1;setStatus(id,`dequeue ${x} และเลื่อนข้อมูล`)}
     if(id==="linearq"){const x=s.data[s.front];s.data[s.front]=null;if(s.front===s.rear)s.front=s.rear=-1;else s.front++;setStatus(id,`dequeue ${x}`)}
     if(id==="circularq"){const x=s.data[s.front];s.data[s.front]=null;if(s.front===s.rear)s.front=s.rear=-1;else s.front=(s.front+1)%s.capacity;setStatus(id,`dequeue ${x}`)}
   }
   const sizeNow=id==="physicalq"?s.data.length:s.data.filter(v=>v!==null).length;
   if(op==="isFull")setStatus(id,`isFull = ${sizeNow===s.capacity}`);
   if(op==="isEmpty")setStatus(id,`isEmpty = ${sizeNow===0}`);
   if(op==="size")setStatus(id,`size = ${sizeNow}`);
   if(op==="front")setStatus(id,`front = ${s.front===-1?"ไม่มีข้อมูล":s.data[s.front]}`);
   if(op==="rear")setStatus(id,`rear = ${s.rear===-1?"ไม่มีข้อมูล":s.data[s.rear]}`);
   if(op==="print_queue"){let vals=[];if(id==="physicalq")vals=[...s.data];else if(s.front!==-1){let i=s.front;while(true){vals.push(s.data[i]);if(i===s.rear)break;i=id==="circularq"?(i+1)%s.capacity:i+1}}setStatus(id,`front → ${vals.join(" → ")} ← rear`)}
 }
 if(id==="arraylist"){

const expressionState={

function postfixConversionSteps(tokens){
 const steps=[],stack=[],output=[];
 tokens.forEach((tok,index)=>{
  if(/^[A-Za-z0-9]+$/.test(tok)){output.push(tok);steps.push({phase:"Infix → Postfix",index,stack:[...stack],output:[...output],line:2,text:`Operand ${tok} → ส่งไป Postfix Output`})}
  else if(tok==="("){stack.push(tok);steps.push({phase:"Infix → Postfix",index,stack:[...stack],output:[...output],line:4,text:"Push ( ลง Operator Stack"})}
  else if(tok===")"){
   while(stack.length&&stack.at(-1)!=="("){const op=stack.pop();output.push(op);steps.push({phase:"Infix → Postfix",index,stack:[...stack],output:[...output],line:4,text:`Pop ${op} ไป Postfix Output`})}
   stack.pop();steps.push({phase:"Infix → Postfix",index,stack:[...stack],output:[...output],line:4,text:"นำ ( ออกจาก Stack"})
  }else{
   steps.push({phase:"Infix → Postfix",index,stack:[...stack],output:[...output],line:3,text:`เปรียบเทียบ precedence ของ ${tok}`});
   while(stack.length&&stack.at(-1)!=="("&&precedence(stack.at(-1))>=precedence(tok)){const op=stack.pop();output.push(op);steps.push({phase:"Infix → Postfix",index,stack:[...stack],output:[...output],line:4,text:`Pop ${op} เพราะ precedence สูงกว่าหรือเท่ากัน`})}
   stack.push(tok);steps.push({phase:"Infix → Postfix",index,stack:[...stack],output:[...output],line:4,text:`Push ${tok} ลง Operator Stack`})
  }
 });
 while(stack.length){const op=stack.pop();output.push(op);steps.push({phase:"Infix → Postfix",index:tokens.length,stack:[...stack],output:[...output],line:4,text:`Pop ${op} ที่เหลือไป Output`})}

}
function postfixToPrefixSteps(postfix){
 const steps=[],stack=[];
 postfix.forEach((tok,index)=>{
  if(/^[A-Za-z0-9]+$/.test(tok)){stack.push(tok);steps.push({phase:"Postfix → Prefix",index,stack:[...stack],output:[],line:7,text:`Operand ${tok} → Push ลง Expression Stack`})}
  else{const right=stack.pop(),left=stack.pop(),expr=tok+left+right;stack.push(expr);steps.push({phase:"Postfix → Prefix",index,stack:[...stack],output:[expr],line:8,text:`Pop ${left}, ${right} แล้วสร้าง ${expr}`})}
 });

 steps.push({phase:"Prefix Complete",index:postfix.length,stack:[...stack],output:[prefix],line:9,text:`Prefix = ${prefix}`,prefix});
 return {steps,prefix};
}

    path:currentPath,
    state:"check",
    track:2,
    text:`ตรวจ Base Case: ${x} <= 1 ?`
  });

  if(x<=1){
    steps.push({
      label:`fib(${x})`,
      path:currentPath,
      state:"base",
      track:5,
      text:`Base Case เป็นจริง → return ${x}`,
      result:`return ${x}`
    });
    return x;
  }

  steps.push({
    label:`fib(${x})`,
    path:currentPath,
    state:"left",
    track:3,
    text:`Base Case เป็นเท็จ → เรียก fibonacci(${x-1})`
  });
  const a=call(x-1,depth+1,currentPath);

  steps.push({
    label:`fib(${x})`,
    path:currentPath,
    state:"right",
    track:4,
    text:`เรียก fibonacci(${x-2})`
  });
  const b=call(x-2,depth+1,currentPath);

  const result=a+b;
  steps.push({
    label:`fib(${x})`,
    path:currentPath,
    state:"done",
    track:5,
    text:`รวมผลลัพธ์ ${a} + ${b} และคืนค่า ${result}`,
    result:`return ${result}`
  });

  return result;
 }
 call(n,0,[]);
 return steps;
}

function heapTreeSvg(arr,heapSize,st={}){
 const values=arr.slice(0,heapSize);
 if(!values.length)return '<div>Heap ว่าง</div>';

 const width=760,height=340;
 const maxLevel=Math.floor(Math.log2(values.length));
 const positions={};

 values.forEach((_,i)=>{
   const level=Math.floor(Math.log2(i+1));
   const first=2**level-1;
   const pos=i-first;
   const count=2**level;
   positions[i]={
     x:(pos+1)*width/(count+1),
     y:42+level*(maxLevel?245/maxLevel:0)
   };
 });

 let edges="";
 values.forEach((_,i)=>{
   if(i===0)return;
   const p=Math.floor((i-1)/2);
   const active=st.compare?.includes(i)&&st.compare?.includes(p);
   edges+=`<line class="tree-edge ${active?"active":""}"
      x1="${positions[p].x}" y1="${positions[p].y}"
      x2="${positions[i].x}" y2="${positions[i].y}"/>`;
 });

 let nodes="";
 values.forEach((v,i)=>{
   const cls=`tree-svg-node ${st.active===i?"active":""}`;
   nodes+=`<g class="${cls}">
     <circle cx="${positions[i].x}" cy="${positions[i].y}" r="27"/>
     <text x="${positions[i].x}" y="${positions[i].y}">${v}</text>
   </g>`;
 });

 return `<svg class="tree-svg" viewBox="0 0 ${width} ${height}">${edges}${nodes}</svg>`;
}

function bstInsert(root,value){
 if(root===null)return {value,left:null,right:null};
 if(value<root.value)root.left=bstInsert(root.left,value);
 else if(value>root.value)root.right=bstInsert(root.right,value);
 return root;
}
function bstToArray(root){
 if(!root)return [];
 const out=[],q=[{n:root,i:0}];
 while(q.length){const {n,i}=q.shift();out[i]=n?n.value:null;if(n){q.push({n:n.left,i:2*i+1},{n:n.right,i:2*i+2})}}
 while(out.length&&out.at(-1)===null)out.pop();return out;
}
function arrayToBST(arr){let root=null;arr.filter(v=>v!==null).forEach(v=>root=bstInsert(root,v));return root}
function bstDelete(root,key){
 if(!root)return root;
 if(key<root.value)root.left=bstDelete(root.left,key);
 else if(key>root.value)root.right=bstDelete(root.right,key);
 else{
  if(!root.left)return root.right;if(!root.right)return root.left;
  let min=root.right;while(min.left)min=min.left;root.value=min.value;root.right=bstDelete(root.right,min.value);
 }
 return root;
}

function calculateHashIndex(key,tableSize,method){
 const safeSize=Math.max(1,tableSize);
 const absKey=Math.abs(Math.trunc(key));

 if(method==="multiplication"){
   const A=0.6180339887;
   const product=absKey*A;
   const fraction=product-Math.floor(product);
   const index=Math.floor(safeSize*fraction);
   return {
     index,
     methodName:"Multiplication Method",
     formula:`h(${key}) = floor(${safeSize} × frac(${absKey} × ${A.toFixed(4)}))`,
     substitution:`${absKey} × ${A.toFixed(4)} = ${product.toFixed(4)}, frac = ${fraction.toFixed(4)}`,
     result:`h(${key}) = floor(${safeSize} × ${fraction.toFixed(4)}) = ${index}`
   };
 }

 if(method==="midSquare"){
   const square=absKey*absKey;
   const digits=String(square);
   const width=Math.max(1,String(safeSize-1).length);
   const start=Math.max(0,Math.floor((digits.length-width)/2));
   const middle=digits.substring(start,start+width) || "0";
   const raw=Number(middle);
   const index=raw % safeSize;
   return {
     index,
     methodName:"Mid-Square Method",
     formula:`h(${key}) = middleDigits(${absKey}²) mod ${safeSize}`,
     substitution:`${absKey}² = ${square}, middle digits = ${middle}`,
     result:`h(${key}) = ${raw} mod ${safeSize} = ${index}`
   };
 }

 const index=((Math.trunc(key)%safeSize)+safeSize)%safeSize;
 return {
   index,
   methodName:"Division Method",
   formula:`h(${key}) = ${key} mod ${safeSize}`,
   substitution:`${key} % ${safeSize}`,
   result:`h(${key}) = ${index}`
 };
}

}

function prepareStructureOperation(id,op){
 stopAlgorithmAuto(id);
 const cfg=configs.find(x=>x.id===id),s=states[id],value=Number($(id+"Data")?.value||0);
 s.steps=[];s.step=0;s.comparisons=0;s.swaps=0;s.active=-1;s.found=-1;
 if(cfg.structure==="bst"){
   setStructureTrack(id,"bst",op);
   if(op==="create"){s.data=[];s.steps=[{data:[],line:1,text:"สร้าง BST ว่าง"}]}
   else{
    let root=arrayToBST(s.data),path=[],node=root,index=0,comparisons=0;
    while(node){comparisons++;path.push({value:node.value,index});if(value===node.value)break;if(value<node.value){node=node.left;index=2*index+1}else{node=node.right;index=2*index+2}}
    path.forEach((p,k)=>{
     let line=2;
     if(op==="add"||op==="search"||op==="delete"){
       if(k===0)line=1;
       else line=value<p.value?3:value>p.value?4:2;
     }
     s.steps.push({
       data:[...s.data],
       active:p.index,
       line,
       text:`เปรียบเทียบ ${value} กับ ${p.value}`,
       comparisons:k+1,
       swaps:0
     });
   });
    if(op==="add"){
     root=bstInsert(root,value);

 if(cfg.structure==="heap"){

   }

   }
   if(op==="peek")s.steps=[{

     line:2,

   }];
   if(op==="extract"||op==="delete"){
    let a=[...s.data];if(!a.length)s.steps=[{data:a,line:5,text:"Heap ว่าง"}];
    else{const removed=op==="delete"?value:a[0],target=op==="delete"?a.indexOf(value):0;if(target<0)s.steps=[{data:a,line:5,text:`ไม่พบ ${value}`}];
    else{a[target]=a.at(-1);a.pop();let i=target,c=0,w=1;s.steps.push({data:[...a],active:i,line:1,text:`ลบ ${removed} แล้วนำค่าท้ายมาแทน`,swaps:w});while(true){let l=2*i+1,r=2*i+2,b=i;if(l<a.length){c++;if(a[l]>a[b])b=l}if(r<a.length){c++;if(a[r]>a[b])b=r}if(b===i)break;[a[i],a[b]]=[a[b],a[i]];w++;i=b;s.steps.push({data:[...a],active:i,line:3,text:"Swap ลงเพื่อรักษา Max-Heap",comparisons:c,swaps:w})}}}
   }
 }
 if(cfg.structure==="hash"){

function showTraversal(id,type){
 const s=states[id];
 const cfg=configs.find(x=>x.id===id);
 const root=cfg?.structure==="avl"?avlFromArray(s.data):arrayToBST(s.data);

 setStructureTrack(id,cfg?.structure==="avl"?"avl":"bst",type);
 stopAlgorithmAuto(id);
 s.steps=[];
 s.step=0;
 s.comparisons=0;
 s.swaps=0;

 const output=[];

 function walk(node,index){
   if(!node)return;

   if(type==="preorder"){
     output.push(node.value);
     s.steps.push({
       data:[...s.data],
       active:index,
       found:index,
       line:1,
       text:`Visit ${node.value}`,
       detail:`Output: ${output.join(" → ")}`
     });
   }

   if(node.left){
     s.steps.push({
       data:[...s.data],
       active:index,
       line:type==="preorder"?2:1,
       text:`เดินจาก ${node.value} ไป Left child ${node.left.value}`,
       detail:`Output: ${output.join(" → ")}`
     });
   }
   walk(node.left,2*index+1);

   if(type==="inorder"){
     output.push(node.value);
     s.steps.push({
       data:[...s.data],
       active:index,
       found:index,
       line:2,
       text:`Visit ${node.value}`,
       detail:`Output: ${output.join(" → ")}`
     });
   }

   if(node.right){
     s.steps.push({
       data:[...s.data],
       active:index,
       line:type==="postorder"?2:3,
       text:`เดินจาก ${node.value} ไป Right child ${node.right.value}`,
       detail:`Output: ${output.join(" → ")}`
     });
   }
   walk(node.right,2*index+2);

   if(type==="postorder"){
     output.push(node.value);
     s.steps.push({
       data:[...s.data],
       active:index,
       found:index,
       line:3,
       text:`Visit ${node.value}`,
       detail:`Output: ${output.join(" → ")}`
     });
   }
 }

 walk(root,0);

 s.steps.push({
   data:[...s.data],
   line:4,
   text:`${type}: ${output.join(" → ")}`,
   detail:`Traversal complete`
 });

 updateAlgorithmDashboard(id);
 renderAlgorithmModule(id,{});
 setStatus(id,`เตรียม ${type} traversal แล้ว — กด Next Step`);
}

function sortingTrack(algo){
 const tracks={
  selection:["กำหนดตำแหน่งปัจจุบัน","ค้นหาค่าน้อยสุด","เปรียบเทียบ","Swap","ขยายส่วน Sorted"],
  insertion:["เลือก key","เปรียบเทียบทางซ้าย","Shift ค่าใหญ่กว่า","วาง key","ขยาย Sorted prefix"],
  bubble:["เริ่มรอบ","เปรียบเทียบค่าติดกัน","Swap หากผิดลำดับ","ค่ามากสุดไปท้าย","จบรอบ"],
  radix:["เลือกหลักหน่วย/สิบ/ร้อย","กระจายลง bucket","รวบรวมจาก bucket","เปลี่ยนหลัก","เสร็จสิ้น"],
  merge:["แบ่ง Array","แบ่งจนเหลือ 1 ค่า","เปรียบเทียบสองครึ่ง","Merge","เสร็จสิ้น"],
  quick:["เลือก Pivot","แบ่งค่าต่ำกว่า/สูงกว่า","เปรียบเทียบ","วาง Pivot","เรียงส่วนย่อย"],
  heapsort:["สร้าง Max Heap","เปรียบเทียบ Parent กับ Children","Swap เพื่อ Heapify","ย้ายค่าสูงสุดไปท้าย","ลดขนาด Heap และทำซ้ำ"]
 };return tracks[algo];
}
function prepareSorting(id){
 stopAlgorithmAuto(id);

 const s=states[id];
 const cfg=configs.find(x=>x.id===id);
 const order=$(id+"Order")?.value||"asc";
 const ascending=order==="asc";
 const a=parseListValue(id);

 s.steps=[];
 s.step=0;
 s.comparisons=0;
 s.swaps=0;
 s.data=[...a];

 setAlgorithmTrack(id,sortingTrack(cfg.algorithm));

 let arr=[...a],c=0,w=0;

 if(cfg.algorithm==="selection"){
   for(let i=0;i<arr.length-1;i++){
     let selected=i;

     s.steps.push({
       data:[...arr],
       active:i,
       selectedIndex:selected,
       selectedValue:arr[selected],
       pass:i+1,
       line:1,
       text:`เริ่ม pass ${i+1}: เลือก ${arr[selected]} เป็นค่าเริ่มต้น`,
       comparisons:c,
       swaps:w
     });

     for(let j=i+1;j<arr.length;j++){
       c++;

       s.steps.push({
         data:[...arr],
         compare:[selected,j],
         selectedIndex:selected,
         selectedValue:arr[selected],
         pass:i+1,
         line:3,
         text:`เปรียบเทียบ ${arr[j]} กับค่าที่เลือก ${arr[selected]}`,
         comparisons:c,
         swaps:w
       });

       const better=ascending ? arr[j]<arr[selected] : arr[j]>arr[selected];

       if(better){
         selected=j;
         s.steps.push({
           data:[...arr],
           active:selected,
           selectedIndex:selected,
           selectedValue:arr[selected],
           pass:i+1,
           line:2,
           text:`เปลี่ยนค่าที่เลือกเป็น ${arr[selected]} ที่ index ${selected}`,
           comparisons:c,
           swaps:w
         });
       }
     }

     if(selected!==i){
       [arr[i],arr[selected]]=[arr[selected],arr[i]];
       w++;

       s.steps.push({
         data:[...arr],
         sorted:[...Array(i+1).keys()],
         selectedIndex:i,
         selectedValue:arr[i],
         pass:i+1,
         line:4,
         text:`สลับค่าที่เลือก ${arr[i]} มาไว้ที่ index ${i}`,
         comparisons:c,
         swaps:w
       });
     }else{
       s.steps.push({
         data:[...arr],
         sorted:[...Array(i+1).keys()],
         selectedIndex:i,
         selectedValue:arr[i],
         pass:i+1,
         line:5,
         text:`ค่าที่เลือกอยู่ในตำแหน่งที่ถูกต้องแล้ว`,
         comparisons:c,
         swaps:w
       });
     }
   }

   s.steps.push({
     data:[...arr],
     sorted:[...Array(arr.length).keys()],
     selectedIndex:-1,
     selectedValue:"Done",
     pass:arr.length-1,
     line:5,
     text:`เรียงแบบ ${ascending?"น้อยไปมาก":"มากไปน้อย"} เสร็จสิ้น`,
     comparisons:c,
     swaps:w
   });
 }

 if(cfg.algorithm==="insertion"){
   for(let i=1;i<arr.length;i++){
     let key=arr[i],j=i-1;
     s.steps.push({data:[...arr],active:i,line:1,text:`เลือก key = ${key}`,comparisons:c,swaps:w});
     while(j>=0){
       c++;
       s.steps.push({data:[...arr],compare:[j,j+1],line:2,text:`เปรียบเทียบ ${arr[j]} กับ key ${key}`,comparisons:c,swaps:w});
       const shouldShift=ascending ? arr[j]>key : arr[j]<key;
       if(shouldShift){
         arr[j+1]=arr[j];w++;
         s.steps.push({data:[...arr],active:j+1,line:3,text:`Shift ${arr[j]} ไปขวา`,comparisons:c,swaps:w});
         j--;
       }else break;
     }
     arr[j+1]=key;
     s.steps.push({data:[...arr],sorted:[...Array(i+1).keys()],line:4,text:`วาง key ที่ index ${j+1}`,comparisons:c,swaps:w});
   }
 }

 if(cfg.algorithm==="bubble"){
   for(let p=0;p<arr.length-1;p++){
     for(let j=0;j<arr.length-1-p;j++){
       c++;
       s.steps.push({data:[...arr],compare:[j,j+1],line:2,text:`เปรียบเทียบ ${arr[j]} กับ ${arr[j+1]}`,comparisons:c,swaps:w});
       const shouldSwap=ascending ? arr[j]>arr[j+1] : arr[j]<arr[j+1];
       if(shouldSwap){
         [arr[j],arr[j+1]]=[arr[j+1],arr[j]];
         w++;
         s.steps.push({data:[...arr],line:3,text:`Swap index ${j},${j+1}`,comparisons:c,swaps:w});
       }
     }
   }
 }

 if(cfg.algorithm==="radix"){
   const nonNegative=arr.every(v=>v>=0);
   if(!nonNegative){
     s.steps=[{data:[...arr],line:5,text:"Radix Sort เวอร์ชันนี้รองรับจำนวนเต็มไม่ติดลบเท่านั้น"}];
   }else{
     let max=Math.max(...arr,0),exp=1,pass=1;

     while(Math.floor(max/exp)>0){
       let buckets=Array.from({length:10},()=>[]);

       s.steps.push({
         data:[...arr],
         buckets:buckets.map(b=>[...b]),
         exp,
         line:1,
         text:`เริ่มรอบ ${pass}: พิจารณาหลัก ${exp}`,
         comparisons:c,
         swaps:w
       });

       arr.forEach((value,index)=>{
         const digit=Math.floor(value/exp)%10;
         buckets[digit].push(value);

         s.steps.push({
           data:[...arr],
           active:index,
           buckets:buckets.map(b=>[...b]),
           activeBucket:digit,
           activeItem:buckets[digit].length-1,
           exp,
           line:2,
           text:`นำ ${value} ลง Bucket ${digit}`,
           comparisons:c,
           swaps:w
         });
       });

       arr=buckets.flat();
       w+=arr.length;

       s.steps.push({
         data:[...arr],
         buckets:buckets.map(b=>[...b]),
         exp,
         line:3,
         text:`รวบรวมข้อมูลจาก Bucket 0 → 9`,
         comparisons:c,
         swaps:w
       });

       s.steps.push({
         data:[...arr],
         sorted:Math.floor(max/(exp*10))===0?[...Array(arr.length).keys()]:[],
         buckets:Array.from({length:10},()=>[]),
         exp,
         line:4,
         text:`จบรอบ ${pass}: ได้ [${arr.join(", ")}]`,
         comparisons:c,
         swaps:w
       });

       exp*=10;
       pass++;
     }

     if(!ascending){
       arr.reverse();
       w+=arr.length;
       s.steps.push({
         data:[...arr],
         sorted:[...Array(arr.length).keys()],
         buckets:Array.from({length:10},()=>[]),
         exp:exp/10,
         line:5,
         text:`กลับลำดับเพื่อเรียงจากมากไปน้อย`,
         comparisons:c,
         swaps:w
       });
     }
   }
 }

 if(cfg.algorithm==="merge"){
   function mergeSort(l,r){
     if(r-l<=1)return;
     const m=Math.floor((l+r)/2);
     s.steps.push({data:[...arr],compare:[l,r-1],line:1,text:`แบ่งช่วง ${l}-${r-1}`,comparisons:c,swaps:w});
     mergeSort(l,m);mergeSort(m,r);
     const left=arr.slice(l,m),right=arr.slice(m,r),merged=[];
     while(left.length&&right.length){
       c++;
       const takeLeft=ascending ? left[0]<=right[0] : left[0]>=right[0];
       merged.push(takeLeft?left.shift():right.shift());
     }
     merged.push(...left,...right);
     for(let i=0;i<merged.length;i++){arr[l+i]=merged[i];w++}
     s.steps.push({data:[...arr],sorted:[...Array(r-l).keys()].map(x=>x+l),line:4,text:`Merge ช่วง ${l}-${r-1}`,comparisons:c,swaps:w});
   }
   mergeSort(0,arr.length);
 }

 if(cfg.algorithm==="quick"){
   function qs(l,r){
     if(l>=r)return;
     const pivot=arr[r];
     let i=l;

     s.steps.push({data:[...arr],pivot:r,line:1,text:`เลือก pivot = ${pivot}`,comparisons:c,swaps:w});

     for(let j=l;j<r;j++){
       c++;
       s.steps.push({data:[...arr],compare:[j,r],pivot:r,line:3,text:`เปรียบเทียบ ${arr[j]} กับ pivot`,comparisons:c,swaps:w});

       const belongsLeft=ascending ? arr[j]<pivot : arr[j]>pivot;
       if(belongsLeft){
         [arr[i],arr[j]]=[arr[j],arr[i]];
         w++;
         i++;
       }
     }

     [arr[i],arr[r]]=[arr[r],arr[i]];
     w++;

     s.steps.push({data:[...arr],pivot:i,sorted:[i],line:4,text:`วาง pivot ที่ index ${i}`,comparisons:c,swaps:w});
     qs(l,i-1);qs(i+1,r);
   }
   qs(0,arr.length-1);
 }


 if(cfg.algorithm==="heapsort"){
   function heapify(n,i){
     let largest=i;
     const left=2*i+1;
     const right=2*i+2;

     if(left<n){
       c++;
       s.steps.push({
         data:[...arr],
         compare:[i,left],
         active:i,
         line:2,
         text:`เปรียบเทียบ parent ${arr[i]} กับ left child ${arr[left]}`,
         heapSize:n,
         comparisons:c,
         swaps:w
       });
       if(arr[left]>arr[largest])largest=left;
     }

     if(right<n){
       c++;
       s.steps.push({
         data:[...arr],
         compare:[largest,right],
         active:i,
         line:2,
         text:`เปรียบเทียบ candidate ${arr[largest]} กับ right child ${arr[right]}`,
         heapSize:n,
         comparisons:c,
         swaps:w
       });
       if(arr[right]>arr[largest])largest=right;
     }

     if(largest!==i){
       [arr[i],arr[largest]]=[arr[largest],arr[i]];
       w++;
       s.steps.push({
         data:[...arr],
         compare:[i,largest],
         active:largest,
         line:3,
         text:`Swap index ${i} กับ ${largest} เพื่อรักษา Max Heap`,
         heapSize:n,
         comparisons:c,
         swaps:w
       });
       heapify(n,largest);
     }
   }

   s.steps.push({
     data:[...arr],
     line:1,
     text:"เริ่มสร้าง Max Heap",
     heapSize:arr.length,
     comparisons:c,
     swaps:w
   });

   for(let i=Math.floor(arr.length/2)-1;i>=0;i--){
     heapify(arr.length,i);
   }

   s.steps.push({
     data:[...arr],
     line:1,
     text:"สร้าง Max Heap เสร็จแล้ว",
     heapSize:arr.length,
     comparisons:c,
     swaps:w
   });

   for(let end=arr.length-1;end>0;end--){
     [arr[0],arr[end]]=[arr[end],arr[0]];
     w++;
     s.steps.push({
       data:[...arr],
       sorted:[...Array(arr.length-end).keys()].map(x=>end+x),
       compare:[0,end],
       line:4,
       text:`ย้ายค่าสูงสุด ${arr[end]} ไป index ${end}`,
       heapSize:end,
       comparisons:c,
       swaps:w
     });

     heapify(end,0);

     s.steps.push({
       data:[...arr],
       sorted:[...Array(arr.length-end).keys()].map(x=>end+x),
       line:5,
       text:`ลดขนาด Heap เหลือ ${end} และ Heapify ใหม่`,
       heapSize:end,
       comparisons:c,
       swaps:w
     });
   }

   s.steps.push({
     data:[...arr],
     sorted:[...Array(arr.length).keys()],
     line:5,
     text:"Heap Sort เสร็จสิ้น",
     heapSize:0,
     comparisons:c,
     swaps:w
   });

   if(!ascending){
     arr.reverse();
     w+=arr.length;
     s.steps.push({
       data:[...arr],
       sorted:[...Array(arr.length).keys()],
       line:5,
       text:"กลับลำดับเพื่อเรียงจากมากไปน้อย",
       comparisons:c,
       swaps:w
     });
   }
 }

 if(!s.steps.length){
   s.steps=[{data:[...arr],line:5,text:"ข้อมูลมีขนาดเล็กเกินไป"}];
 }

 renderAlgorithmModule(id,{});
 updateAlgorithmDashboard(id);
 setStatus(id,`เตรียม Sorting แบบ ${ascending?"น้อยไปมาก":"มากไปน้อย"} แล้ว`);
}

function searchingTrack(algo){
 return algo==="sequential"
 ?["เริ่ม index 0","เปรียบเทียบ data[index]","หากไม่เท่ากัน เลื่อนไปถัดไป","พบข้อมูล","ไม่พบข้อมูล"]
 :["กำหนด low และ high","คำนวณ mid","เปรียบเทียบ target กับ data[mid]","ปรับ low/high","พบหรือไม่พบ"];
}
function prepareSearching(id){

 s.steps=[];s.step=0;s.comparisons=0;s.swaps=0;s.data=cfg.algorithm==="binary"?[...a].sort((x,y)=>x-y):[...a];

class AVLNode{
 constructor(value){this.value=value;this.left=null;this.right=null;this.height=1}
}
function avlHeight(n){return n?n.height:0}
function avlUpdate(n){n.height=1+Math.max(avlHeight(n.left),avlHeight(n.right));return n}
function rotateRight(y){const x=y.left,t=x.right;x.right=y;y.left=t;avlUpdate(y);avlUpdate(x);return x}
function rotateLeft(x){const y=x.right,t=y.left;y.left=x;x.right=t;avlUpdate(x);avlUpdate(y);return y}
function avlInsert(root,key,events){
 if(!root){events.push(`เพิ่มโหนด ${key}`);return new AVLNode(key)}
 events.push(`เปรียบเทียบ ${key} กับ ${root.value}`);
 if(key<root.value)root.left=avlInsert(root.left,key,events);
 else if(key>root.value)root.right=avlInsert(root.right,key,events);
 else return root;
 avlUpdate(root);
 const balance=avlHeight(root.left)-avlHeight(root.right);
 events.push(`balance(${root.value}) = ${balance}`);
 if(balance>1&&key<root.left.value){events.push("LL Case → Rotate Right");return rotateRight(root)}
 if(balance<-1&&key>root.right.value){events.push("RR Case → Rotate Left");return rotateLeft(root)}
 if(balance>1&&key>root.left.value){events.push("LR Case → Rotate Left + Right");root.left=rotateLeft(root.left);return rotateRight(root)}
 if(balance<-1&&key<root.right.value){events.push("RL Case → Rotate Right + Left");root.right=rotateRight(root.right);return rotateLeft(root)}
 return root;
}
function avlMin(n){while(n.left)n=n.left;return n}
function avlDelete(root,key,events){
 if(!root)return root;
 events.push(`ค้นหา ${key} ที่โหนด ${root.value}`);
 if(key<root.value)root.left=avlDelete(root.left,key,events);
 else if(key>root.value)root.right=avlDelete(root.right,key,events);
 else{
   events.push(`ลบโหนด ${key}`);
   if(!root.left||!root.right)root=root.left||root.right;
   else{const s=avlMin(root.right);root.value=s.value;root.right=avlDelete(root.right,s.value,events)}
 }
 if(!root)return root;
 avlUpdate(root);
 const b=avlHeight(root.left)-avlHeight(root.right);
 events.push(`ตรวจ balance(${root.value}) = ${b}`);
 if(b>1&&(avlHeight(root.left.left)>=avlHeight(root.left.right)))return rotateRight(root);
 if(b>1){root.left=rotateLeft(root.left);return rotateRight(root)}
 if(b<-1&&(avlHeight(root.right.right)>=avlHeight(root.right.left)))return rotateLeft(root);
 if(b<-1){root.right=rotateRight(root.right);return rotateLeft(root)}
 return root;
}
function avlFromArray(arr){let root=null;arr.filter(v=>v!==null).forEach(v=>root=avlInsert(root,v,[]));return root}
function avlToArray(root){return bstToArray(root)}
function avlTrack(op){
 const t={
  create:["กำหนด root = NULL","สร้าง AVL Tree ว่าง","พร้อมรับข้อมูล"],
  add:["ค้นหาตำแหน่งแบบ BST","เพิ่มโหนด","อัปเดต height","คำนวณ balance factor","หมุน LL/RR/LR/RL หากจำเป็น"],
  delete:["ค้นหาโหนด","ลบแบบ BST","อัปเดต height","ตรวจ balance factor","หมุนเพื่อปรับสมดุล"],
  search:["เริ่มที่ root","เปรียบเทียบค่า","ไปซ้ายหรือขวา","พบหรือไม่พบ"],
  inorder:["Left","Visit","Right","แสดงผล"],preorder:["Visit","Left","Right","แสดงผล"],postorder:["Left","Right","Visit","แสดงผล"]
 };return t[op]||t.search;
}

const originalPrepareStructureOperation=prepareStructureOperation;
prepareStructureOperation=function(id,op){
 const cfg=configs.find(x=>x.id===id);
 if(cfg?.structure!=="avl")return originalPrepareStructureOperation(id,op);
 stopAlgorithmAuto(id);
 const s=states[id],value=Number($(id+"Data").value||0);
 s.steps=[];s.step=0;s.comparisons=0;s.swaps=0;
 setAlgorithmTrack(id,avlTrack(op));
 if(op==="create"){s.data=[];s.steps=[{data:[],line:1,text:"สร้าง AVL Tree ว่าง"}]}
 else{
   let root=avlFromArray(s.data),events=[];
   if(op==="add")root=avlInsert(root,value,events);
   if(op==="delete")root=avlDelete(root,value,events);
   if(op==="search"){
     let n=root,c=0,index=0;
     while(n){c++;s.steps.push({data:[...s.data],active:index,line:2,text:`เปรียบเทียบ ${value} กับ ${n.value}`,comparisons:c});if(value===n.value)break;if(value<n.value){n=n.left;index=2*index+1}else{n=n.right;index=2*index+2}}
     s.steps.push({data:[...s.data],found:s.data.indexOf(value),line:4,text:s.data.includes(value)?`พบ ${value}`:`ไม่พบ ${value}`,comparisons:c});
   }else{
     events.forEach((e,i)=>s.steps.push({data:[...s.data],line:Math.min(5,i+1),text:e,comparisons:i+1}));
     s.steps.push({data:avlToArray(root),line:5,text:`AVL Tree หลัง ${op}`,swaps:events.filter(e=>e.includes("Rotate")).length});
   }
 }
 updateAlgorithmDashboard(id);renderAlgorithmModule(id,{});setStatus(id,`เตรียม ${op} แล้ว`);
};

function parseVertices(text){return [...new Set(text.split(",").map(x=>x.trim()).filter(Boolean))]}
function parseEdges(text){
 return text.split(",").map(x=>x.trim()).filter(Boolean).map(e=>{
  const [pair,wRaw]=e.split(":");const [u,v]=pair.split("-").map(x=>x.trim());
  return {u,v,w:Number(wRaw||1)};
 }).filter(e=>e.u&&e.v);
}
function graphData(vertices,edges){return {vertices:[...vertices],edges:edges.map(e=>({...e}))}}
function graphPositions(vertices){
 const cx=260,cy=180,r=135,n=Math.max(vertices.length,1),pos={};
 vertices.forEach((v,i)=>{const a=-Math.PI/2+2*Math.PI*i/n;pos[v]={x:cx+r*Math.cos(a),y:cy+r*Math.sin(a)}});return pos;
}

function buildDistanceMatrix(g){
 const vertices=g.vertices||[];
 const matrix=vertices.map(()=>vertices.map(()=>Infinity));
 vertices.forEach((_,i)=>matrix[i][i]=0);
 (g.edges||[]).forEach(e=>{
   const i=vertices.indexOf(e.u),j=vertices.indexOf(e.v);
   if(i>=0&&j>=0){
     matrix[i][j]=Math.min(matrix[i][j],e.w);
     matrix[j][i]=Math.min(matrix[j][i],e.w);
   }
 });
 return matrix;
}
function renderDistanceMatrix(id,g,st={}){
 const box=$(id+"Matrix");
 if(!box)return;
 const vertices=g.vertices||[];
 if(!vertices.length){box.innerHTML="";return}
 const matrix=st.matrix||buildDistanceMatrix(g);
 let html='<table class="distance-matrix"><thead><tr><th></th>';
 vertices.forEach(v=>html+=`<th>${v}</th>`);
 html+='</tr></thead><tbody>';
 matrix.forEach((row,i)=>{
   html+=`<tr><th>${vertices[i]}</th>`;
   row.forEach((value,j)=>{
     const active=st.matrixActive&&st.matrixActive[0]===i&&st.matrixActive[1]===j;
     html+=`<td class="${active?"active":""}">${value===Infinity?"∞":value}</td>`;
   });
   html+='</tr>';
 });
 html+='</tbody></table>';
 box.innerHTML=html;
}
function distancesToMatrix(vertices,dist){
 const matrix=vertices.map(()=>vertices.map(()=>Infinity));
 vertices.forEach((v,i)=>{matrix[i][i]=0});
 if(dist){
   vertices.forEach((v,j)=>{matrix[0][j]=dist[v]??Infinity});
 }
 return matrix;
}

function renderGraph(id,st={}){
 const s=states[id],g=s.data||{vertices:[],edges:[]},pos=graphPositions(g.vertices||[]);
 const activeEdge=st.activeEdge||"",selected=new Set(st.selectedEdges||[]);
 const edgeSvg=(g.edges||[]).map(e=>{
   const key=[e.u,e.v].sort().join("-"),p1=pos[e.u],p2=pos[e.v];
   if(!p1||!p2)return "";
   const cls=selected.has(key)?"selected":activeEdge===key?"active":"";
   const mx=(p1.x+p2.x)/2,my=(p1.y+p2.y)/2;
   return `<g><line class="graph-edge ${cls}" x1="${p1.x}" y1="${p1.y}" x2="${p2.x}" y2="${p2.y}"/><text x="${mx}" y="${my-6}" text-anchor="middle">${e.w}</text></g>`;
 }).join("");
 const visited=new Set(st.visited||[]);
 const nodeSvg=(g.vertices||[]).map(v=>`<g class="graph-node ${st.activeVertex===v?"active":""} ${visited.has(v)?"visited":""}"><circle cx="${pos[v].x}" cy="${pos[v].y}" r="25"/><text x="${pos[v].x}" y="${pos[v].y}">${v}</text></g>`).join("");
 $(id+"Visual").innerHTML=`<svg class="graph-svg" viewBox="0 0 520 360">${edgeSvg}${nodeSvg}</svg>`;
 if($(id+"Detail"))$(id+"Detail").textContent=st.detail||"";
 renderDistanceMatrix(id,g,st);
}
const oldRenderAlgorithmModule=renderAlgorithmModule;
renderAlgorithmModule=function(id,st={}){
 const cfg=configs.find(x=>x.id===id);
 if(cfg?.kind==="graph"||cfg?.kind==="graphalgo"){renderGraph(id,st);return}

};

function graphTrack(op){
 const t={
  create:["อ่าน vertices","อ่าน edges","สร้าง adjacency structure","แสดง Graph"],
  addVertex:["รับ vertex","ตรวจข้อมูลซ้ำ","เพิ่ม vertex","แสดง Graph"],
  addEdge:["รับ edge","ตรวจ vertices","เพิ่ม edge/weight","แสดง Graph"],
  deleteVertex:["ค้นหา vertex","ลบ vertex","ลบ edges ที่เกี่ยวข้อง","แสดง Graph"],
  deleteEdge:["ค้นหา edge","ลบ edge","แสดง Graph"],
  search:["ค้นหา vertex","แสดงผล"]
 };return t[op]||t.create;
}
function prepareGraphOperation(op){
 const id="graph",s=states[id];stopAlgorithmAuto(id);s.steps=[];s.step=0;s.comparisons=0;s.swaps=0;setAlgorithmTrack(id,graphTrack(op));
 let g=s.data?.vertices?graphData(s.data.vertices,s.data.edges):{vertices:[],edges:[]};
 if(op==="create"){g=graphData(parseVertices($("graphVertices").value),parseEdges($("graphEdges").value));s.steps=[{data:g,line:1,text:"อ่าน vertices"},{data:g,line:2,text:"อ่าน weighted edges"},{data:g,line:3,text:"สร้าง Graph"},{data:g,line:4,text:"Graph พร้อมใช้งาน"}]}
 if(op==="addVertex"){const v=$("graphVertex").value.trim();if(v&&!g.vertices.includes(v))g.vertices.push(v);s.steps=[{data:g,activeVertex:v,line:3,text:`เพิ่ม vertex ${v}`}]}
 if(op==="addEdge"){const e=parseEdges($("graphEdge").value)[0];if(e){if(!g.vertices.includes(e.u))g.vertices.push(e.u);if(!g.vertices.includes(e.v))g.vertices.push(e.v);g.edges.push(e)}s.steps=[{data:g,activeEdge:e?[e.u,e.v].sort().join("-"):"",line:3,text:e?`เพิ่ม edge ${e.u}-${e.v} weight ${e.w}`:"ข้อมูล edge ไม่ถูกต้อง"}]}
 if(op==="deleteVertex"){const v=$("graphVertex").value.trim();g.vertices=g.vertices.filter(x=>x!==v);g.edges=g.edges.filter(e=>e.u!==v&&e.v!==v);s.steps=[{data:g,line:3,text:`ลบ vertex ${v} และ edges ที่เกี่ยวข้อง`}]}
 if(op==="deleteEdge"){const e=parseEdges($("graphEdge").value)[0];if(e)g.edges=g.edges.filter(x=>!((x.u===e.u&&x.v===e.v)||(x.u===e.v&&x.v===e.u)));s.steps=[{data:g,line:2,text:e?`ลบ edge ${e.u}-${e.v}`:"ข้อมูล edge ไม่ถูกต้อง"}]}
 if(op==="search"){const v=$("graphVertex").value.trim(),found=g.vertices.includes(v);s.steps=[{data:g,activeVertex:found?v:"",line:2,text:found?`พบ vertex ${v}`:`ไม่พบ vertex ${v}`}]}
 updateAlgorithmDashboard(id);renderGraph(id,{});setStatus(id,`เตรียม ${op} แล้ว`);
}
function graphAdj(g){
 const a={};g.vertices.forEach(v=>a[v]=[]);
 g.edges.forEach(e=>{a[e.u]?.push({v:e.v,w:e.w});a[e.v]?.push({v:e.u,w:e.w})});return a;
}
function edgeKey(u,v){return [u,v].sort().join("-")}
function graphAlgoTracks(algo){
 const t={
  dfs:["Push start ลง Stack","Pop vertex","หากยังไม่เยี่ยมชม → Visit","Push เพื่อนบ้าน","ทำซ้ำจน Stack ว่าง"],
  bfs:["Enqueue start","Dequeue vertex","Visit vertex","Enqueue เพื่อนบ้านที่ยังไม่พบ","ทำซ้ำจน Queue ว่าง"],
  dijkstra:["กำหนด distance(start)=0","เลือก vertex ระยะต่ำสุด","Relax edges","อัปเดต distance/previous","เสร็จสิ้น"],
  prim:["เลือก start","เลือก edge น้ำหนักต่ำสุดที่เชื่อมต้นไม้","เพิ่ม vertex และ edge","ทำซ้ำจนครบ","ได้ MST"],
  kruskal:["เรียง edges ตามน้ำหนัก","เลือก edge ต่ำสุด","ตรวจ cycle","เพิ่ม edge หากไม่เกิด cycle","ได้ MST"]
 };return t[algo];
}
function prepareGraphAlgorithm(id){
 const cfg=configs.find(x=>x.id===id),s=states[id];stopAlgorithmAuto(id);s.steps=[];s.step=0;s.comparisons=0;s.swaps=0;
 const g=graphData(parseVertices($(id+"Vertices").value),parseEdges($(id+"Edges").value)),start=$(id+"Start").value.trim(),adj=graphAdj(g);
 s.data=g;setAlgorithmTrack(id,graphAlgoTracks(cfg.algorithm));
 if(cfg.algorithm==="dfs"){
   const stack=[start],visited=[],seen=new Set();while(stack.length){s.steps.push({data:g,visited:[...visited],activeVertex:stack.at(-1),line:1,text:`Stack = [${stack.join(", ")}]`,detail:`Stack: ${stack.join(" → ")}`});const u=stack.pop();if(seen.has(u))continue;seen.add(u);visited.push(u);s.steps.push({data:g,visited:[...visited],activeVertex:u,line:3,text:`Visit ${u}`,detail:`Visited: ${visited.join(" → ")}`});[...(adj[u]||[])].reverse().forEach(n=>{if(!seen.has(n.v))stack.push(n.v)})}
 }
 if(cfg.algorithm==="bfs"){
   const q=[start],seen=new Set([start]),visited=[];while(q.length){s.steps.push({data:g,visited:[...visited],activeVertex:q[0],line:1,text:`Queue = [${q.join(", ")}]`,detail:`Queue: ${q.join(" → ")}`});const u=q.shift();visited.push(u);s.steps.push({data:g,visited:[...visited],activeVertex:u,line:3,text:`Visit ${u}`,detail:`Visited: ${visited.join(" → ")}`});(adj[u]||[]).forEach(n=>{if(!seen.has(n.v)){seen.add(n.v);q.push(n.v)}})}
 }
 if(cfg.algorithm==="dijkstra"){
   const dist={},prev={},un=new Set(g.vertices);g.vertices.forEach(v=>dist[v]=Infinity);dist[start]=0;
   while(un.size){let u=[...un].sort((a,b)=>dist[a]-dist[b])[0];if(dist[u]===Infinity)break;un.delete(u);s.steps.push({
   data:g,
   activeVertex:u,
   visited:g.vertices.filter(v=>!un.has(v)),
   line:2,
   text:`เลือก ${u}, distance=${dist[u]}`,
   detail:Object.entries(dist).map(([v,d])=>`${v}:${d===Infinity?"∞":d}`).join(" | "),
   matrix:distancesToMatrix(g.vertices,dist),
   matrixActive:[0,g.vertices.indexOf(u)]
 });for(const e of adj[u]||[]){if(!un.has(e.v))continue;const alt=dist[u]+e.w;s.comparisons++;s.steps.push({
   data:g,
   activeVertex:u,
   activeEdge:edgeKey(u,e.v),
   line:3,
   text:`Relax ${u}-${e.v}: ${dist[u]}+${e.w}`,
   detail:`candidate=${alt}, current=${dist[e.v]===Infinity?"∞":dist[e.v]}`,
   comparisons:s.comparisons,
   matrix:distancesToMatrix(g.vertices,dist),
   matrixActive:[0,g.vertices.indexOf(e.v)]
 });if(alt<dist[e.v]){dist[e.v]=alt;prev[e.v]=u;s.steps.push({
   data:g,
   activeVertex:e.v,
   activeEdge:edgeKey(u,e.v),
   line:4,
   text:`update distance(${e.v})=${alt}`,
   detail:Object.entries(dist).map(([v,d])=>`${v}:${d===Infinity?"∞":d}`).join(" | "),
   matrix:distancesToMatrix(g.vertices,dist),
   matrixActive:[0,g.vertices.indexOf(e.v)]
 })}}}
 }
 if(cfg.algorithm==="prim"){
   const visited=new Set([start]),selected=[];while(visited.size<g.vertices.length){let best=null;for(const e of g.edges){const cross=visited.has(e.u)!==visited.has(e.v);if(cross&&(!best||e.w<best.w))best=e}s.steps.push({data:g,visited:[...visited],selectedEdges:[...selected],line:2,text:"ค้นหา edge น้ำหนักต่ำสุด",detail:`Visited: ${[...visited].join(", ")}`});if(!best)break;selected.push(edgeKey(best.u,best.v));visited.add(visited.has(best.u)?best.v:best.u);s.steps.push({data:g,visited:[...visited],selectedEdges:[...selected],activeEdge:edgeKey(best.u,best.v),line:3,text:`เลือก ${best.u}-${best.v} (${best.w})`,detail:`MST weight = ${g.edges.filter(e=>selected.includes(edgeKey(e.u,e.v))).reduce((a,e)=>a+e.w,0)}`})}
 }
 if(cfg.algorithm==="kruskal"){
   const parent={};g.vertices.forEach(v=>parent[v]=v);const find=x=>parent[x]===x?x:(parent[x]=find(parent[x]));const selected=[];
   const edges=[...g.edges].sort((a,b)=>a.w-b.w);s.steps.push({data:g,line:1,text:"เรียง edges ตามน้ำหนัก",detail:edges.map(e=>`${e.u}-${e.v}:${e.w}`).join(", ")});
   for(const e of edges){s.steps.push({data:g,selectedEdges:[...selected],activeEdge:edgeKey(e.u,e.v),line:2,text:`พิจารณา ${e.u}-${e.v} (${e.w})`,detail:"ตรวจ cycle"});let a=find(e.u),b=find(e.v);if(a!==b){parent[a]=b;selected.push(edgeKey(e.u,e.v));s.steps.push({data:g,selectedEdges:[...selected],activeEdge:edgeKey(e.u,e.v),line:4,text:"ไม่เกิด cycle → เลือก edge",detail:`Selected: ${selected.join(", ")}`})}else s.steps.push({data:g,selectedEdges:[...selected],activeEdge:edgeKey(e.u,e.v),line:3,text:"เกิด cycle → ข้าม",detail:""})}
 }
 if(cfg.algorithm!=="dijkstra"){
   s.steps=s.steps.map(st=>({...st,matrix:buildDistanceMatrix(g)}));
 }
 updateAlgorithmDashboard(id);renderGraph(id,{matrix:buildDistanceMatrix(g)});setStatus(id,"เตรียม Algorithm แล้ว");
}


function arrangeHeapSortControls(){
 const panel=$("heapsort");
 if(!panel)return;

 const controls=panel.querySelector(":scope > .controls");

}
