<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Data Structure Interactive Learning Platform</title>
<style>
:root{--g:#2e7d32;--g2:#e8f5e9;--o:#ef6c00;--o2:#fff3e0;--b:#1565c0;--p:#7b1fa2;--r:#c62828;--d:#263238;--bg:#f4f7f5}
*{box-sizing:border-box}body{margin:0;font-family:Tahoma,Arial,sans-serif;background:var(--bg);color:var(--d)}
header{padding:22px;background:linear-gradient(135deg,var(--g),#43a047);color:#fff}header h1{margin:0 0 6px}
.layout{display:grid;grid-template-columns:245px 1fr;min-height:calc(100vh - 90px)}
aside{background:#fff;border-right:1px solid #ddd;padding:14px;overflow:auto}
aside button{display:block;width:100%;border:0;border-radius:8px;padding:10px;text-align:left;margin:5px 0;background:#f5f7f6;font-weight:700;cursor:pointer}
aside button.active,aside button:hover{background:var(--o2);color:var(--o)}
main{padding:20px;max-width:1250px;width:100%}
.panel{display:none;background:#fff;border-radius:16px;padding:20px;box-shadow:0 8px 24px rgba(0,0,0,.06)}
.panel.active{display:block}h2{color:var(--g);margin-top:0}
.controls,.tools{display:flex;gap:9px;flex-wrap:wrap;align-items:end;padding:13px;border-radius:12px;margin:12px 0}
.controls{background:var(--g2)}.tools{background:#e3f2fd}
label{display:flex;flex-direction:column;gap:5px;font-weight:700;font-size:14px}
input,select{padding:9px;border:1px solid #b0bec5;border-radius:8px;font-size:15px;min-width:100px}
button.action{border:0;border-radius:8px;padding:10px 13px;color:#fff;background:var(--o);font-weight:700;cursor:pointer}
button.green{background:var(--g)}button.blue{background:var(--b)}button.gray{background:#546e7a}
.visual{min-height:170px;border:2px dashed #cfd8dc;border-radius:12px;padding:32px 15px;background:#fafafa;overflow:auto}
.array{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.cell{position:relative;min-width:76px;height:78px;border:3px solid #90a4ae;border-radius:10px;background:#fff;display:flex;align-items:center;justify-content:center;font-size:21px;font-weight:800;transition:.35s}
.cell.empty{background:#f1f3f4;color:#9e9e9e;border-style:dashed}.cell .idx{position:absolute;top:-22px;font-size:12px;color:#607d8b}
.cell .ptr{position:absolute;bottom:-22px;font-size:11px;white-space:nowrap}.cell.front{border-color:var(--b);background:#e3f2fd}.cell.rear{border-color:var(--o);background:var(--o2)}.cell.top{border-color:var(--p);background:#f3e5f5}
.status{background:#263238;color:#fff;border-radius:10px;padding:14px;min-height:54px;margin-top:14px}
.log{background:#111827;color:#e5e7eb;border-radius:10px;padding:10px;height:210px;overflow:auto;font-family:Consolas,monospace;margin-top:12px}
.log div{padding:5px 0;border-bottom:1px solid rgba(255,255,255,.08)}
.info{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:12px 0}.card{text-align:center;background:#fff8e1;padding:12px;border-radius:10px}.card span{display:block;color:#607d8b;font-size:13px}.card strong{font-size:21px}
.linked-stage{display:flex;align-items:center;justify-content:center;gap:12px;flex-wrap:wrap;min-height:130px}
.head-pointer{display:flex;align-items:center;gap:8px;font-weight:800;color:var(--b)}.head-pointer .head-arrow{font-size:28px}
.node-block{display:flex;align-items:center;gap:10px}.node-col{text-align:center}.node-label{font-size:11px;color:#607d8b;margin-bottom:4px}
.node{border:3px solid var(--g);background:#fff;border-radius:10px;padding:12px 16px;font-weight:800;transition:.35s}
.node.active-node{border-color:var(--o);background:var(--o2);transform:translateY(-6px)}
.node.new-node{border-color:var(--p);background:#f3e5f5;animation:nodeIn .45s ease}
.node.delete-node{border-color:var(--r);background:#ffebee;opacity:.6}
.link-arrow{font-size:24px;color:var(--o)}
@keyframes nodeIn{from{opacity:0;transform:scale(.75)}to{opacity:1;transform:scale(1)}}
.progress{height:11px;background:#ddd;border-radius:999px;overflow:hidden;margin:12px 0}.progress div{height:100%;width:0;background:linear-gradient(90deg,var(--g),var(--o))}
.legend{display:flex;gap:14px;flex-wrap:wrap;margin:10px 0;font-size:13px}.dot{width:14px;height:14px;border-radius:4px;display:inline-block}
@media(max-width:800px){.layout{grid-template-columns:1fr}aside{display:flex;overflow:auto;gap:6px}aside button{min-width:180px}.info{grid-template-columns:1fr 1fr}}

.submenu-label{font-size:12px;font-weight:800;color:#607d8b;margin:12px 6px 4px;text-transform:uppercase}
.token-row{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;align-items:center}
.token{min-width:48px;padding:10px 12px;border:2px solid #90a4ae;border-radius:9px;background:#fff;text-align:center;font-weight:800}
.token.active{border-color:var(--o);background:var(--o2)}
.token.output{border-color:var(--g);background:#e8f5e9}
.stack-mini{display:flex;flex-direction:column-reverse;gap:6px;align-items:center;min-height:130px;padding:10px}
.stack-mini .mini-cell{min-width:90px;padding:9px;border:2px solid var(--p);background:#f3e5f5;border-radius:8px;text-align:center;font-weight:800}
.expr-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-top:14px}
.expr-box{background:#fff;border:1px solid #ddd;border-radius:10px;padding:12px}
.recursion-tree{display:flex;flex-direction:column;gap:12px;align-items:center}
.rec-level{display:flex;gap:14px;justify-content:center;flex-wrap:wrap}
.rec-node{border:3px solid var(--g);background:#fff;border-radius:10px;padding:10px 14px;font-weight:800}
.rec-node.active{border-color:var(--o);background:var(--o2)}
.rec-node.done{border-color:var(--b);background:#e3f2fd}
@media(max-width:800px){.expr-grid{grid-template-columns:1fr}}

.algorithm-track{background:#f7f9fa;border-left:5px solid var(--g);padding:10px;margin-top:12px;font-family:Consolas,monospace;border-radius:6px}
.track-line{display:block;padding:5px 8px;border-radius:5px}
.track-line.active{background:#ef6c00;color:#fff;font-weight:800;box-shadow:0 2px 8px rgba(239,108,0,.28)}
.code-box{background:#111827;color:#e5e7eb;border-radius:10px;padding:12px;font-family:Consolas,monospace;white-space:pre-wrap;overflow:auto}
.phase-badge{display:inline-block;padding:4px 9px;border-radius:999px;background:#e3f2fd;color:#1565c0;font-weight:800;margin-bottom:8px}
.expr-result{font-weight:800;color:var(--g);font-size:18px;word-break:break-all}

.call-path{display:flex;flex-direction:column;align-items:center;gap:8px}
.call-frame{min-width:180px;text-align:center;border:3px solid var(--g);background:#fff;border-radius:10px;padding:10px 14px;font-weight:800}
.call-frame.active{border-color:var(--o);background:var(--o2)}
.call-frame.returning{border-color:var(--b);background:#e3f2fd}
.call-down{font-size:22px;color:var(--o)}
.call-summary{margin-top:10px;padding:10px;background:#f7f9fa;border-radius:8px;text-align:center;font-weight:700}

.return-badge{display:block;margin-top:6px;padding:4px 8px;border-radius:999px;background:#1565c0;color:#fff;font-size:12px}

.algo-layout{display:grid;grid-template-columns:1.1fr .9fr;gap:14px;margin-top:14px}
.algo-visual{min-height:260px;border:2px dashed #cfd8dc;border-radius:12px;padding:22px;background:#fafafa;overflow:auto}
.tree-stage{display:flex;flex-direction:column;gap:18px;align-items:center}
.tree-level{display:flex;gap:28px;justify-content:center;flex-wrap:wrap}
.tree-node{width:58px;height:58px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:3px solid var(--g);background:#fff;font-weight:800;transition:.3s}
.tree-node.active{border-color:var(--o);background:var(--o2);transform:scale(1.08)}
.tree-node.found{border-color:var(--b);background:#e3f2fd}
.tree-node.deleted{border-color:var(--r);background:#ffebee;opacity:.55}
.hash-table{display:grid;grid-template-columns:90px 1fr;gap:8px;align-items:center}
.hash-index{font-weight:800;color:#607d8b;text-align:center}
.hash-bucket{min-height:48px;border:2px solid #90a4ae;border-radius:8px;background:#fff;padding:7px;display:flex;gap:7px;align-items:center;flex-wrap:wrap}
.hash-item{padding:6px 9px;border-radius:7px;background:#e8f5e9;border:2px solid var(--g);font-weight:800}
.hash-item.active{background:var(--o2);border-color:var(--o)}
.sort-row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;padding:18px 0}
.sort-cell{position:relative;min-width:62px;height:68px;border:3px solid #90a4ae;border-radius:9px;background:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:20px;transition:.3s}
.sort-cell .sort-index{position:absolute;top:-20px;font-size:11px;color:#607d8b}
.sort-cell.compare{border-color:var(--b);background:#e3f2fd}
.sort-cell.active{border-color:var(--o);background:var(--o2)}
.sort-cell.sorted{border-color:var(--g);background:#c8e6c9}
.sort-cell.pivot{border-color:var(--p);background:#f3e5f5}
.search-cell.found{border-color:var(--g);background:#c8e6c9}
.dashboard{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin:12px 0}
.metric{text-align:center;background:#fff8e1;border-radius:10px;padding:10px}
.metric span{display:block;color:#607d8b;font-size:12px}.metric strong{font-size:20px}
@media(max-width:900px){.algo-layout{grid-template-columns:1fr}.dashboard{grid-template-columns:repeat(2,1fr)}}

.selected-panel{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin:12px 0;padding:12px;background:#fff8e1;border-radius:10px}
.selected-value{display:inline-flex;align-items:center;justify-content:center;min-width:72px;height:48px;border:3px solid var(--p);background:#f3e5f5;border-radius:10px;font-size:20px;font-weight:800}
.radix-wrap{display:flex;flex-direction:column;gap:14px}
.radix-pass{font-weight:800;color:var(--g);text-align:center}
.bucket-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
.bucket-card{border:2px solid #90a4ae;border-radius:10px;background:#fff;min-height:90px;padding:8px}
.bucket-title{text-align:center;font-weight:800;color:#607d8b;margin-bottom:6px}
.bucket-values{display:flex;gap:6px;flex-wrap:wrap;justify-content:center}
.bucket-value{padding:6px 8px;border-radius:7px;background:#e3f2fd;border:2px solid var(--b);font-weight:800}
.bucket-value.active{background:var(--o2);border-color:var(--o)}
@media(max-width:800px){.bucket-grid{grid-template-columns:repeat(2,1fr)}}

.hash-calc-panel{margin:12px 0;padding:12px;background:#fff8e1;border-radius:10px;border-left:5px solid var(--o)}
.hash-calc-panel strong{display:block;margin-bottom:6px}
.hash-formula{font-family:Consolas,monospace;font-size:18px;font-weight:800;color:var(--b);word-break:break-word}

.graph-svg{width:100%;height:380px;background:#fafafa;border-radius:12px}
.graph-edge{stroke:#90a4ae;stroke-width:3}
.graph-edge.active{stroke:#ef6c00;stroke-width:5}
.graph-edge.selected{stroke:#2e7d32;stroke-width:5}
.graph-node circle{fill:#fff;stroke:#2e7d32;stroke-width:3}
.graph-node.active circle{fill:#fff3e0;stroke:#ef6c00;stroke-width:5}
.graph-node.visited circle{fill:#e3f2fd;stroke:#1565c0}
.graph-node text{font-weight:800;text-anchor:middle;dominant-baseline:middle}
.graph-detail{margin-top:10px;padding:10px;background:#f7f9fa;border-radius:8px;font-family:Consolas,monospace}
.avl-badge{display:inline-block;padding:4px 8px;border-radius:999px;background:#e3f2fd;color:#1565c0;font-weight:800}

.matrix-wrap{overflow:auto;margin-top:12px}
.distance-matrix{border-collapse:collapse;width:100%;min-width:420px;font-family:Consolas,monospace}
.distance-matrix th,.distance-matrix td{border:1px solid #b0bec5;padding:7px;text-align:center}
.distance-matrix th{background:#e8f5e9;color:#2e7d32}
.distance-matrix td.active{background:#fff3e0;color:#ef6c00;font-weight:800}
.tree-svg{width:100%;height:390px;background:#fafafa;border-radius:12px}
.tree-edge{stroke:#90a4ae;stroke-width:3}
.tree-edge.active{stroke:#ef6c00;stroke-width:5}
.tree-svg-node circle{fill:#fff;stroke:#2e7d32;stroke-width:3}
.tree-svg-node.active circle{fill:#fff3e0;stroke:#ef6c00;stroke-width:5}
.tree-svg-node.found circle{fill:#e3f2fd;stroke:#1565c0}
.tree-svg-node text{text-anchor:middle;dominant-baseline:middle;font-weight:800}

.link-arrow.creating{color:#7b1fa2;font-weight:900;animation:linkPulse .7s ease infinite}
.link-arrow.removing{color:#c62828;font-weight:900;text-decoration:line-through}
@keyframes linkPulse{0%,100%{opacity:.45;transform:scale(1)}50%{opacity:1;transform:scale(1.18)}}


/* DLL connector order:
   top = previous (blue, ←)
   bottom = next (orange, →) */

.dll-link-wrap{display:flex;flex-direction:column;gap:2px;align-items:center;min-width:58px;transform:translateY(10px)}
.dll-next{color:#ef6c00;font-weight:900;font-size:28px;line-height:1}
.dll-prev{color:#1565c0;font-weight:900;font-size:28px;line-height:1}
.dll-next.creating,.dll-prev.creating{animation:linkPulse .7s ease infinite}
.dll-next.removing,.dll-prev.removing{color:#c62828;text-decoration:line-through}
.heap-dual{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.heap-pane{border:1px solid #d7dde0;border-radius:12px;background:#fff;padding:12px}
.heap-pane h4{margin:0 0 10px;color:#546e7a}
@media(max-width:900px){.heap-dual{grid-template-columns:1fr}}

/* Heap Sort: larger and clearer dual representation */
.heap-dual{
  grid-template-columns:1fr;
  gap:20px;
}
.heap-pane{
  padding:18px;
  min-height:260px;
  overflow:auto;
}
.heap-pane h4{
  font-size:18px;
  text-align:center;
  margin-bottom:20px;
}
#heapsortVisual{
  min-height:720px;
  padding:22px;
}
#heapsortVisual .sort-row{
  gap:14px;
  padding:26px 12px;
  flex-wrap:nowrap;
  min-width:max-content;
}
#heapsortVisual .sort-cell{
  min-width:82px;
  height:86px;
  font-size:25px;
  border-width:4px;
}
#heapsortVisual .sort-cell .sort-index{
  top:-25px;
  font-size:14px;
}
#heapsortVisual .tree-svg{
  height:500px;
  min-width:900px;
}
#heapsortVisual .tree-edge{
  stroke-width:4;
}
#heapsortVisual .tree-edge.active{
  stroke-width:7;
}
#heapsortVisual .tree-svg-node circle{
  r:32px;
  stroke-width:4;
}
#heapsortVisual .tree-svg-node text{
  font-size:20px;
}
@media(max-width:900px){
  #heapsortVisual{min-height:650px;padding:12px}
  #heapsortVisual .sort-cell{min-width:70px;height:76px;font-size:21px}
  #heapsortVisual .tree-svg{min-width:760px;height:460px}
}

/* Heap Sort: controls on the first row and compact visual area */
#heapsort .heap-first-row{
  display:flex;
  flex-wrap:wrap;
  align-items:flex-end;
  gap:8px;
  padding:12px;
  margin:10px 0;
  border-radius:12px;
  background:#e8f5e9;
}
#heapsort .heap-first-row label{
  min-width:130px;
}
#heapsort .heap-first-row input[type="text"],
#heapsort .heap-first-row input:not([type]){
  min-width:235px;
}
#heapsort .heap-first-row input[type="range"]{
  min-width:170px;
}
#heapsort .controls,
#heapsort .tools{
  margin:0;
  padding:0;
  background:transparent;
}
#heapsortVisual{
  min-height:500px;
  padding:12px;
  overflow:auto;
}
#heapsortVisual .heap-dual{
  grid-template-columns:1fr;
  gap:12px;
}
#heapsortVisual .heap-pane{
  min-height:auto;
  padding:12px;
  overflow:auto;
}
#heapsortVisual .heap-pane h4{
  margin:0 0 12px;
  font-size:16px;
  text-align:center;
}
#heapsortVisual .sort-row{
  gap:8px;
  padding:18px 6px;
  flex-wrap:wrap;
  min-width:0;
}
#heapsortVisual .sort-cell{
  min-width:56px;
  height:60px;
  font-size:18px;
  border-width:3px;
}
#heapsortVisual .sort-cell .sort-index{
  top:-20px;
  font-size:11px;
}
#heapsortVisual .tree-svg{
  width:100%;
  height:330px;
  min-width:0;
}
#heapsortVisual .tree-edge{
  stroke-width:3;
}
#heapsortVisual .tree-edge.active{
  stroke-width:5;
}
#heapsortVisual .tree-svg-node text{
  font-size:16px;
}
@media(max-width:900px){
  #heapsort .heap-first-row input[type="text"],
  #heapsort .heap-first-row input:not([type]){
    min-width:190px;
  }
  #heapsortVisual{
    min-height:460px;
  }
  #heapsortVisual .sort-cell{
    min-width:50px;
    height:56px;
    font-size:16px;
  }
  #heapsortVisual .tree-svg{
    height:300px;
  }
}

/* v20 Popup topic navigation */
.layout{grid-template-columns:205px 1fr}
aside{
  position:sticky;
  top:0;
  height:calc(100vh - 90px);
  overflow:auto;
}
.topic-menu-title{
  margin:2px 4px 12px;
  color:var(--g);
  font-size:15px;
  font-weight:800;
}
aside .topic-popup-btn{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:8px;
  width:100%;
  padding:12px;
  margin:7px 0;
  border:0;
  border-left:5px solid transparent;
  border-radius:10px;
  background:#f5f7f6;
  color:var(--d);
  font-weight:800;
  cursor:pointer;
}
aside .topic-popup-btn:hover,
aside .topic-popup-btn.active{
  color:var(--o);
  background:var(--o2);
  border-left-color:var(--o);
}
.topic-popup-btn .topic-icon{font-size:19px}
.topic-popup-btn .topic-arrow{color:#78909c;font-size:17px}
.menu-modal{
  position:fixed;
  inset:0;
  z-index:9999;
  display:none;
  align-items:center;
  justify-content:center;
  padding:20px;
  background:rgba(17,24,39,.58);
  backdrop-filter:blur(3px);
}
.menu-modal.open{display:flex}
.menu-dialog{
  width:min(680px,96vw);
  max-height:85vh;
  overflow:auto;
  border-radius:18px;
  background:#fff;
  box-shadow:0 22px 65px rgba(0,0,0,.28);
  animation:popupIn .2s ease;
}
@keyframes popupIn{
  from{opacity:0;transform:translateY(18px) scale(.97)}
  to{opacity:1;transform:translateY(0) scale(1)}
}
.menu-dialog-header{
  position:sticky;
  top:0;
  z-index:2;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  padding:17px 20px;
  color:#fff;
  background:linear-gradient(135deg,var(--g),#43a047);
}
.menu-dialog-header h3{margin:0;font-size:21px}
.menu-close{
  width:38px;
  height:38px;
  border:0;
  border-radius:50%;
  background:rgba(255,255,255,.2);
  color:#fff;
  font-size:24px;
  cursor:pointer;
}
.menu-dialog-body{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:12px;
  padding:20px;
}
.menu-item{
  display:flex;
  align-items:center;
  gap:12px;
  min-height:76px;
  padding:14px;
  border:2px solid #e0e5e2;
  border-radius:13px;
  background:#fff;
  text-align:left;
  cursor:pointer;
  transition:.2s;
}
.menu-item:hover,
.menu-item.active{
  border-color:var(--o);
  background:var(--o2);
  transform:translateY(-2px);
}
.menu-item-number{
  display:flex;
  align-items:center;
  justify-content:center;
  flex:0 0 39px;
  height:39px;
  border-radius:50%;
  background:var(--g2);
  color:var(--g);
  font-weight:900;
}
.menu-item strong{display:block;color:var(--d);font-size:15px}
.menu-item small{display:block;margin-top:4px;color:#607d8b}
.menu-hint{
  padding:0 20px 18px;
  color:#607d8b;
  font-size:13px;
}
@media(max-width:800px){
  .layout{grid-template-columns:1fr}
  aside{
    position:static;
    height:auto;
    display:flex;
    gap:7px;
    padding:10px;
    overflow-x:auto;
    border-right:0;
    border-bottom:1px solid #ddd;
  }
  .topic-menu-title{display:none}
  aside .topic-popup-btn{
    flex:0 0 auto;
    width:auto;
    min-width:138px;
    margin:0;
    border-left:0;
    border-bottom:4px solid transparent;
  }
  aside .topic-popup-btn.active{border-bottom-color:var(--o)}
  .menu-dialog-body{grid-template-columns:1fr}
}


.code-tabs{margin-top:10px;border:1px solid #d8e0dc;border-radius:12px;overflow:hidden;background:#fff}

<script>
"use strict";
const $=id=>document.getElementById(id);
const configs=[
 {id:"stack",title:"Stack",kind:"array",ops:["create","push","pop","isFull","isEmpty","size","popAll"]},
 {id:"stackapp",title:"Stack Application",kind:"stackapp",ops:[]},
 {id:"recursion",title:"Recursion Algorithm",kind:"recursion",ops:[]},
 {id:"physicalq",title:"Physical Queue",kind:"array",ops:["create","enqueue","dequeue","isFull","isEmpty","size","front","rear","print_queue"]},
 {id:"linearq",title:"Linear Queue",kind:"array",ops:["create","enqueue","dequeue","isFull","isEmpty","size","front","rear","print_queue"]},
 {id:"circularq",title:"Circular Queue",kind:"array",ops:["create","enqueue","dequeue","isFull","isEmpty","size","front","rear","print_queue"]},
 {id:"arraylist",title:"Array List",kind:"arraylist",ops:["create","add_item","add_index","delete","delete_index","delete_item","isFull","isEmpty","size","get_index","get_item","print_list"]},
 {id:"sll",title:"Singly Linked List",kind:"linked",double:false,ops:["create","add_first","add_last","insert_index","delete_first","delete_last","delete_index","delete_item","isEmpty","size","setposition","get_index","print_list"]},
 {id:"dll",title:"Doubly Linked List",kind:"linked",double:true,ops:["create","add_first","add_last","add_index","delete_first","delete_last","delete_index","delete_item","isEmpty","size","setposition","get_index","print_dll","print_backward"]},
 {id:"bst",title:"BST",kind:"nonlinear",structure:"bst"},
 {id:"heap",title:"Heap Tree",kind:"nonlinear",structure:"heap"},
 {id:"hash",title:"Hash Table",kind:"nonlinear",structure:"hash"},
 {id:"avl",title:"AVL Tree",kind:"nonlinear",structure:"avl"},
 {id:"graph",title:"Graph",kind:"graph"},
 {id:"dfs",title:"DFS",kind:"graphalgo",algorithm:"dfs"},
 {id:"bfs",title:"BFS",kind:"graphalgo",algorithm:"bfs"},
 {id:"dijkstra",title:"Dijkstra",kind:"graphalgo",algorithm:"dijkstra"},
 {id:"prim",title:"Prim",kind:"graphalgo",algorithm:"prim"},
 {id:"kruskal",title:"Kruskal",kind:"graphalgo",algorithm:"kruskal"},
 {id:"selection",title:"Selection Sort",kind:"sorting",algorithm:"selection"},
 {id:"insertion",title:"Insertion Sort",kind:"sorting",algorithm:"insertion"},
 {id:"bubble",title:"Bubble Sort",kind:"sorting",algorithm:"bubble"},
 {id:"radix",title:"Radix Sort",kind:"sorting",algorithm:"radix"},
 {id:"merge",title:"Merge Sort",kind:"sorting",algorithm:"merge"},
 {id:"quick",title:"Quick Sort",kind:"sorting",algorithm:"quick"},
 {id:"heapsort",title:"Heap Sort",kind:"sorting",algorithm:"heapsort"},
 {id:"sequential",title:"Sequential Search",kind:"searching",algorithm:"sequential"},
 {id:"binary",title:"Binary Search",kind:"searching",algorithm:"binary"}
];
const states={};

function makeState(id){
 const defaultData=(id==="sll"||id==="dll"||id==="arraylist")?[10,20,30,40]:[];
 const defaultCapacity=id==="arraylist"?5:6;
 return {id,data:[...defaultData],capacity:defaultCapacity,front:-1,rear:-1,top:-1,steps:[],step:0,pending:null,view:{},timer:null,comparisons:0,swaps:0,active:-1,found:-1};
}
function val(id){const raw=$(id+"Data").value.trim();const n=Number(raw);return Number.isNaN(n)?raw:n}
function idx(id){return Number($(id+"Index").value)}
function addLog(id,t){const d=document.createElement("div");d.textContent=t;$(id+"Log").prepend(d)}
function setStatus(id,t){$(id+"Status").textContent=t}
function updateInfo(id){
 const s=states[id],cfg=configs.find(x=>x.id===id);
 let size=cfg.id==="linearq"||cfg.id==="circularq"?s.data.filter(v=>v!==null).length:s.data.length;
 if($(id+"Size"))$(id+"Size").textContent=size;
 $(id+"State").textContent=size===0?"Empty":"Ready";
 if($(id+"Pointer")){
   if(id==="stack")$(id+"Pointer").textContent=`top = ${s.top}`;
   else if(["physicalq","linearq","circularq"].includes(id))$(id+"Pointer").textContent=`front = ${s.front}, rear = ${s.rear}`;
   else if(id==="dll")$(id+"Pointer").textContent=`start = ${size?"node 1":"None"}, tail = ${size?`node ${size}`:"None"}, size = ${size} | Engine V2`;
   else $(id+"Pointer").textContent="-";
 }
}

function randomUniqueNumbers(count=4,min=1,max=99){
 const values=[];
 while(values.length<count){
   const value=Math.floor(Math.random()*(max-min+1))+min;
   if(!values.includes(value))values.push(value);
 }
 return values;
}
function buildMaxHeap(values){
 const heap=[];
 values.forEach(value=>{
   heap.push(value);
   let i=heap.length-1;
   while(i>0){
     const parent=Math.floor((i-1)/2);
     if(heap[parent]>=heap[i])break;
     [heap[parent],heap[i]]=[heap[i],heap[parent]];
     i=parent;
   }
 });
 return heap;
}
function buildHashBuckets(values,size,method){
 const buckets=Array.from({length:size},()=>[]);
 values.forEach(value=>{
   const calc=calculateHashIndex(value,size,method);
   buckets[calc.index].push(value);
 });
 return buckets;
}

function escapeHTML(value){
 return String(value??"")
   .replace(/&/g,"&amp;")
   .replace(/</g,"&lt;")
   .replace(/>/g,"&gt;")
   .replace(/"/g,"&quot;")
   .replace(/'/g,"&#039;");
}

function arrayHTML(a,o={}){

function linkedHTML(a,double=false,o={}){

     : "";

   const nodes=a.map((v,i)=>{
     let cls="node";
     if(o.active===i)cls+=" active-node";

     if(o.deleteIndex===i)cls+=" delete-node";

     const connector=i<a.length-1

     return `<div class="node-block">

   }).join("");

   return `<div class="linked-stage">${head}${currentPointer}${delPointer}${newNodePointer}${bypass}${itemPanel}${comparePanel}${resultPanel}${nodes}</div>`;
 }

 const dllStart=a.length
   ? `<div class="dll-start-pointer"><span>start</span><span class="start-arrow">↓</span></div>`

function render(id){

 if(cfg.kind==="linked")$(id+"Visual").innerHTML=linkedHTML(s.data,cfg.double,s.view);
 else{
   let display=[];
   if(id==="linearq"||id==="circularq")display=s.data.length?[...s.data]:Array(s.capacity).fill(null);
   else{display=Array(s.capacity).fill(null);s.data.forEach((v,i)=>{if(i<s.capacity)display[i]=v})}
   const capacityLabel=id==="arraylist"
     ? `maxlist = ${s.capacity} | size = ${s.data.length}`

   const showArrayOutput=id==="arraylist" && s.view?.showOutputVariable===true;

          <div class="array-output-name">data</div>
          <div class="array-output-value">${escapeHTML(s.view?.dataValue ?? "")}</div>
        </div>`
     : "";
   const showComparePanel=id==="arraylist" && s.view?.showComparePanel===true;
   const comparePanel=showComparePanel
     ? `<div class="array-compare-panel">
          <div class="array-compare-title">Compare</div>
          <div class="array-compare-grid">
            <div class="array-compare-box">
              <span class="array-compare-label">items[${escapeHTML(s.view?.compareIndex ?? "")}]</span>
              <span class="array-compare-value">${escapeHTML(s.view?.compareLeft ?? "")}</span>
            </div>
            <div class="array-compare-op">==</div>
            <div class="array-compare-box">
              <span class="array-compare-label">item</span>
              <span class="array-compare-value">${escapeHTML(s.view?.compareRight ?? "")}</span>
            </div>
          </div>
          <div class="array-compare-result ${s.view?.compareResult===true?"true":"false"}">
            Result : ${s.view?.compareResult===true?"True":"False"}
          </div>
        </div>`
     : "";
   $(id+"Visual").innerHTML=`<div style="font-weight:700;color:#546e7a;margin-bottom:12px">${capacityLabel}</div>${arrayHTML(display,{front:s.front,rear:s.rear,top:s.top,active:s.active,movingFrom:s.view?.movingFrom,movingTo:s.view?.movingTo,movingLeftFrom:s.view?.movingLeftFrom,movingLeftTo:s.view?.movingLeftTo})}${outputPanel}${comparePanel}`;
 }
 updateInfo(id);
}

function sortingPointerLabels(algorithm,st,index,dataLength){
 const labels=[];
 const add=(label,target,className="")=>{
   if(Number.isInteger(target)&&target>=0&&target<dataLength&&target===index){
     labels.push({label,className});
   }
 };
 if(algorithm==="selection"){
   add("i",st.pass!==undefined?Math.max(0,st.pass-1):-1);
   add("j",st.compare?.[1]);
   add("min_index",st.selectedIndex);
 }else if(algorithm==="insertion"){
   add("i",st.keyOriginal);
   add("j",st.compareIndex);
   add("key",st.insertPosition??st.active??st.keyOriginal,"key-pointer");
 }else if(algorithm==="bubble"){
   const j=st.innerIndex??st.compare?.[0];
   add("i",st.outerIndex);
   add("j",j);
   add("j + 1",Number.isInteger(j)?j+1:-1);
 }else if(algorithm==="radix"){
   add(st.activeBucket===undefined?"i":`i · digit=${st.activeBucket}`,st.active);
 }else if(algorithm==="merge"){
   const mid=dataLength>1?Math.floor(dataLength/2):-1;
   add("left",dataLength?0:-1);
   add("mid",mid,"boundary-pointer");
   add("right",mid,"boundary-pointer");
 }else if(algorithm==="quick"){
   add("L",st.leftPointer);
   add("R",st.rightPointer);
   add("pivot",st.pivot,"pivot-pointer");
 }else if(algorithm==="heapsort"){
   add("parent",st.active??st.compare?.[0]);
   add("child",st.compare?.[1]);
   const end=st.heapSize;
   add("end",Number.isInteger(end)&&end<dataLength?end:st.swap?.[1],"boundary-pointer");
 }
 return labels;
}
function sortingPointerHTML(algorithm,st,index,dataLength){
 const labels=sortingPointerLabels(algorithm,st,index,dataLength);
 if(!labels.length)return "";
 return `<span class="sort-pointer-stack">${labels.map(item=>
   `<span class="sort-pointer-label ${item.className}">${escapeHTML(item.label)}</span>`
 ).join("")}</span>`;
}

function groupOfPanel(panelId){

function toggleTopicDropdown(groupId){
 const current=document.querySelector(`#menu [data-dropdown="${groupId}"]`);
 if(!current)return;
 const willOpen=!current.classList.contains("open");
 document.querySelectorAll("#menu .topic-dropdown").forEach(x=>x.classList.remove("open"));
 if(willOpen)current.classList.add("open");
}
function showPanel(panelId){
 document.querySelectorAll(".panel").forEach(x=>x.classList.remove("active"));
 const target=$(panelId);
 if(target)target.classList.add("active");

 document.querySelectorAll("#menu .topic-submenu-btn").forEach(x=>x.classList.remove("active"));
 document.querySelector(`#menu .topic-submenu-btn[data-id="${panelId}"]`)?.classList.add("active");

 const group=groupOfPanel(panelId);
 if(group){
   document.querySelectorAll("#menu .topic-dropdown").forEach(x=>x.classList.remove("open"));
   document.querySelector(`#menu [data-dropdown="${group.id}"]`)?.classList.add("open");
 }
 window.scrollTo({top:0,behavior:"smooth"});
}


function ensureStackCodeTabs(){
 const panel=$("stack");
 if(!panel)return;

 if(panel.querySelector(".code-tabs"))return;

 const track=$("stackTrack");
 if(!track)return;

 const wrapper=document.createElement("div");
 wrapper.innerHTML=codeTabs("stack");
 const tabs=wrapper.firstElementChild;

 const parent=track.parentElement;
 const label=track.previousElementSibling;
 if(label && label.tagName==="STRONG" && /Algorithm/i.test(label.textContent)){
   label.remove();
 }
 parent.replaceChild(tabs,track);
}

  postorder:"Postorder Traversal (Left → Right → Root)"

}

function renderTraversalSummary(mode, values=[]){
 const box=$("bstTraversalSummary");
 if(!box)return;
 $("bstTraversalTitle").textContent=traversalLabel(mode);

 const result=$("bstTraversalResult");
 renderTraversalSummary(mode,result);
 if(!result)return;

 if(!values.length){
   result.innerHTML='<span class="traversal-result-label">ผลลัพธ์:</span><span>-</span>';
   return;
 }

 result.innerHTML='<span class="traversal-result-label">ผลลัพธ์:</span>' +
   values.map((v,i)=>`${i?'<span class="traversal-arrow">→</span>':''}<span class="traversal-node-value">${v}</span>`).join("");
}

     const active=groupIndex===0&&itemIndex===0?"active":"";
     return `<button type="button" class="topic-submenu-btn ${active}" data-id="${item.id}" onclick="showPanel('${item.id}')">
       <span class="topic-submenu-number">${itemIndex+1}</span>
       <span>${cfg?.title||item.id}</span>
     </button>`;
   }).join("");

   menuHTML+=`<div class="topic-dropdown ${groupIndex===0?"open":""}" data-dropdown="${g.id}">
     <button type="button" class="topic-dropdown-btn" onclick="toggleTopicDropdown('${g.id}')">
       <span><span class="topic-icon">${g.icon}</span> ${g.title}</span>
       <span class="topic-dropdown-arrow">›</span>
     </button>
     <div class="topic-dropdown-list">${submenu}</div>
   </div>`;
 });
 $("menu").innerHTML=menuHTML;
 $("main").innerHTML=configs.map(panel).join("");
 configs.forEach((c,i)=>{
   states[c.id]=makeState(c.id);
   if(c.kind==="array"||c.kind==="arraylist"||c.kind==="linked")operate(c.id,"create");
   if(c.kind==="nonlinear")prepareStructureOperation(c.id,"create");
   if(c.kind==="sorting")prepareSorting(c.id);
   if(c.kind==="searching")prepareSearching(c.id);
   if(c.kind==="graph")prepareGraphOperation("create");
   if(c.kind==="graphalgo")prepareGraphAlgorithm(c.id);
   if(i===0)$(c.id).classList.add("active");
 });
 refreshGraphEdgeEditor(0);
 resetExpression();
 resetRecursion();
}

function arraySnap(data,text,active=-1){
 return {data:[...data],text,active};
}
function prepareArrayList(op,item,index){
 const s=states.arraylist;
 const old=[...s.data];
 const size=old.length;
 const maxlist=s.capacity;
 const steps=[];
 const result=[...old];
 updateFunctionCode("arraylist",op);

 const addStep=(data,text,trackLine,active=-1,caption="",final=false,blocked=false,output="")=>{
   steps.push({...arraySnap(data,text,active),trackLine,caption,final,blocked,output});
 };
 const stop=(message,trackLine=1,active=-1)=>{
   addStep(old,message,trackLine,active,message,true,true,message);
 };

 if(op==="create"){
   result.length=0;
   addStep([],"สร้าง items จำนวน maxlist ช่อง",1,-1,`maxlist = ${maxlist}`);
   addStep([],"กำหนด size = 0",2,-1,"size = 0");
   addStep([],"Create List complete",3,-1,"Create List complete",true,false,"Create List complete");
 }
 else if(op==="add_item"){
   addStep(old,`ตรวจสอบ isFull(): ${size} == ${maxlist}`,1,-1);
   if(size===maxlist){
     stop("List is full !!",2,size-1);
   }else{
     result.push(item);
     addStep(result,`items[${size}] = ${item}`,3,size);
     addStep(result,`size = ${size+1}`,4,-1);
     addStep(result,"Add item complete",5,-1,"Add item complete",true,false,"Add item complete");
   }
 }
 else if(op==="add_index"){
   addStep(old,`รับ item = ${item}, index = ${index}`,1,-1,`item = ${item} | index = ${index}`);
   addStep(old,`ตรวจสอบ 0 <= ${index} <= ${size}`,2,-1);
   if(index<0||index>size){
     stop("index is error",3,-1);
   }else{
     addStep(old,`ตรวจสอบ isFull(): ${size} == ${maxlist}`,4,-1);
     if(size===maxlist){
       stop("List is full !!",5,size-1);
     }else{
       let temp=[...old];
       let i=size-1;
       addStep(temp,`กำหนด i = ${i}`,6,i,`i = ${i}`);
       while(i>=index){
         const before=[...temp];
         addStep(before,`เตรียมเลื่อน items[${i}] ไป items[${i+1}]`,7,i,
           `i = ${i} | from index ${i} to ${i+1}`);
         temp[i+1]=temp[i];
         steps.push({
           ...arraySnap([...temp],`เลื่อน ${temp[i]} จาก index ${i} ไป index ${i+1}`,i+1),
           trackLine:7,
           caption:`i = ${i} | ${temp[i]} : ${i} → ${i+1}`,
           movingFrom:i,
           movingTo:i+1
         });
         i=i-1;
         addStep([...temp],`ลด i เหลือ ${i}`,8,i,`i = ${i}`);
       }
       temp[index]=item;
       result.length=0;
       result.push(...temp);
       addStep(result,`items[${index}] = ${item}`,9,index,`insert ${item} at index ${index}`);
       addStep(result,`size = ${size+1}`,10,-1,`size = ${size+1}`);
       addStep(result,"Add index complete",11,-1,"Add index complete",true,false,"Add index complete");
     }
   }
 }
 else if(op==="delete"){
   addStep(old,`ตรวจสอบ isEmpty(): ${size} == 0`,1,-1);
   if(size===0){
     stop("List is empty !!",2,-1);
   }else{
     const removed=old[size-1];
     addStep(old,`item = items[${size-1}] = ${removed}`,3,size-1);
     result.pop();
     addStep(result,`size = ${size-1}`,4,-1);
     addStep(result,`return ${removed}`,5,-1,`Deleted item = ${removed}`,true,false,String(removed));
   }
 }
 else if(op==="delete_index"){
   addStep(old,`ตรวจสอบ isEmpty(): ${size} == 0`,1,-1);
   if(size===0){
     stop("List is empty !!",2,-1);
   }else if(index<0||index>size-1){
     stop("index is error",3,-1);
   }else{
     const removed=old[index];
     addStep(old,`item = items[${index}] = ${removed}`,4,index,`ลบ ${removed} ที่ index ${index}`);
     let temp=[...old];
     for(let i=index;i<size-1;i++){
       const before=[...temp];
       addStep(before,`เตรียมเลื่อน items[${i+1}] ไป items[${i}]`,5,i+1,
         `from index ${i+1} → ${i}`);
       temp[i]=temp[i+1];
       steps.push({
         ...arraySnap([...temp],`เลื่อน ${temp[i]} จาก index ${i+1} ไป index ${i}`,i),
         trackLine:5,
         caption:`${temp[i]} : ${i+1} → ${i}`,
         movingLeftFrom:i+1,
         movingLeftTo:i
       });
     }
     temp.pop();
     result.length=0; result.push(...temp);
     addStep(result,`ล้างตำแหน่งท้ายเดิมและลด size = ${size-1}`,6,-1,`size = ${size-1}`);
     addStep(result,`return ${removed}`,7,-1,`Deleted item = ${removed}`,true,false,String(removed));
   }
 }
 else if(op==="delete_item"){
   addStep(old,`ตรวจสอบ isEmpty(): ${size} == 0`,1,-1);
   if(size===0){
     stop("List is empty !!",2,-1);
   }else{
     let found=-1;
     for(let i=0;i<size;i++){
       addStep(old,`เปรียบเทียบ ${item} กับ items[${i}] = ${old[i]}`,3,i);
       if(old[i]===item){found=i;break;}
     }
     if(found===-1){
       stop("item is not found",4,-1);
     }else{
       addStep(old,`get_index(${item}) = ${found}`,3,found);
       const removed=old[found];
       let temp=[...old];
       for(let i=found;i<size-1;i++){
         const before=[...temp];
         addStep(before,`เตรียมเลื่อน items[${i+1}] ไป items[${i}]`,5,i+1,
           `from index ${i+1} → ${i}`);
         temp[i]=temp[i+1];
         steps.push({
           ...arraySnap([...temp],`เลื่อน ${temp[i]} จาก index ${i+1} ไป index ${i}`,i),
           trackLine:5,
           caption:`${temp[i]} : ${i+1} → ${i}`,
           movingLeftFrom:i+1,
           movingLeftTo:i
         });
       }
       temp.pop();
       result.length=0; result.push(...temp);
       addStep(result,`ล้างตำแหน่งท้ายเดิมและลด size = ${size-1}`,5,-1,`size = ${size-1}`);
       addStep(result,`return ${removed}`,5,-1,`Deleted item = ${removed}`,true,false,String(removed));
     }
   }
 }
 else if(op==="isFull"){
   const answer=size===maxlist;
   addStep(old,`size == maxlist → ${size} == ${maxlist}`,1,-1);
   addStep(old,`return ${answer}`,2,-1,`isFull() = ${answer}`,true,false,String(answer));
 }
 else if(op==="isEmpty"){
   const answer=size===0;
   addStep(old,`size == 0 → ${size} == 0`,1,-1);
   addStep(old,`return ${answer}`,2,-1,`isEmpty() = ${answer}`,true,false,String(answer));
 }
 else if(op==="size"){
   addStep(old,`return size = ${size}`,1,-1,`size = ${size}`,true,false,String(size));
 }
 else if(op==="get_index"){
   addStep(old,`รับ item = ${item}`,1,-1,`item = ${item}`);
   addStep(old,`ตรวจสอบ isEmpty(): ${size} == 0`,2,-1);
   if(size===0){
     steps.push({
       ...arraySnap(old,"List is empty !!",-1),
       trackLine:3,
       caption:"List is empty !!",
       blocked:true,
       final:true,
       output:"List is empty !!"
     });
   }else{
     let found=-1;
     for(let i=0;i<size;i++){
       const resultCompare=old[i]===item;
       steps.push({
         ...arraySnap(old,`เปรียบเทียบ items[${i}] == item`,i),
         trackLine:4,
         caption:`${old[i]} == ${item} → ${resultCompare}`,
         showComparePanel:true,
         compareIndex:i,
         compareLeft:old[i],
         compareRight:item,
         compareResult:resultCompare
       });
       if(resultCompare){
         found=i;
         break;
       }
     }
     steps.push({
       ...arraySnap(old,`return ${found}`,found),
       trackLine:found>=0?5:6,
       caption:found>=0?`พบข้อมูลที่ index ${found}`:"ไม่พบข้อมูล",
       final:true,
       output:String(found),
       showComparePanel:true,
       compareIndex:found>=0?found:size-1,
       compareLeft:found>=0?old[found]:old[size-1],
       compareRight:item,
       compareResult:found>=0
     });
   }
 }
 else if(op==="get_item"){
   addStep(old,`ตรวจสอบ isEmpty(): ${size} == 0`,1,-1);
   if(size===0){
     stop("List is empty !!",2,-1);
   }else if(index<0||index>size-1){
     stop("index is error",3,-1);
   }else{
     addStep(old,`return items[${index}] = ${old[index]}`,4,index,`get_item(${index}) = ${old[index]}`,true,false,String(old[index]));
   }
 }
 else if(op==="print_list"){
   addStep(old,`ตรวจสอบ isEmpty(): ${size} == 0`,1,-1);
   if(size===0){
     steps.push({
       ...arraySnap(old,"List is empty !!",-1),
       trackLine:2,
       caption:"List is empty !!",
       blocked:true,
       final:true,
       output:"List is empty !!",
       dataValue:"List is empty !!"
     });
   }else{
     let output="List Member :";
     steps.push({
       ...arraySnap(old,`data = "${output}"`,-1),
       trackLine:3,
       caption:output,
       dataValue:output
     });
     for(let i=0;i<size;i++){
       output += ` ${old[i]}`;
       steps.push({
         ...arraySnap(old,`data = data + " " + items[${i}]`,i),
         trackLine:4,
         caption:`i = ${i} | data = "${output}"`,
         dataValue:output
       });
     }
     steps.push({
       ...arraySnap(old,`return data`,-1),
       trackLine:5,
       caption:`return "${output}"`,
       final:true,
       output:output,
       dataValue:output
     });
   }
 }
 else{
   return false;
 }

 s.steps=steps;
 s.step=0;
 s.pending=result;
 s.view={
   showOutputVariable:op==="print_list",
   dataValue:"",
   showComparePanel:op==="get_index",
   compareIndex:null,
   compareLeft:"",
   compareRight:item,
   compareResult:false
 };
 s.lastOutput="";
 const progress=$("arraylistProgress");
 if(progress)progress.style.width="0%";
 setStatus("arraylist",`เตรียม ${op} แล้ว กด Next Step`);
 addLog("arraylist",`prepare ${op}`);
 render("arraylist");
 return true;
}

function nextArrayListStep(){
 const s=states.arraylist;
 if(!s.steps.length)return setStatus("arraylist","กรุณาเลือกคำสั่งก่อน");
 const st=s.steps[s.step];
 if(!st)return setStatus("arraylist","Animation เสร็จสิ้น");
 s.data=[...st.data];
 s.active=st.active;
 s.view=s.view||{};
 s.view.movingFrom=Number.isInteger(st.movingFrom)?st.movingFrom:null;
 s.view.movingTo=Number.isInteger(st.movingTo)?st.movingTo:null;
 s.view.movingLeftFrom=Number.isInteger(st.movingLeftFrom)?st.movingLeftFrom:null;
 s.view.movingLeftTo=Number.isInteger(st.movingLeftTo)?st.movingLeftTo:null;
 if(Object.prototype.hasOwnProperty.call(st,"dataValue")){
   s.view.showOutputVariable=true;
   s.view.dataValue=st.dataValue;
 }
 if(st.showComparePanel===true){
   s.view.showComparePanel=true;
   s.view.compareIndex=st.compareIndex;
   s.view.compareLeft=st.compareLeft;
   s.view.compareRight=st.compareRight;
   s.view.compareResult=st.compareResult;
 }else if(st.showComparePanel===false){
   s.view.showComparePanel=false;
 }
 if(st.output)s.lastOutput=st.output;
 s.step++;
 const message=st.output?`${st.text} | Output: ${st.output}`:st.text;
 setStatus("arraylist",message);
 highlightLinkedTrack("arraylist",st.trackLine||1);
 addLog("arraylist",`Step ${s.step}: ${message}`);
 const progress=$("arraylistProgress");
 if(progress)progress.style.width=(s.step/s.steps.length*100)+"%";
 render("arraylist");
 if(st.final){
   s.data=st.blocked?[...st.data]:[...s.pending];
   s.steps=[];
   s.step=0;
   s.pending=null;
   const keepOutputPanel=Object.prototype.hasOwnProperty.call(st,"dataValue");
   const keepComparePanel=st.showComparePanel===true;
   s.view={
     showOutputVariable:keepOutputPanel,
     dataValue:keepOutputPanel?st.dataValue:"",
     showComparePanel:keepComparePanel,
     compareIndex:keepComparePanel?st.compareIndex:null,
     compareLeft:keepComparePanel?st.compareLeft:"",
     compareRight:keepComparePanel?st.compareRight:"",
     compareResult:keepComparePanel?st.compareResult:false
   };
   const finalMessage=st.output
     ? `Output: ${st.output}`
     : (st.blocked ? st.text : "ฟังก์ชันทำงานเสร็จสิ้น");
   setTimeout(()=>{render("arraylist");setStatus("arraylist",finalMessage)},350);
 }
}

function operate(id,op){
 const s=states[id],cfg=configs.find(x=>x.id===id),item=val(id);
 let index=idx(id);
 const cap=Math.max(1,Number($(id+"Capacity").value)||6);
 const requestedOp=op;
 s.requestedOp=requestedOp;
 updateFunctionCode(id,requestedOp);

 if(id==="arraylist"){
   const map={add_item:"add_item",add_index:"add_index",delete:"delete",get_index:"get_index",get_item:"get_item",print_list:"print_list"};
   op=map[op]||op;
 }
 if(id==="dll"){
   if(op==="add_first"){op="insert";index=0}
   else if(op==="add_last"){op="append"}
   else if(op==="add_index"){
     if(index<0||index>s.data.length){
       setStatus(id,"index error");
       addLog(id,requestedOp);
       render(id);
       return;
     }
     op="add_index";
   }
   else if(op==="delete_first"){op="delete_index";index=0}
   else if(op==="delete_last"){op="delete_index";index=Math.max(0,s.data.length-1)}
   else if(op==="setposition"){op="setposition"}
   else if(op==="print_dll"){op="print_dll"}
 }
 if(op==="create"){
   states[id]=makeState(id);
   states[id].capacity=id==="arraylist"?5:cap;
   if(id==="arraylist")states[id].data=[];
   if(id==="linearq"||id==="circularq")states[id].data=Array(cap).fill(null);
   if(id==="sll"){
     states[id].data=[10,20,30,40];
     states[id].view={headIndex:0};
     setStatus(id,"create: 10 → 20 → 30 → 40");
   }else if(id==="dll"){
     states[id].data=[10,20,30,40];
     states[id].view={startIndex:0,tailIndex:3};
     setStatus(id,"create: start → 10 ↔ 20 ↔ 30 ↔ 40 ← tail | size = 4");
   }else{
     setStatus(id,cfg.kind==="linked"?"create: head → NULL":`สร้างอาร์เรย์ขนาด ${cap} ช่องแล้ว`);
   }
   addLog(id,"create");
   render(id);
   return
 }
 if(cfg.kind==="linked"&&["add_first","add_last","add_index","append","insert","insert_index","delete_first","delete_last","delete_index","delete_item","setposition","print_list","print_dll","print_backward"].includes(op)){
   prepareLinked(id,op,item,index);
   return
 }
 if(id==="stack"){
   if(op==="push"){if(s.data.length>=s.capacity)return setStatus(id,"Stack Overflow");s.data.push(item);s.top=s.data.length-1;setStatus(id,`push ${item} ลงใน array[${s.top}]`)}
   if(op==="pop"){if(!s.data.length)return setStatus(id,"Stack Underflow");const x=s.data.pop();s.top=s.data.length-1;setStatus(id,`pop ${x}`)}
   if(op==="isFull")setStatus(id,`isFull = ${s.data.length===s.capacity}`);
   if(op==="isEmpty")setStatus(id,`isEmpty = ${s.data.length===0}`);
   if(op==="size")setStatus(id,`size = ${s.data.length}`);
   if(op==="popAll"){const out=[];while(s.data.length)out.push(s.data.pop());s.top=-1;setStatus(id,`popAll: ${out.join(" → ")}`)}
 }
 if(["physicalq","linearq","circularq"].includes(id)){
   const qsize=id==="physicalq"?s.data.length:s.data.filter(v=>v!==null).length;
   if(op==="enqueue"){
     if(qsize>=s.capacity)return setStatus(id,"Queue Overflow");
     if(id==="physicalq"){s.data.push(item);s.front=0;s.rear=s.data.length-1}
     if(id==="linearq"){if(s.rear===s.capacity-1)return setStatus(id,"Queue Overflow");if(s.front===-1)s.front=0;s.rear++;s.data[s.rear]=item}
     if(id==="circularq"){if(s.front===-1)s.front=s.rear=0;else s.rear=(s.rear+1)%s.capacity;s.data[s.rear]=item}
     setStatus(id,`enqueue ${item} ลงใน array[${s.rear}]`);
   }
   if(op==="dequeue"){
     if(s.front===-1)return setStatus(id,"Queue Underflow");
     if(id==="physicalq"){const x=s.data.shift();s.front=s.data.length?0:-1;s.rear=s.data.length-1;setStatus(id,`dequeue ${x} และเลื่อนข้อมูล`)}
     if(id==="linearq"){const x=s.data[s.front];s.data[s.front]=null;if(s.front===s.rear)s.front=s.rear=-1;else s.front++;setStatus(id,`dequeue ${x}`)}
     if(id==="circularq"){const x=s.data[s.front];s.data[s.front]=null;if(s.front===s.rear)s.front=s.rear=-1;else s.front=(s.front+1)%s.capacity;setStatus(id,`dequeue ${x}`)}
   }
   const sizeNow=id==="physicalq"?s.data.length:s.data.filter(v=>v!==null).length;
   if(op==="isFull")setStatus(id,`isFull = ${sizeNow===s.capacity}`);
   if(op==="isEmpty")setStatus(id,`isEmpty = ${sizeNow===0}`);
   if(op==="size")setStatus(id,`size = ${sizeNow}`);
   if(op==="front")setStatus(id,`front = ${s.front===-1?"ไม่มีข้อมูล":s.data[s.front]}`);
   if(op==="rear")setStatus(id,`rear = ${s.rear===-1?"ไม่มีข้อมูล":s.data[s.rear]}`);
   if(op==="print_queue"){let vals=[];if(id==="physicalq")vals=[...s.data];else if(s.front!==-1){let i=s.front;while(true){vals.push(s.data[i]);if(i===s.rear)break;i=id==="circularq"?(i+1)%s.capacity:i+1}}setStatus(id,`front → ${vals.join(" → ")} ← rear`)}
 }
 if(id==="arraylist"){
   if(op!=="print_list"){
     states.arraylist.view.showOutputVariable=false;
     states.arraylist.view.dataValue="";
     states.arraylist.lastOutput="";
   }
   if(op!=="get_index"){
     states.arraylist.view.showComparePanel=false;
     states.arraylist.view.compareIndex=null;
     states.arraylist.view.compareLeft="";
     states.arraylist.view.compareRight="";
     states.arraylist.view.compareResult=false;
   }
   const supported=["create","add_item","add_index","delete","delete_index","delete_item","isFull","isEmpty","size","get_index","get_item","print_list"];
   if(supported.includes(op)){
     if(prepareArrayList(op,item,index))return;
   }
 }
 if(cfg.kind==="linked"){
   if(op==="isEmpty")setStatus(id,`isEmpty = ${s.data.length===0}`);
   if(op==="size")setStatus(id,`size = ${s.data.length}`);
   if(op==="index_of")setStatus(id,`get_index(${item}) = ${s.data.indexOf(item)}`);
   if(op==="setposition" && id==="dll"){
     if(index<0||index>=s.data.length)setStatus(id,"index error");
     else{
       s.view={currentIndex:index,startIndex:s.data.length?0:-1};
       setStatus(id,`setposition(${index}) → node ${index}, data = ${s.data[index]}`);
     }
   }
   if(op==="setposition" && id==="sll"){
     if(index<0||index>s.data.length-1)setStatus(id,"index is error");
     else{
       s.view={currentIndex:index,headIndex:s.data.length?0:-1};
       setStatus(id,`setposition(${index}) → node ${index}, data = ${s.data[index]}`);
     }
   }
   if(op==="get_index" && id==="sll")setStatus(id,`get_index(${item}) = ${s.data.indexOf(item)}`);
   if(op==="print_list" && id==="sll")setStatus(id,s.data.length?`List member : ${s.data.join(" ")}`:"List is empty");
   else if(op==="print_list")setStatus(id,`head → ${s.data.join(cfg.double?" ↔ ":" → ")}${s.data.length?" → NULL":"NULL"}`);
   if(op==="print_dll"&&id==="dll")setStatus(id,s.data.length?`[${s.data.join(", ")}]`:"List is empty");
   if(op==="print_backward"&&cfg.double)setStatus(id,`last → ${[...s.data].reverse().join(" ↔ ")}${s.data.length?" → NULL":"NULL"}`);
 }
 addLog(id,requestedOp);render(id);
}

class DLLModelV2{
  constructor(values=[]){
    this.values=[...values];
    this.size=this.values.length;
  }

  isEmpty(){
    return this.size===0;
  }

  addFirst(value){
    this.values.unshift(value);
    this.size+=1;
  }

  addLast(value){
    this.values.push(value);
    this.size+=1;
  }

  addIndex(deleteIndexBased,value){
    if(this.isEmpty())return {ok:false,message:"List is empty"};
    if(deleteIndexBased<1 || deleteIndexBased>this.size+1){
      return {ok:false,message:"index error"};
    }
    this.values.splice(deleteIndexBased-1,0,value);
    this.size+=1;
    return {ok:true};
  }

  deleteFirst(){
    if(this.isEmpty())return {ok:false,message:"List is empty"};
    const value=this.values.shift();
    this.size-=1;
    return {ok:true,value};
  }

  deleteLast(){
    if(this.isEmpty())return {ok:false,message:"List is empty"};
    const value=this.values.pop();
    this.size-=1;
    return {ok:true,value};
  }

  printDLL(){
    if(this.isEmpty())return {ok:false,message:"List is empty"};
    return {ok:true,value:[...this.values]};
  }
}

class DLLStepGeneratorV2{
  static addFirst(values,item){
    const old=[...values];
    const result=[item,...old];
    const actions=[
      dsAction(DSActionType.CREATE_NODE,{
        line:1,text:`สร้าง newNode และกำหนด data = ${item}`,
        data:result,newNodeIndex:0,active:0,
        pointerDetail:`newNode.data = ${item}`
      }),
      dsAction(DSActionType.SET_NEXT,{
        line:2,text:"newNode.next = start เดิม",
        data:result,newNodeIndex:0,active:0,
        pointerNode:0,pointerField:"next",
        pointerDetail:old.length?`newNode.next = node 2 (data = ${old[0]})`:"newNode.next = None"
      }),
      dsAction(DSActionType.SET_PREV,{
        line:3,text:"newNode.prev = None",
        data:result,newNodeIndex:0,active:0,
        pointerNode:0,pointerField:"prev",
        pointerDetail:"newNode.prev = None"
      })
    ];
    if(old.length){
      actions.push(dsAction(DSActionType.SET_PREV,{
        line:4,text:"start เดิม.prev = newNode",
        data:result,newNodeIndex:0,active:1,
        pointerNode:1,pointerField:"prev",
        pointerDetail:"node 2.prev = newNode (node 1)"
      }));
    }else{
      actions.push(dsAction(DSActionType.CHECK,{
        line:4,text:"start เดิมเป็น None จึงไม่ต้องปรับ previous",
        data:result,newNodeIndex:0,active:0,
        pointerDetail:"start is None"
      }));
    }
    actions.push(
      dsAction(DSActionType.SET_START,{
        line:5,text:"start = newNode",
        data:result,newNodeIndex:0,active:0,
        pointerDetail:"start → newNode (node 1)"
      }),
      dsAction(DSActionType.UPDATE_SIZE,{
        line:6,text:`size = ${result.length}`,
        data:result,active:0,final:true,
        pointerDetail:`size = ${old.length} + 1 = ${result.length}`
      })
    );
    return {actions,result};
  }

  static addLast(values,item){
    const old=[...values];
    if(!old.length)return this.addFirst(values,item);

    const result=[...old,item];
    const last=old.length-1;
    const newIndex=old.length;
    const actions=[
      dsAction(DSActionType.CHECK,{
        line:1,text:"ตรวจสอบ List ไม่ว่าง",data:old,
        tailIndex:last,
        pointerDetail:"isEmpty() = False"
      }),
      dsAction(DSActionType.CREATE_NODE,{
        line:3,text:`สร้าง newNode และกำหนด data = ${item}`,
        data:result,newNodeIndex:newIndex,active:newIndex,
        tailIndex:last,
        pointerDetail:`newNode.data = ${item}`
      }),
      dsAction(DSActionType.SET_PREV,{
        line:4,text:"newNode.prev = tail",
        data:result,newNodeIndex:newIndex,active:newIndex,
        tailIndex:last,
        pointerNode:newIndex,pointerField:"prev",
        pointerDetail:`newNode.prev = tail (node ${last+1})`
      }),
      dsAction(DSActionType.SET_NEXT,{
        line:5,text:"newNode.next = None",
        data:result,newNodeIndex:newIndex,active:newIndex,
        tailIndex:last,
        pointerNode:newIndex,pointerField:"next",
        pointerDetail:"newNode.next = None"
      }),
      dsAction(DSActionType.SET_NEXT,{
        line:6,text:"tail.next = newNode",
        data:result,newNodeIndex:newIndex,active:last,
        tailIndex:last,
        pointerNode:last,pointerField:"next",
        pointerDetail:`node ${last+1}.next = newNode (node ${newIndex+1})`
      }),
      dsAction(DSActionType.MOVE_POINTER,{
        line:7,text:"tail = newNode",
        data:result,newNodeIndex:newIndex,active:newIndex,
        tailIndex:newIndex,
        pointerDetail:`tail → newNode (node ${newIndex+1})`
      }),
      dsAction(DSActionType.UPDATE_SIZE,{
        line:8,text:`size = ${result.length}`,
        data:result,active:newIndex,final:true,
        tailIndex:newIndex,
        pointerDetail:`size = ${old.length} + 1 = ${result.length}`
      })
    ];
    return {actions,result};
  }

  static addIndex(values,index,item){
    const old=[...values];

    if(index<0 || index>old.length){
      return {
        actions:[
          dsAction(DSActionType.CHECK,{
            line:1,
            text:`ตรวจสอบ index = ${index}`,
            data:old,
            pointerDetail:`valid index: 0 ถึง ${old.length}`
          }),
          dsAction(DSActionType.RETURN,{
            line:2,
            text:"index error",
            data:old,
            final:true,
            pointerDetail:'RETURN "index error"'
          })
        ],
        result:old
      };
    }

    if(index===0){
      return this.addFirst(values,item);
    }

    if(index===old.length){
      return this.addLast(values,item);
    }

    const insertArrayIndex=index;
    const previousArrayIndex=index-1;
    const nextArrayIndex=index;

    const result=[...old];
    result.splice(insertArrayIndex,0,item);

    const actions=[
      dsAction(DSActionType.CHECK,{
        line:1,
        text:`ตรวจสอบ index = ${index}`,
        data:old,
        pointerDetail:`valid index: 0 ถึง ${old.length}`
      })
    ];

    for(let i=0;i<=previousArrayIndex;i++){
      actions.push(dsAction(DSActionType.MOVE_POINTER,{
        line:4,
        text:i===0
          ? "current = start"
          : `current = current.next → node ${i}`,
        data:old,
        active:i,
        currentIndex:i,
        pointerDetail:`current → node ${i}`
      }));
    }

    actions.push(
      dsAction(DSActionType.MOVE_POINTER,{
        line:5,
        text:"p = current.next",
        data:old,
        active:nextArrayIndex,
        currentIndex:previousArrayIndex,
        pIndex:nextArrayIndex,
        pointerDetail:`p → node ${nextArrayIndex}`
      }),
      dsAction(DSActionType.CREATE_NODE,{
        line:6,
        text:`สร้าง newNode และกำหนด data = ${item}`,
        data:old,
        currentIndex:previousArrayIndex,
        pIndex:nextArrayIndex,
        floatingNewNode:true,
        floatingNewNodeValue:item,
        pointerDetail:`newNode.data = ${item}`
      }),
      dsAction(DSActionType.SET_NEXT,{
        line:7,
        text:"newNode.next = p",
        data:old,
        currentIndex:previousArrayIndex,
        pIndex:nextArrayIndex,
        floatingNewNode:true,
        floatingNewNodeValue:item,
        pointerDetail:`newNode.next = node ${nextArrayIndex}`
      }),
      dsAction(DSActionType.SET_PREV,{
        line:8,
        text:"newNode.prev = current",
        data:old,
        currentIndex:previousArrayIndex,
        pIndex:nextArrayIndex,
        floatingNewNode:true,
        floatingNewNodeValue:item,
        pointerDetail:`newNode.prev = node ${previousArrayIndex}`
      }),
      dsAction(DSActionType.SET_NEXT,{
        line:9,
        text:"current.next = newNode",
        data:result,
        currentIndex:previousArrayIndex,
        newNodeIndex:insertArrayIndex,
        active:previousArrayIndex,
        pointerNode:previousArrayIndex,
        pointerField:"next",
        pointerDetail:`node ${previousArrayIndex}.next = newNode (node ${insertArrayIndex})`
      }),
      dsAction(DSActionType.SET_PREV,{
        line:10,
        text:"p.prev = newNode",
        data:result,
        currentIndex:previousArrayIndex,
        pIndex:insertArrayIndex+1,
        newNodeIndex:insertArrayIndex,
        active:insertArrayIndex+1,
        pointerNode:insertArrayIndex+1,
        pointerField:"prev",
        pointerDetail:`node ${insertArrayIndex+1}.prev = newNode (node ${insertArrayIndex})`
      }),
      dsAction(DSActionType.UPDATE_SIZE,{
        line:11,
        text:`size = ${result.length}`,
        data:result,
        newNodeIndex:insertArrayIndex,
        active:insertArrayIndex,
        final:true,
        pointerDetail:`size = ${old.length} + 1 = ${result.length}`
      })
    );

    return {actions,result};
  }
}

class StepEngineV2{
  static toLegacyStep(action){
    return {
      data:[...(action.data||[])],
      text:action.text||action.type,
      active:Number.isInteger(action.active)?action.active:-1,
      newIndex:Number.isInteger(action.newNodeIndex)?action.newNodeIndex:-1,
      deleteIndex:-1,
      final:action.final===true,
      linkCreating:-1,
      linkRemoving:-1,
      nextCreating:action.type===DSActionType.SET_NEXT && Number.isInteger(action.pointerNode)
        ? action.pointerNode : -1,
      prevCreating:action.type===DSActionType.SET_PREV && Number.isInteger(action.pointerNode)
        ? action.pointerNode : -1,
      nextRemoving:-1,
      prevRemoving:-1,
      trackLine:action.line||1,
      headIndex:(action.data||[]).length?0:-1,
      newNodeIndex:action.newNodeIndex,
      currentIndex:action.currentIndex,
      pointerNode:action.pointerNode,
      pointerField:action.pointerField,
      pointerDetail:action.pointerDetail,
      tailIndex:action.tailIndex,
      pIndex:action.pIndex,
      previousNodeIndex:action.previousNodeIndex,
      nextNodeIndex:action.nextNodeIndex,
      floatingNewNode:action.floatingNewNode,
      floatingNewNodeValue:action.floatingNewNodeValue,
      caption:action.text||action.type
    };
  }

  static adapt(actions){
    return actions.map(action=>this.toLegacyStep(action));
  }
}

function snap(data,text,active=-1,newIndex=-1,deleteIndex=-1,final=false,linkCreating=-1,linkRemoving=-1,nextCreating=-1,prevCreating=-1,nextRemoving=-1,prevRemoving=-1){
 return {data:[...data],text,active,newIndex,deleteIndex,final,linkCreating,linkRemoving,nextCreating,prevCreating,nextRemoving,prevRemoving};
}

function factorialSteps(n){
 const steps=[];
 function call(x,depth,path){
  const currentPath=[...path,`factorial(${x})`];

  steps.push({
    label:`factorial(${x})`,
    path:currentPath,
    state:"call",
    track:1,
    text:`เรียก factorial(${x})`
  });

  steps.push({
    label:`factorial(${x})`,
    path:currentPath,
    state:"check",
    track:2,
    text:`ตรวจ Base Case: ${x} == 0 ?`
  });

  if(x===0){
    steps.push({
      label:`factorial(${x})`,
      path:currentPath,
      state:"base",
      track:5,
      text:"Base Case เป็นจริง → return 1",
      result:"return 1"
    });
    return 1;
  }

  steps.push({
    label:`factorial(${x})`,
    path:currentPath,
    state:"wait",
    track:3,
    text:`Base Case เป็นเท็จ → เรียก factorial(${x-1})`
  });

  const sub=call(x-1,depth+1,currentPath);
  const result=x*sub;

  steps.push({
    label:`factorial(${x})`,
    path:currentPath,
    state:"multiply",

    result:`${x} × ${sub} = ${result}`
  });

  steps.push({
    label:`factorial(${x})`,
    path:currentPath,
    state:"done",
    track:5,
    text:`คืนค่า factorial(${x}) = ${result}`,
    result:`return ${result}`
  });

function fibonacciSteps(n){

  steps.push({
    label:`fib(${x})`,
    path:currentPath,

  });

  steps.push({
    label:`fib(${x})`,
    path:currentPath,
    state:"check",
    track:2,
    text:`ตรวจ Base Case: ${x} <= 1 ?`
  });

  if(x<=1){
    steps.push({
      label:`fib(${x})`,
      path:currentPath,
      state:"base",
      track:5,
      text:`Base Case เป็นจริง → return ${x}`,
      result:`return ${x}`
    });
    return x;
  }

  steps.push({
    label:`fib(${x})`,
    path:currentPath,
    state:"left",
    track:3,
    text:`Base Case เป็นเท็จ → เรียก fibonacci(${x-1})`
  });
  const a=call(x-1,depth+1,currentPath);

  steps.push({
    label:`fib(${x})`,
    path:currentPath,
    state:"right",
    track:4,
    text:`เรียก fibonacci(${x-2})`

 const mode=$("recMode").value,n=Math.max(0,Math.min(mode==="fibonacci"?7:8,Number($("recN").value)||0));
 setSelectedFunction("recursion",mode);
 Object.assign(recursionState,{mode,n,steps:mode==="factorial"?factorialSteps(n):fibonacciSteps(n),step:0});
 $("recCode").textContent=mode==="factorial"?factorialCode:fibonacciCode;$("recTrack").innerHTML=recursionTrackHTML(mode);
 $("recProgress").style.width="0%";renderRecursion();$("recStatus").textContent="เตรียม Function และ Algorithm Track แล้ว — กด Next Step";
 $("recStepDetail").textContent="ยังไม่เริ่มประมวลผล";
 highlightRecTrack(0);
}
function renderRecursion(){
 const current=recursionState.steps[recursionState.step-1];

 if(!current){
   $("recVisual").innerHTML='<div class="call-summary">ยังไม่เริ่มการเรียกฟังก์ชัน</div>';
   return;
 }

 const path=current.path||[current.label];

 const frames=path.map((label,index)=>{
   const isLast=index===path.length-1;
   const isReturning=isLast && ["done","base","multiply"].includes(current.state);
   const stateClass=isLast ? (isReturning?"returning":"active") : "";

   let returnText="";
   if(isReturning && current.result){
     returnText=`<span class="return-badge">${current.result}</span>`;
   }

   return `<div class="call-frame ${stateClass}">
     ${label}
     ${returnText}
   </div>${index<path.length-1?'<div class="call-down">↓</div>':''}`;
 }).join("");

 const summary=current.result
   ? `<div class="call-summary">ค่าที่ส่งกลับ: ${current.result}</div>`
   : `<div class="call-summary">Current depth = ${path.length}</div>`;

 $("recVisual").innerHTML=`<div class="call-path">${frames}${summary}</div>`;
}
function nextRecursionStep(){
 const st=recursionState.steps[recursionState.step];
 if(!st){
   $("recStatus").textContent="Algorithm Track เสร็จสิ้น";
   $("recStepDetail").textContent="การประมวลผลเสร็จสิ้น";
   stopRecursionAuto();
   return;
 }
 recursionState.step++;
 renderRecursion();
 $("recStatus").textContent=`Step ${recursionState.step} / ${recursionState.steps.length}`;
 $("recStepDetail").textContent=st.text;
 
 highlightRecTrack(st.track);
 $("recProgress").style.width=(recursionState.step/recursionState.steps.length*100)+"%";
}
function toggleRecursionAuto(){
 if(recursionState.timer){stopRecursionAuto();return}
 recursionState.timer=setInterval(nextRecursionStep,Number($("recSpeed").value));$("recAuto").textContent="Pause";
}

function animateSortingMovement(id,st){
 if(!st || (!st.swap && !st.move && !st.keyMove))return;

 const cells=sortingCells(id);
 if(!cells.length)return;

 const byIndex=index=>cells.find(cell=>Number(cell.dataset.sortIndex)===Number(index));
 const duration=Math.max(420,Math.min(900,Number($(id+"Speed")?.value||700)*0.72));

 const animateCell=(cell,fromRect,toRect,className)=>{
   if(!cell||!fromRect||!toRect)return;
   const dx=fromRect.left-toRect.left;
   const dy=fromRect.top-toRect.top-24;

   cell.classList.add(className);
   cell.style.transition="none";
   cell.style.transform=`translate(${dx}px,${dy}px)`;

   requestAnimationFrame(()=>requestAnimationFrame(()=>{
     cell.style.transition=`transform ${duration}ms cubic-bezier(.22,.75,.24,1)`;
     cell.style.transform="translate(0,0)";
   }));

   window.setTimeout(()=>{
     cell.classList.remove(className);
     cell.style.transition="";
     cell.style.transform="";
   },duration+80);
 };

 if(st.swap){
   const [a,b]=st.swap;
   const cellA=byIndex(a),cellB=byIndex(b);
   if(cellA&&cellB){
     const rectA=cellA.getBoundingClientRect();
     const rectB=cellB.getBoundingClientRect();
     cellA.classList.add("swap-source-a");
     cellB.classList.add("swap-source-b");
     animateCell(cellA,rectB,rectA,"swap-moving");
     animateCell(cellB,rectA,rectB,"swap-moving");
     window.setTimeout(()=>{
       cellA.classList.remove("swap-source-a");
       cellB.classList.remove("swap-source-b");
     },duration+100);
   }
 }

 if(st.move){
   const moves=Array.isArray(st.move[0])?st.move:[st.move];
   moves.forEach(([from,to])=>{
     const destination=byIndex(to);
     const source=byIndex(from);
     const fromRect=source?.getBoundingClientRect();
     const toRect=destination?.getBoundingClientRect();
     animateCell(destination,fromRect,toRect,"shift-moving");
   });
 }

 if(st.keyMove){
   const [from,to]=st.keyMove;
   const destination=byIndex(to);
   const source=byIndex(from);
   animateCell(
     destination,
     source?.getBoundingClientRect(),
     destination?.getBoundingClientRect(),
     "key-moving"
   );
 }
}

function heapTreeSvg(arr,heapSize,st={}){
 const values=arr.slice(0,heapSize);
 if(!values.length)return '<div>Heap ว่าง</div>';

 const width=760,height=340;
 const maxLevel=Math.floor(Math.log2(values.length));
 const positions={};

 values.forEach((_,i)=>{
   const level=Math.floor(Math.log2(i+1));
   const first=2**level-1;
   const pos=i-first;
   const count=2**level;
   positions[i]={
     x:(pos+1)*width/(count+1),
     y:42+level*(maxLevel?245/maxLevel:0)
   };
 });

 let edges="";
 values.forEach((_,i)=>{
   if(i===0)return;
   const p=Math.floor((i-1)/2);
   const active=st.compare?.includes(i)&&st.compare?.includes(p);
   edges+=`<line class="tree-edge ${active?"active":""}"
      x1="${positions[p].x}" y1="${positions[p].y}"
      x2="${positions[i].x}" y2="${positions[i].y}"/>`;
 });

 let nodes="";
 values.forEach((v,i)=>{
   const cls=`tree-svg-node ${st.active===i?"active":""}`;
   nodes+=`<g class="${cls}">
     <circle cx="${positions[i].x}" cy="${positions[i].y}" r="27"/>
     <text x="${positions[i].x}" y="${positions[i].y}">${v}</text>
   </g>`;
 });

 return `<svg class="tree-svg" viewBox="0 0 ${width} ${height}">${edges}${nodes}</svg>`;
}



function cloneRecursionTree(tree){
 return JSON.parse(JSON.stringify(tree||[]));
}

function flattenTreeLevels(nodes){
 const levels=[];
 const walk=(node,depth)=>{
   if(!node)return;
   if(!levels[depth])levels[depth]=[];
   levels[depth].push(node);
   (node.children||[]).forEach(child=>walk(child,depth+1));
 };
 nodes.forEach(node=>walk(node,0));
 return levels;
}

function renderRecursionTree(id,tree=[],st={}){
 const title=id==="merge"?"Merge Sort Division Tree":"Quick Sort Partition Tree";
 const levels=flattenTreeLevels(tree);

 const alignmentClass=id==="merge"?"process-left":"process-right";
 const levelHtml=levels.map(level=>
   `<div class="recursion-level ${alignmentClass}">${
     level.map(node=>{
       let cls="recursion-node";
       if(node.id===st.treeNodeId)cls+=" active";
       if(node.done)cls+=" done";
       if(node.pivot!==undefined)cls+=" pivot";
       const arrText=`[${(node.values||[]).join(", ")}]`;
       const info=node.pivot!==undefined?`Pivot = ${node.pivot}`:(node.action||"");
       return `<div class="${cls}">${arrText}${info?`<small>${info}</small>`:""}</div>`;
     }).join("")
   }</div>`
 ).join("");

 const meta=id==="merge"
   ? `<div class="recursion-tree-meta">
        <div class="recursion-meta-card"><strong>Current Level</strong>${st.level ?? "-"}</div>
        <div class="recursion-meta-card"><strong>Current Subarray</strong>[${(st.subarray||[]).join(", ")}]</div>
        <div class="recursion-meta-card"><strong>Action</strong>${st.treeAction||"-"}</div>
      </div>`
   : `<div class="recursion-tree-meta">
        <div class="recursion-meta-card"><strong>Current Level</strong>${st.level ?? "-"}</div>
        <div class="recursion-meta-card"><strong>Current Subarray</strong>[${(st.subarray||[]).join(", ")}]</div>
        <div class="recursion-meta-card"><strong>Pivot</strong>${st.pivotValue ?? "-"}</div>
      </div>`;

 return `<div class="recursion-tree-wrap">
   <div class="recursion-tree-title">${title}</div>
   <div class="recursion-tree">${levelHtml||"<div>-</div>"}</div>
   ${meta}
 </div>`;
}

function bstInsert(root,value){
 if(root===null)return {value,left:null,right:null};
 if(value<root.value)root.left=bstInsert(root.left,value);
 else if(value>root.value)root.right=bstInsert(root.right,value);
 return root;
}
function bstToArray(root){
 if(!root)return [];
 const out=[],q=[{n:root,i:0}];
 while(q.length){const {n,i}=q.shift();out[i]=n?n.value:null;if(n){q.push({n:n.left,i:2*i+1},{n:n.right,i:2*i+2})}}
 while(out.length&&out.at(-1)===null)out.pop();return out;
}
function arrayToBST(arr){let root=null;arr.filter(v=>v!==null).forEach(v=>root=bstInsert(root,v));return root}
function bstDelete(root,key){
 if(!root)return root;
 if(key<root.value)root.left=bstDelete(root.left,key);
 else if(key>root.value)root.right=bstDelete(root.right,key);
 else{
  if(!root.left)return root.right;if(!root.right)return root.left;
  let min=root.right;while(min.left)min=min.left;root.value=min.value;root.right=bstDelete(root.right,min.value);
 }
 return root;
}

function calculateHashIndex(key,tableSize,method){
 const safeSize=Math.max(1,tableSize);
 const absKey=Math.abs(Math.trunc(key));

 if(method==="multiplication"){
   const A=0.6180339887;
   const product=absKey*A;
   const fraction=product-Math.floor(product);
   const index=Math.floor(safeSize*fraction);
   return {
     index,
     methodName:"Multiplication Method",
     formula:`h(${key}) = floor(${safeSize} × frac(${absKey} × ${A.toFixed(4)}))`,
     substitution:`${absKey} × ${A.toFixed(4)} = ${product.toFixed(4)}, frac = ${fraction.toFixed(4)}`,
     result:`h(${key}) = floor(${safeSize} × ${fraction.toFixed(4)}) = ${index}`
   };
 }

 if(method==="midSquare"){
   const square=absKey*absKey;
   const digits=String(square);
   const width=Math.max(1,String(safeSize-1).length);
   const start=Math.max(0,Math.floor((digits.length-width)/2));
   const middle=digits.substring(start,start+width) || "0";
   const raw=Number(middle);
   const index=raw % safeSize;
   return {
     index,
     methodName:"Mid-Square Method",
     formula:`h(${key}) = middleDigits(${absKey}²) mod ${safeSize}`,
     substitution:`${absKey}² = ${square}, middle digits = ${middle}`,
     result:`h(${key}) = ${raw} mod ${safeSize} = ${index}`
   };
 }

 const index=((Math.trunc(key)%safeSize)+safeSize)%safeSize;
 return {
   index,
   methodName:"Division Method",
   formula:`h(${key}) = ${key} mod ${safeSize}`,
   substitution:`${key} % ${safeSize}`,
   result:`h(${key}) = ${index}`
 };
}

 `;
}

   });
    if(op==="delete"){
     root=bstDelete(root,value);
     const arr=bstToArray(root);
     s.steps.push({
       data:arr,
       line:5,

 }
 if(cfg.structure==="avl"){
   setStructureTrack(id,"avl",op);
   if(op==="create"){
     const values=randomUniqueNumbers(4);
     const root=avlFromArray(values);
     const arr=avlToArray(root);
     s.data=[...arr];
     s.initialValues=[...values];
     s.steps=[
       {data:[],line:1,text:"กำหนด root = NULL",detail:`Initial Data: ${values.join(", ")}`},
       {data:[...arr],line:2,text:`สุ่มข้อมูลเริ่มต้น 4 จำนวน: ${values.join(", ")}`,detail:`Initial Data: ${values.join(", ")}`},

     ];
   }else{

     if(op==="add"){
