     }
   }
 }
 if(cfg.structure==="heap"){
   setStructureTrack(id,"heap",op);
   if(op==="create"){
    const values=randomUniqueNumbers(4);
    const heap=buildMaxHeap(values);
    s.data=[...heap];
    s.steps=[
      {data:[],line:1,text:"สร้าง Max Heap"},
      {data:[...values],line:2,text:`สุ่มข้อมูลเริ่มต้น 4 จำนวน: ${values.join(", ")}`},
      {data:[...heap],line:3,text:`จัดรูปแบบ Max Heap: ${heap.join(", ")}`}
    ];
   }
   if(op==="add"){
    let a=[...s.data,value],i=a.length-1,c=0,w=0;s.steps.push({data:[...a],active:i,line:1,text:`เพิ่ม ${value} ที่ท้าย Heap`,comparisons:c,swaps:w});
    while(i>0){let p=Math.floor((i-1)/2);c++;s.steps.push({data:[...a],active:i,line:2,text:`เปรียบเทียบ ${a[i]} กับ parent ${a[p]}`,comparisons:c,swaps:w});if(a[i]<=a[p])break;[a[i],a[p]]=[a[p],a[i]];w++;i=p;s.steps.push({data:[...a],active:i,line:3,text:"Swap ขึ้นเพื่อรักษา Max-Heap",comparisons:c,swaps:w})}
   }
   if(op==="search"){
     const heap=[...s.data];
     const pending=heap.length?[0]:[];
     const visited=[];
     let comparisons=0;
     let foundIndex=-1;

     s.steps.push({
       data:heap,
       active:heap.length?0:-1,
       line:1,
       text:heap.length
         ? `เริ่มค้นหา ${value} จาก root ที่ index 0`
         : "Heap ว่าง ไม่สามารถค้นหาได้",
       detail:heap.length
         ? `Target = ${value} | Pending indices = [0] | Visited = []`
         : `Target = ${value} | Heap is empty`,
       comparisons
     });

     while(pending.length && foundIndex===-1){
       const current=pending.shift();
       if(current>=heap.length || visited.includes(current))continue;
       visited.push(current);

       s.steps.push({
         data:heap,
         active:current,
         line:2,
         text:`นำ index ${current} ออกจากรายการรอตรวจ`,
         detail:`Current index = ${current} | Current value = ${heap[current]} | Pending = [${pending.join(", ")}] | Visited = [${visited.join(", ")}]`,
         comparisons
       });

       comparisons++;
       s.steps.push({
         data:heap,
         active:current,
         line:3,
         text:`เปรียบเทียบ target ${value} กับ heap[${current}] = ${heap[current]}`,
         detail:`Comparison ${comparisons}: ${value} == ${heap[current]} → ${value===heap[current]}`,
         comparisons
       });

       if(value===heap[current]){
         foundIndex=current;
         s.steps.push({
           data:heap,
           active:current,
           found:current,
           line:4,
           text:`พบ ${value} ที่ index ${current}`,
           detail:`Search success | heap[${current}] = ${value} | ตรวจทั้งหมด ${comparisons} ครั้ง`,
           comparisons
         });
         break;
       }

       if(value>heap[current]){
         s.steps.push({
           data:heap,
           active:current,
           line:5,
           text:`${value} > ${heap[current]} จึงไม่ต้องตรวจลูกของโหนดนี้`,
           detail:`Prune subtree at index ${current}: Max Heap รับประกันว่าลูกหลานทุกค่าจะไม่มากกว่า ${heap[current]}`,
           comparisons
         });
         continue;
       }

       const left=2*current+1;
       const right=2*current+2;
       const children=[];
       if(left<heap.length){pending.push(left);children.push(`left index ${left} (${heap[left]})`);}
       if(right<heap.length){pending.push(right);children.push(`right index ${right} (${heap[right]})`);}

       s.steps.push({
         data:heap,
         active:current,
         line:6,
         text:children.length
           ? `เพิ่ม ${children.join(" และ ")} เข้ารายการรอตรวจ`
           : `โหนด index ${current} ไม่มีลูกให้ตรวจต่อ`,
         detail:`Target ${value} < ${heap[current]} | Pending = [${pending.join(", ")}]`,
         comparisons
       });

       s.steps.push({
         data:heap,
         active:pending.length?pending[0]:current,
         line:7,
         text:pending.length
           ? `ดำเนินการค้นหาต่อที่ index ${pending[0]}`
           : `ไม่มีโหนดเหลือในรายการรอตรวจ`,
         detail:`Pending = [${pending.join(", ")}] | Visited = [${visited.join(", ")}]`,
         comparisons
       });
     }

     if(foundIndex===-1){
       s.steps.push({
         data:heap,
         active:-1,
         found:-1,
         line:7,
         text:heap.length?`ไม่พบ ${value} ใน Heap`:"Heap ว่าง",
         detail:`Search complete | Target = ${value} | Visited indices = [${visited.join(", ")}] | Comparisons = ${comparisons}`,
         comparisons
       });
     }
   }
   if(op==="peek")s.steps=[{
     data:[...s.data],
     found:s.data.length?0:-1,
     line:2,
     text:s.data.length?`Max = ${s.data[0]}`:"Heap ว่าง"
   }];
   if(op==="extract"||op==="delete"){
    let a=[...s.data];if(!a.length)s.steps=[{data:a,line:5,text:"Heap ว่าง"}];
    else{const removed=op==="delete"?value:a[0],target=op==="delete"?a.indexOf(value):0;if(target<0)s.steps=[{data:a,line:5,text:`ไม่พบ ${value}`}];
    else{a[target]=a.at(-1);a.pop();let i=target,c=0,w=1;s.steps.push({data:[...a],active:i,line:1,text:`ลบ ${removed} แล้วนำค่าท้ายมาแทน`,swaps:w});while(true){let l=2*i+1,r=2*i+2,b=i;if(l<a.length){c++;if(a[l]>a[b])b=l}if(r<a.length){c++;if(a[r]>a[b])b=r}if(b===i)break;[a[i],a[b]]=[a[b],a[i]];w++;i=b;s.steps.push({data:[...a],active:i,line:3,text:"Swap ลงเพื่อรักษา Max-Heap",comparisons:c,swaps:w})}}}
   }
 }
 if(cfg.structure==="hash"){
   setStructureTrack(id,"hash",op);
   const size=Math.max(3,Number($(id+"Capacity").value)||7);
   const method=$(id+"HashMethod")?.value||"division";
   const methodText=$(id+"HashMethod")?.selectedOptions?.[0]?.text||method;
   if(op==="create"){
     const values=randomUniqueNumbers(4);
     s.capacity=size;
     s.data=buildHashBuckets(values,size,method);
     if($("hashFormula"))$("hashFormula").innerHTML=`วิธี: ${methodText}<br>Table Size = ${size}<br>Initial Data = ${values.join(", ")}`;
     s.steps=[
       {data:Array.from({length:size},()=>[]),line:1,text:`เลือกวิธี ${methodText}`},
       {data:Array.from({length:size},()=>[]),line:2,text:`กำหนด table size = ${size}`},
       {data:Array.from({length:size},()=>[]),line:3,text:`สุ่มข้อมูลเริ่มต้น 4 จำนวน: ${values.join(", ")}`},
       {data:JSON.parse(JSON.stringify(s.data)),line:4,text:"คำนวณ Hash Index และใส่ข้อมูลลง Bucket"},
       {data:JSON.parse(JSON.stringify(s.data)),line:5,text:"Hash Table พร้อมใช้งาน"}
     ];
   }else{
     if(!s.data.length)s.data=Array.from({length:size},()=>[]);
     const calc=calculateHashIndex(value,s.data.length,method),h=calc.index;
     showHashCalculation(calc);
     s.steps.push({data:JSON.parse(JSON.stringify(s.data)),bucket:h,line:1,text:`รับ key = ${value}`});
     s.steps.push({data:JSON.parse(JSON.stringify(s.data)),bucket:h,line:2,text:calc.formula});
     s.steps.push({data:JSON.parse(JSON.stringify(s.data)),bucket:h,line:3,text:`${calc.substitution} → ${calc.result}`});
     if(op==="add"){
       const t=JSON.parse(JSON.stringify(s.data)),collision=t[h].length>0;
       s.steps.push({data:JSON.parse(JSON.stringify(s.data)),bucket:h,line:4,text:`เลือก Bucket ${h}${collision?" และพบ Collision":""}`});
       t[h].push(value);
       s.steps.push({data:t,bucket:h,item:t[h].length-1,line:5,text:`เพิ่ม ${value} ลง Bucket ${h}`});
     }
     if(op==="search"){
       const j=s.data[h].indexOf(value);
       s.steps.push({data:JSON.parse(JSON.stringify(s.data)),bucket:h,line:4,text:`ค้นหาใน Bucket ${h}`});
       s.steps.push({data:JSON.parse(JSON.stringify(s.data)),bucket:h,item:j,line:5,text:j>=0?`พบ ${value}`:`ไม่พบ ${value}`});
     }
     if(op==="delete"){
       const t=JSON.parse(JSON.stringify(s.data)),j=t[h].indexOf(value);
       s.steps.push({data:JSON.parse(JSON.stringify(s.data)),bucket:h,line:4,text:`ค้นหาใน Bucket ${h}`});
       if(j>=0)t[h].splice(j,1);
       s.steps.push({data:t,bucket:h,line:5,text:j>=0?`ลบ ${value}`:`ไม่พบ ${value}`});
     }
     if(op==="print")s.steps.push({data:JSON.parse(JSON.stringify(s.data)),line:3,text:"แสดง Hash Table ทั้งหมด"});
   }
 }
 $(id+"Progress").style.width="0%";updateAlgorithmDashboard(id);renderAlgorithmModule(id,{});setStatus(id,`เตรียม ${op} แล้ว`);
}

function showTraversal(id,type){
 const s=states[id];
 const cfg=configs.find(x=>x.id===id);
 const root=cfg?.structure==="avl"?avlFromArray(s.data):arrayToBST(s.data);
 setSelectedFunction(id,type);

 setStructureTrack(id,cfg?.structure==="avl"?"avl":"bst",type);
 stopAlgorithmAuto(id);
 s.steps=[];
 s.step=0;
 s.comparisons=0;
 s.swaps=0;

 const output=[];

 function walk(node,index){
   if(!node)return;

   if(type==="preorder"){
     output.push(node.value);
     s.steps.push({
       data:[...s.data],
       active:index,
       found:index,
       line:1,
       text:`Visit ${node.value}`,
       detail:`Output: ${output.join(" → ")}`
     });
   }

   if(node.left){
     s.steps.push({
       data:[...s.data],
       active:index,
       line:type==="preorder"?2:1,
       text:`เดินจาก ${node.value} ไป Left child ${node.left.value}`,
       detail:`Output: ${output.join(" → ")}`
     });
   }
   walk(node.left,2*index+1);

   if(type==="inorder"){
     output.push(node.value);
     s.steps.push({
       data:[...s.data],
       active:index,
       found:index,
       line:2,
       text:`Visit ${node.value}`,
       detail:`Output: ${output.join(" → ")}`
     });
   }

   if(node.right){
     s.steps.push({
       data:[...s.data],
       active:index,
       line:type==="postorder"?2:3,
       text:`เดินจาก ${node.value} ไป Right child ${node.right.value}`,
       detail:`Output: ${output.join(" → ")}`
     });
   }
   walk(node.right,2*index+2);

   if(type==="postorder"){
     output.push(node.value);
     s.steps.push({
       data:[...s.data],
       active:index,
       found:index,
       line:3,
       text:`Visit ${node.value}`,
       detail:`Output: ${output.join(" → ")}`
     });
   }
 }

 walk(root,0);

 s.steps.push({
   data:[...s.data],
   line:4,
   text:`${type}: ${output.join(" → ")}`,
   detail:`Traversal complete`
 });

 updateAlgorithmDashboard(id);
 renderAlgorithmModule(id,{});
 setStatus(id,`เตรียม ${type} traversal แล้ว — กด Next Step`);
}

function sortingTrack(algo){
 const tracks={
  selection:["กำหนดตำแหน่งปัจจุบัน","ค้นหาค่าน้อยสุด","เปรียบเทียบ","Swap","ขยายส่วน Sorted"],
  insertion:["เลือก key","เปรียบเทียบทางซ้าย","Shift ค่าใหญ่กว่า","วาง key","ขยาย Sorted prefix"],
  bubble:["เริ่มรอบ","เปรียบเทียบค่าติดกัน","Swap หากผิดลำดับ","ค่ามากสุดไปท้าย","จบรอบ"],
  radix:["เลือกหลักหน่วย/สิบ/ร้อย","กระจายลง bucket","รวบรวมจาก bucket","เปลี่ยนหลัก","เสร็จสิ้น"],
  merge:["แบ่ง Array","แบ่งจนเหลือ 1 ค่า","เปรียบเทียบสองครึ่ง","Merge","เสร็จสิ้น"],
  quick:["เลือก Pivot","แบ่งค่าต่ำกว่า/สูงกว่า","เปรียบเทียบ","วาง Pivot","เรียงส่วนย่อย"],
  heapsort:["สร้าง Max Heap","เปรียบเทียบ Parent กับ Children","Swap เพื่อ Heapify","ย้ายค่าสูงสุดไปท้าย","ลดขนาด Heap และทำซ้ำ"]
 };return tracks[algo];
}

function randomizeSortingData(id,count=6,min=1,max=99){
 const values=[];
 while(values.length<count){
   const value=Math.floor(Math.random()*(max-min+1))+min;
   if(!values.includes(value))values.push(value);
 }
 const input=$(id+"Data");
 if(input)input.value=values.join(",");
 prepareSorting(id);
 setStatus(id,`สุ่มข้อมูลใหม่: ${values.join(", ")}`);
}

function prepareSorting(id){
 if(id==="insertion")resetInsertionKeyPanel();
 stopAlgorithmAuto(id);

 const s=states[id];
 const cfg=configs.find(x=>x.id===id);
 setSelectedFunction(id,cfg.algorithm);
 const order=$(id+"Order")?.value||"asc";
 const ascending=order==="asc";
 const a=parseListValue(id);

 s.steps=[];
 s.step=0;
 s.comparisons=0;
 s.swaps=0;
 s.data=[...a];
 s.recursionTree=[];

 setAlgorithmTrack(id,sortingTrack(cfg.algorithm));

 let arr=[...a],c=0,w=0;

 if(cfg.algorithm==="selection"){
   for(let i=0;i<arr.length-1;i++){
     let min_index=i;

     s.steps.push({
       data:[...arr],
       active:i,
       selectedIndex:min_index,
       selectedValue:arr[min_index],
       pass:i+1,
       line:1,
       text:`เริ่ม pass ${i+1}: เลือก ${arr[min_index]} เป็นค่าเริ่มต้น`,
       comparisons:c,
       swaps:w
     });

     for(let j=i+1;j<arr.length;j++){
       c++;

       s.steps.push({
         data:[...arr],
         compare:[min_index,j],
         selectedIndex:min_index,
         selectedValue:arr[min_index],
         pass:i+1,
         line:3,
         text:`เปรียบเทียบ ${arr[j]} กับค่าที่เลือก ${arr[min_index]}`,
         comparisons:c,
         swaps:w
       });

       const better=ascending ? arr[j]<arr[min_index] : arr[j]>arr[min_index];

       if(better){
         min_index=j;
         s.steps.push({
           data:[...arr],
           active:min_index,
           selectedIndex:min_index,
           selectedValue:arr[min_index],
           pass:i+1,
           line:2,
           text:`เปลี่ยนค่าที่เลือกเป็น ${arr[min_index]} ที่ index ${min_index}`,
           comparisons:c,
           swaps:w
         });
       }
     }

     if(min_index!==i){
       const swapA=i,swapB=min_index;
       [arr[i],arr[min_index]]=[arr[min_index],arr[i]];
       w++;

       s.steps.push({
         data:[...arr],
         swap:[swapA,swapB],
         sorted:[...Array(i+1).keys()],
         selectedIndex:i,
         selectedValue:arr[i],
         pass:i+1,
         line:4,
         text:`สลับค่าที่เลือก ${arr[i]} มาไว้ที่ index ${i}`,
         comparisons:c,
         swaps:w
       });
     }else{
       s.steps.push({
         data:[...arr],
         sorted:[...Array(i+1).keys()],
         selectedIndex:i,
         selectedValue:arr[i],
         pass:i+1,
         line:5,
         text:`ค่าที่เลือกอยู่ในตำแหน่งที่ถูกต้องแล้ว`,
         comparisons:c,
         swaps:w
       });
     }
   }

   s.steps.push({
     data:[...arr],
     sorted:[...Array(arr.length).keys()],
     selectedIndex:-1,
     selectedValue:"Done",
     pass:arr.length-1,
     line:5,
     text:`เรียงแบบ ${ascending?"น้อยไปมาก":"มากไปน้อย"} เสร็จสิ้น`,
     comparisons:c,
     swaps:w
   });
 }

 if(cfg.algorithm==="insertion"){
   for(let i=1;i<arr.length;i++){
     let key=arr[i],j=i-1;
     s.steps.push({data:[...arr],active:i,keyValue:key,keyOriginal:i,compareIndex:j,insertPosition:i,keyStatus:"เลือก Key",line:1,text:`เลือก key = ${key} จาก index ${i}`,comparisons:c,swaps:w});
     while(j>=0){
       c++;
       s.steps.push({data:[...arr],compare:[j,j+1],keyValue:key,keyOriginal:i,compareIndex:j,insertPosition:j+1,keyStatus:"กำลังเปรียบเทียบ",line:2,text:`เปรียบเทียบ ${arr[j]} กับ key ${key}`,comparisons:c,swaps:w});
       const shouldShift=ascending ? arr[j]>key : arr[j]<key;
       if(shouldShift){
         const shiftFrom=j,shiftTo=j+1;
         arr[j+1]=arr[j];w++;
         s.steps.push({data:[...arr],move:[shiftFrom,shiftTo],active:j+1,keyValue:key,keyOriginal:i,compareIndex:j,insertPosition:j,keyStatus:"กำลัง Shift",line:3,text:`Shift ${arr[j]} จาก index ${shiftFrom} → ${shiftTo}`,comparisons:c,swaps:w});
         j--;
       }else{
         s.steps.push({data:[...arr],keyValue:key,keyOriginal:i,compareIndex:j,insertPosition:j+1,keyStatus:"หยุดการเลื่อน",line:2,text:`หยุด Shift และเตรียมวาง key ${key} ที่ index ${j+1}`,comparisons:c,swaps:w});
         break;
       }
     }
     arr[j+1]=key;
     s.steps.push({data:[...arr],keyMove:[i,j+1],active:j+1,sorted:[...Array(i+1).keys()],keyValue:key,keyOriginal:i,compareIndex:j,insertPosition:j+1,keyStatus:"Inserted",line:4,text:`วาง key ${key} จาก index ${i} → ${j+1}`,comparisons:c,swaps:w});
   }
 }

 if(cfg.algorithm==="bubble"){
   for(let p=0;p<arr.length-1;p++){
     for(let j=0;j<arr.length-1-p;j++){
       c++;
       s.steps.push({data:[...arr],compare:[j,j+1],outerIndex:p,innerIndex:j,pass:p+1,line:2,text:`เปรียบเทียบ ${arr[j]} กับ ${arr[j+1]}`,comparisons:c,swaps:w});
       const shouldSwap=ascending ? arr[j]>arr[j+1] : arr[j]<arr[j+1];
       if(shouldSwap){
         const swapA=j,swapB=j+1;
         [arr[j],arr[j+1]]=[arr[j+1],arr[j]];
         w++;
         s.steps.push({data:[...arr],swap:[swapA,swapB],compare:[swapA,swapB],outerIndex:p,innerIndex:j,pass:p+1,line:3,text:`Swap index ${j} ↔ ${j+1}`,comparisons:c,swaps:w});
       }
     }
   }
 }

 if(cfg.algorithm==="radix"){
   const nonNegative=arr.every(v=>v>=0);
   if(!nonNegative){
     s.steps=[{data:[...arr],line:5,text:"Radix Sort เวอร์ชันนี้รองรับจำนวนเต็มไม่ติดลบเท่านั้น"}];
   }else{
     let max=Math.max(...arr,0),exp=1,pass=1;

     while(Math.floor(max/exp)>0){
       let buckets=Array.from({length:10},()=>[]);

       s.steps.push({
         data:[...arr],
         buckets:buckets.map(b=>[...b]),
         exp,
         line:1,
         text:`เริ่มรอบ ${pass}: พิจารณาหลัก ${exp}`,
         comparisons:c,
         swaps:w
       });

       arr.forEach((value,index)=>{
         const digit=Math.floor(value/exp)%10;
         buckets[digit].push(value);

         s.steps.push({
           data:[...arr],
           active:index,
           buckets:buckets.map(b=>[...b]),
           activeBucket:digit,
           activeItem:buckets[digit].length-1,
           exp,
           line:2,
           text:`นำ ${value} ลง Bucket ${digit}`,
           comparisons:c,
           swaps:w
         });
       });

       arr=buckets.flat();
       w+=arr.length;

       s.steps.push({
         data:[...arr],
         buckets:buckets.map(b=>[...b]),
         exp,
         line:3,
         text:`รวบรวมข้อมูลจาก Bucket 0 → 9`,
         comparisons:c,
         swaps:w
       });

       s.steps.push({
         data:[...arr],
         sorted:Math.floor(max/(exp*10))===0?[...Array(arr.length).keys()]:[],
         buckets:Array.from({length:10},()=>[]),
         exp,
         line:4,
         text:`จบรอบ ${pass}: ได้ [${arr.join(", ")}]`,
         comparisons:c,
         swaps:w
       });

       exp*=10;
       pass++;
     }

     if(!ascending){
       arr.reverse();
       w+=arr.length;
       s.steps.push({
         data:[...arr],
         sorted:[...Array(arr.length).keys()],
         buckets:Array.from({length:10},()=>[]),
         exp:exp/10,
         line:5,
         text:`กลับลำดับเพื่อเรียงจากมากไปน้อย`,
         comparisons:c,
         swaps:w
       });
     }
   }
 }

 if(cfg.algorithm==="merge"){
   let nodeCounter=0;
   const rootNodes=[];

   function mergeSortVisual(values,level=0,parentList=rootNodes){
     const node={
       id:`merge-${nodeCounter++}`,
       values:[...values],
       level,
       action:values.length<=1?"Base Case":"Split",
       done:false,
       children:[]
     };
     parentList.push(node);

     s.steps.push({
       data:[...values],
       recursionTree:cloneRecursionTree(rootNodes),
       treeNodeId:node.id,
       level,
       subarray:[...values],
       treeAction:values.length<=1?"Base Case":"Split",
       line:1,
       text:`ระดับ ${level}: แสดงและแบ่งข้อมูล [${values.join(", ")}]`,
       comparisons:c,
       swaps:w
     });

     if(values.length<=1){
       node.done=true;
       return [...values];
     }

     const mid=Math.floor(values.length/2);
     const left=mergeSortVisual(values.slice(0,mid),level+1,node.children);
     const right=mergeSortVisual(values.slice(mid),level+1,node.children);

     const merged=[];
     let i=0,j=0;
     while(i<left.length && j<right.length){
       c++;
       if((ascending && left[i]<=right[j]) || (!ascending && left[i]>=right[j])){
         merged.push(left[i++]);
       }else{
         merged.push(right[j++]);
       }
     }
     merged.push(...left.slice(i),...right.slice(j));

     node.values=[...merged];
     node.action="Merge";
     node.done=true;
     w+=merged.length;

     s.steps.push({
       data:[...merged],
       recursionTree:cloneRecursionTree(rootNodes),
       treeNodeId:node.id,
       level,
       subarray:[...merged],
       treeAction:`Merge [${left.join(", ")}] + [${right.join(", ")}]`,
       line:4,
       text:`Merge เป็น [${merged.join(", ")}]`,
       comparisons:c,
       swaps:w
     });

     return merged;
   }

   arr=mergeSortVisual([...arr]);
   s.recursionTree=[];

   s.steps.push({
     data:[...arr],
     recursionTree:cloneRecursionTree(rootNodes),
     treeNodeId:rootNodes[0]?.id,
     level:0,
     subarray:[...arr],
     treeAction:"Complete",
     sorted:[...Array(arr.length).keys()],
     line:5,
     text:"Merge Sort เสร็จสิ้น",
     comparisons:c,
     swaps:w
   });
 }

 if(cfg.algorithm==="quick"){
   let nodeCounter=0;
   let quickRound=0;
   const quickRoundHistory=[];
   const rootNodes=[];

   function quickVisual(values,level=0,parentList=rootNodes){
     if(values.length===0)return [];

     const pivotIndex=values.length-1;
     const pivot=values[pivotIndex];
     const node={
       id:`quick-${nodeCounter++}`,
       values:[...values],
       level,
       pivot,
       done:false,
       children:[]
     };
     parentList.push(node);

     s.steps.push({
       data:[...values],
       recursionTree:cloneRecursionTree(rootNodes),
       treeNodeId:node.id,
       level,
       subarray:[...values],
       pivotValue:pivot,
       pivot:pivotIndex,
       leftPointer:0,
       rightPointer:Math.max(0,pivotIndex-1),
       compareNote:`กำหนด Pivot = ${pivot} และเริ่มตัวชี้ L / R`,
       line:1,
       text:`ระดับ ${level}: เลือก pivot = ${pivot}`,
       comparisons:c,
       swaps:w
     });

     if(values.length<=1){
       node.done=true;
       return [...values];
     }

     let left=0;
     let right=pivotIndex-1;
     const work=[...values];

     while(left<=right){
       while(left<=right){
         c++;
         s.steps.push({
           data:[...work],
           recursionTree:cloneRecursionTree(rootNodes),
           treeNodeId:node.id,
           level,
           subarray:[...work],
           pivotValue:pivot,
           pivot:pivotIndex,
           leftPointer:left,
           rightPointer:right,
           compare:[left,pivotIndex],
           compareNote:`L เปรียบเทียบ ${work[left]} กับ Pivot ${pivot}`,
           line:2,
           text:`L: เปรียบเทียบ ${work[left]} กับ pivot ${pivot}`,
           comparisons:c,
           swaps:w
         });

         const stopLeft=ascending ? work[left]>=pivot : work[left]<=pivot;
         if(stopLeft)break;
         left++;
       }

       while(left<=right){
         c++;
         s.steps.push({
           data:[...work],
           recursionTree:cloneRecursionTree(rootNodes),
           treeNodeId:node.id,
           level,
           subarray:[...work],
           pivotValue:pivot,
           pivot:pivotIndex,
           leftPointer:left,
           rightPointer:right,
           compare:[right,pivotIndex],
           compareNote:`R เปรียบเทียบ ${work[right]} กับ Pivot ${pivot}`,
           line:2,
           text:`R: เปรียบเทียบ ${work[right]} กับ pivot ${pivot}`,
           comparisons:c,
           swaps:w
         });

         const stopRight=ascending ? work[right]<=pivot : work[right]>=pivot;
         if(stopRight)break;
         right--;
       }

       if(left<right){
         const a=left,b=right;
         [work[a],work[b]]=[work[b],work[a]];
         w++;

         s.steps.push({
           data:[...work],
           recursionTree:cloneRecursionTree(rootNodes),
           treeNodeId:node.id,
           level,
           subarray:[...work],
           pivotValue:pivot,
           pivot:pivotIndex,
           leftPointer:left,
           rightPointer:right,
           swap:[a,b],
           compare:[a,b],
           compareNote:`สลับค่าที่ L และ R ก่อนแบ่งข้อมูล`,
           line:3,
           text:`Swap index ${a} ↔ ${b}`,
           comparisons:c,
           swaps:w
         });

         left++;
         right--;
       }else{
         break;
       }
     }

     const pivotTarget=left;
     if(pivotTarget!==pivotIndex){
       [work[pivotTarget],work[pivotIndex]]=[work[pivotIndex],work[pivotTarget]];
       w++;

       s.steps.push({
         data:[...work],
         recursionTree:cloneRecursionTree(rootNodes),
         treeNodeId:node.id,
         level,
         subarray:[...work],
         pivotValue:pivot,
         pivot:pivotTarget,
         leftPointer:pivotTarget,
         rightPointer:right,
         swap:[pivotTarget,pivotIndex],
         compare:[pivotTarget,pivotIndex],
         compareNote:`นำ Pivot ไปวางที่ตำแหน่งแบ่ง`,
         line:4,
         text:`วาง pivot ${pivot} ที่ index ${pivotTarget}`,
         comparisons:c,
         swaps:w
       });
     }

     const leftValues=work.slice(0,pivotTarget);
     const rightValues=work.slice(pivotTarget+1);

     s.steps.push({
       data:[...work],
       recursionTree:cloneRecursionTree(rootNodes),
       treeNodeId:node.id,
       level,
       subarray:[...work],
       pivotValue:pivot,
       pivot:pivotTarget,
       leftPointer:pivotTarget,
       rightPointer:pivotTarget,
       treeAction:`Left [${leftValues.join(", ")}] | Pivot ${pivot} | Right [${rightValues.join(", ")}]`,
       compareNote:`แบ่งข้อมูลเสร็จ: Left / Pivot / Right`,
       line:4,
       text:`Partition เสร็จสิ้น`,
       round:++quickRound,
       roundArray:[...work],
       roundHistory:(quickRoundHistory.push([...work]),quickRoundHistory.map(item=>[...item])),
       comparisons:c,
       swaps:w
     });

     node.children=[];
     const sortedLeft=quickVisual(leftValues,level+1,node.children);
     const sortedRight=quickVisual(rightValues,level+1,node.children);
     const result=[...sortedLeft,pivot,...sortedRight];

     node.values=[...result];
     node.done=true;

     s.steps.push({
       data:[...result],
       recursionTree:cloneRecursionTree(rootNodes),
       treeNodeId:node.id,
       level,
       subarray:[...result],
       pivotValue:pivot,
       treeAction:"Combine",
       compareNote:`รวมผลลัพธ์ของ Left + Pivot + Right`,
       line:5,
       text:`รวมผลเป็น [${result.join(", ")}]`,
       comparisons:c,
       swaps:w
     });

     return result;
   }

   arr=quickVisual([...arr]);
   s.recursionTree=[];

   s.steps.push({
     data:[...arr],
     recursionTree:cloneRecursionTree(rootNodes),
     treeNodeId:rootNodes[0]?.id,
     level:0,
     subarray:[...arr],
     pivotValue:rootNodes[0]?.pivot,
     treeAction:"Complete",
     compareNote:"Quick Sort Complete",
     sorted:[...Array(arr.length).keys()],
     line:5,
     text:"Quick Sort เสร็จสิ้น",
     round:quickRound,
     roundArray:[...arr],
     roundHistory:quickRoundHistory.map(item=>[...item]),
     comparisons:c,
     swaps:w
   });
 }


 if(cfg.algorithm==="heapsort"){
   function heapify(n,i){
     let largest=i;
     const left=2*i+1;
     const right=2*i+2;

     if(left<n){
       c++;
       s.steps.push({
         data:[...arr],
         compare:[i,left],
         active:i,
         line:2,
         text:`เปรียบเทียบ parent ${arr[i]} กับ left child ${arr[left]}`,
         heapSize:n,
         comparisons:c,
         swaps:w
       });
       if(arr[left]>arr[largest])largest=left;
     }

     if(right<n){
       c++;
       s.steps.push({
         data:[...arr],
         compare:[largest,right],
         active:i,
         line:2,
         text:`เปรียบเทียบ candidate ${arr[largest]} กับ right child ${arr[right]}`,
         heapSize:n,
         comparisons:c,
         swaps:w
       });
       if(arr[right]>arr[largest])largest=right;
     }

     if(largest!==i){
       const swapA=i,swapB=largest;
       [arr[i],arr[largest]]=[arr[largest],arr[i]];
       w++;
       s.steps.push({
         data:[...arr],
         swap:[swapA,swapB],
         compare:[i,largest],
         active:largest,
         line:3,
         text:`Swap index ${i} กับ ${largest} เพื่อรักษา Max Heap`,
         heapSize:n,
         comparisons:c,
         swaps:w
       });
       heapify(n,largest);
     }
   }

   s.steps.push({
     data:[...arr],
     line:1,
     text:"เริ่มสร้าง Max Heap",
     heapSize:arr.length,
     comparisons:c,
     swaps:w
   });

   for(let i=Math.floor(arr.length/2)-1;i>=0;i--){
     heapify(arr.length,i);
   }

   s.steps.push({
     data:[...arr],
     line:1,
     text:"สร้าง Max Heap เสร็จแล้ว",
     heapSize:arr.length,
     comparisons:c,
     swaps:w
   });

   for(let end=arr.length-1;end>0;end--){
     const swapA=0,swapB=end;
     [arr[0],arr[end]]=[arr[end],arr[0]];
     w++;
     s.steps.push({
       data:[...arr],
       swap:[swapA,swapB],
       sorted:[...Array(arr.length-end).keys()].map(x=>end+x),
       compare:[0,end],
       line:4,
       text:`ย้ายค่าสูงสุด ${arr[end]} ไป index ${end}`,
       heapSize:end,
       comparisons:c,
       swaps:w
     });

     heapify(end,0);

     s.steps.push({
       data:[...arr],
       sorted:[...Array(arr.length-end).keys()].map(x=>end+x),
       line:5,
       text:`ลดขนาด Heap เหลือ ${end} และ Heapify ใหม่`,
       heapSize:end,
       comparisons:c,
       swaps:w
     });
   }

   s.steps.push({
     data:[...arr],
     sorted:[...Array(arr.length).keys()],
     line:5,
     text:"Heap Sort เสร็จสิ้น",
     heapSize:0,
     comparisons:c,
     swaps:w
   });

   if(!ascending){
     arr.reverse();
     w+=arr.length;
     s.steps.push({
       data:[...arr],
       sorted:[...Array(arr.length).keys()],
       line:5,
       text:"กลับลำดับเพื่อเรียงจากมากไปน้อย",
       comparisons:c,
       swaps:w
     });
   }
 }

 if(!s.steps.length){
   s.steps=[{data:[...arr],line:5,text:"ข้อมูลมีขนาดเล็กเกินไป"}];
 }

 renderAlgorithmModule(id,{});
 updateAlgorithmDashboard(id);
 setStatus(id,`เตรียม Sorting แบบ ${ascending?"น้อยไปมาก":"มากไปน้อย"} แล้ว`);
}

function searchingTrack(algo){
 return algo==="sequential"

class AVLNode{
 constructor(value){this.value=value;this.left=null;this.right=null;this.height=1}
}
function avlHeight(n){return n?n.height:0}
function avlUpdate(n){n.height=1+Math.max(avlHeight(n.left),avlHeight(n.right));return n}
function rotateRight(y){const x=y.left,t=x.right;x.right=y;y.left=t;avlUpdate(y);avlUpdate(x);return x}
function rotateLeft(x){const y=x.right,t=y.left;y.left=x;x.right=t;avlUpdate(x);avlUpdate(y);return y}
function avlInsert(root,key,events){
 if(!root){events.push(`เพิ่มโหนด ${key}`);return new AVLNode(key)}
 events.push(`เปรียบเทียบ ${key} กับ ${root.value}`);
 if(key<root.value)root.left=avlInsert(root.left,key,events);
 else if(key>root.value)root.right=avlInsert(root.right,key,events);
 else return root;
 avlUpdate(root);
 const balance=avlHeight(root.left)-avlHeight(root.right);
 events.push(`balance(${root.value}) = ${balance}`);
 if(balance>1&&key<root.left.value){events.push("LL Case → Rotate Right");return rotateRight(root)}
 if(balance<-1&&key>root.right.value){events.push("RR Case → Rotate Left");return rotateLeft(root)}
 if(balance>1&&key>root.left.value){events.push("LR Case → Rotate Left + Right");root.left=rotateLeft(root.left);return rotateRight(root)}
 if(balance<-1&&key<root.right.value){events.push("RL Case → Rotate Right + Left");root.right=rotateRight(root.right);return rotateLeft(root)}
 return root;
}
function avlMin(n){while(n.left)n=n.left;return n}
function avlDelete(root,key,events){
 if(!root)return root;
 events.push(`ค้นหา ${key} ที่โหนด ${root.value}`);
 if(key<root.value)root.left=avlDelete(root.left,key,events);
 else if(key>root.value)root.right=avlDelete(root.right,key,events);
 else{
   events.push(`ลบโหนด ${key}`);
   if(!root.left||!root.right)root=root.left||root.right;
   else{const s=avlMin(root.right);root.value=s.value;root.right=avlDelete(root.right,s.value,events)}
 }
 if(!root)return root;
 avlUpdate(root);
 const b=avlHeight(root.left)-avlHeight(root.right);
 events.push(`ตรวจ balance(${root.value}) = ${b}`);
 if(b>1&&(avlHeight(root.left.left)>=avlHeight(root.left.right)))return rotateRight(root);
 if(b>1){root.left=rotateLeft(root.left);return rotateRight(root)}
 if(b<-1&&(avlHeight(root.right.right)>=avlHeight(root.right.left)))return rotateLeft(root);
 if(b<-1){root.right=rotateRight(root.right);return rotateLeft(root)}
 return root;
}
function avlFromArray(arr){let root=null;arr.filter(v=>v!==null).forEach(v=>root=avlInsert(root,v,[]));return root}
function avlToArray(root){return bstToArray(root)}
function avlTrack(op){
 const t={
  create:["กำหนด root = NULL","สร้าง AVL Tree ว่าง","พร้อมรับข้อมูล"],
  add:["ค้นหาตำแหน่งแบบ BST","เพิ่มโหนด","อัปเดต height","คำนวณ balance factor","หมุน LL/RR/LR/RL หากจำเป็น"],
  delete:["ค้นหาโหนด","ลบแบบ BST","อัปเดต height","ตรวจ balance factor","หมุนเพื่อปรับสมดุล"],
  search:["เริ่มที่ root","เปรียบเทียบค่า","ไปซ้ายหรือขวา","พบหรือไม่พบ"],
  inorder:["Left","Visit","Right","แสดงผล"],preorder:["Visit","Left","Right","แสดงผล"],postorder:["Left","Right","Visit","แสดงผล"]
 };return t[op]||t.search;
}

const originalPrepareStructureOperation=prepareStructureOperation;

     s.steps.push({data:[...s.data],found:s.data.indexOf(value),line:4,text:s.data.includes(value)?`พบ ${value}`:`ไม่พบ ${value}`,comparisons:c});

function parseGraphEdgeText(text){
 const match=String(text||"").trim().match(/^(.+?)-(.+?):(-?\d+(?:\.\d+)?)$/);
 if(!match)return null;
 return {u:match[1].trim(),v:match[2].trim(),w:Number(match[3])};
}
function graphEdgeText(edge){
 return `${edge.u}-${edge.v}:${edge.w}`;
}
function getGraphEdgeTexts(){
 return ($("graphEdges")?.value||"").split(",").map(x=>x.trim()).filter(Boolean);
}

function parseVertices(text){return [...new Set(text.split(",").map(x=>x.trim()).filter(Boolean))]}
function parseEdges(text){
 return text.split(",").map(x=>x.trim()).filter(Boolean).map(e=>{
  const [pair,wRaw]=e.split(":");const [u,v]=pair.split("-").map(x=>x.trim());
  return {u,v,w:Number(wRaw||1)};
 }).filter(e=>e.u&&e.v);
}
function graphData(vertices,edges){return {vertices:[...vertices],edges:edges.map(e=>({...e}))}}
function graphPositions(vertices){
 const cx=260,cy=180,r=135,n=Math.max(vertices.length,1),pos={};
 vertices.forEach((v,i)=>{const a=-Math.PI/2+2*Math.PI*i/n;pos[v]={x:cx+r*Math.cos(a),y:cy+r*Math.sin(a)}});return pos;
}

function buildDistanceMatrix(g){
 const vertices=g.vertices||[];
 const matrix=vertices.map(()=>vertices.map(()=>Infinity));
 vertices.forEach((_,i)=>matrix[i][i]=0);
 (g.edges||[]).forEach(e=>{
   const i=vertices.indexOf(e.u),j=vertices.indexOf(e.v);
   if(i>=0&&j>=0){
     matrix[i][j]=Math.min(matrix[i][j],e.w);
     matrix[j][i]=Math.min(matrix[j][i],e.w);
   }
 });
 return matrix;
}
function renderDistanceMatrix(id,g,st={}){
 const box=$(id+"Matrix");
 if(!box)return;
 const vertices=g.vertices||[];
 if(!vertices.length){box.innerHTML="";return}
 const matrix=st.matrix||buildDistanceMatrix(g);
 let html='<table class="distance-matrix"><thead><tr><th></th>';
 vertices.forEach(v=>html+=`<th>${v}</th>`);
 html+='</tr></thead><tbody>';
 matrix.forEach((row,i)=>{
   html+=`<tr><th>${vertices[i]}</th>`;
   row.forEach((value,j)=>{
     const singleActive=st.matrixActive&&st.matrixActive[0]===i&&st.matrixActive[1]===j;
     const pairActive=Array.isArray(st.matrixActivePairs)&&st.matrixActivePairs.some(pair=>pair[0]===i&&pair[1]===j);
     const active=singleActive||pairActive;
     html+=`<td class="${active?"active":""}">${value===Infinity?"∞":value}</td>`;
   });
   html+='</tr>';
 });
 html+='</tbody></table>';
 box.innerHTML=html;
}
function distancesToMatrix(vertices,dist){
 const matrix=vertices.map(()=>vertices.map(()=>Infinity));
 vertices.forEach((v,i)=>{matrix[i][i]=0});
 if(dist){
   vertices.forEach((v,j)=>{matrix[0][j]=dist[v]??Infinity});
 }
 return matrix;
}

function renderGraph(id,st={}){

 $(id+"Visual").innerHTML=`<svg class="graph-svg" viewBox="0 0 520 360">${edgeSvg}${nodeSvg}</svg>`;
 if($(id+"Detail"))$(id+"Detail").textContent=st.detail||"";
 renderDistanceMatrix(id,g,st);
}

function graphTrack(op){
 const t={
  create:["อ่าน vertices","อ่าน edges","สร้าง adjacency structure","แสดง Graph"],
  addVertex:["รับ vertex","ตรวจข้อมูลซ้ำ","เพิ่ม vertex","แสดง Graph"],
  addEdge:["รับ edge","ตรวจ vertices","เพิ่ม edge/weight","แสดง Graph"],
  deleteVertex:["ค้นหา vertex","ลบ vertex","ลบ edges ที่เกี่ยวข้อง","แสดง Graph"],
  deleteEdge:["ค้นหา edge","ลบ edge","แสดง Graph"],
  search:["ค้นหา vertex","แสดงผล"]
 };return t[op]||t.create;
}
function prepareGraphOperation(op){
 const id="graph",s=states[id];stopAlgorithmAuto(id);s.steps=[];s.step=0;s.comparisons=0;s.swaps=0;setAlgorithmTrack(id,graphTrack(op));
 setSelectedFunction(id,op);
 let g=s.data?.vertices?graphData(s.data.vertices,s.data.edges):{vertices:[],edges:[]};
 if(op==="create"){g=graphData(parseVertices($("graphVertices").value),parseEdges($("graphEdges").value));s.steps=[{data:g,line:1,text:"อ่าน vertices"},{data:g,line:2,text:"อ่าน weighted edges"},{data:g,line:3,text:"สร้าง Graph"},{data:g,line:4,text:"Graph พร้อมใช้งาน"}]}
 if(op==="addVertex"){const v=$("graphVertex").value.trim();if(v&&!g.vertices.includes(v))g.vertices.push(v);s.steps=[{data:g,activeVertex:v,line:3,text:`เพิ่ม vertex ${v}`}]}
 if(op==="addEdge"){const e=parseEdges(`${$("graphEdgeFrom").value}-${$("graphEdgeTo").value}:${$("graphEdgeWeight").value}`)[0];if(e){if(!g.vertices.includes(e.u))g.vertices.push(e.u);if(!g.vertices.includes(e.v))g.vertices.push(e.v);g.edges.push(e)}s.steps=[{data:g,activeEdge:e?[e.u,e.v].sort().join("-"):"",line:3,text:e?`เพิ่ม edge ${e.u}-${e.v} weight ${e.w}`:"ข้อมูล edge ไม่ถูกต้อง"}]}
 if(op==="deleteVertex"){const v=$("graphVertex").value.trim();g.vertices=g.vertices.filter(x=>x!==v);g.edges=g.edges.filter(e=>e.u!==v&&e.v!==v);s.steps=[{data:g,line:3,text:`ลบ vertex ${v} และ edges ที่เกี่ยวข้อง`}]}
 if(op==="deleteEdge"){const e=parseEdges(`${$("graphEdgeFrom").value}-${$("graphEdgeTo").value}:${$("graphEdgeWeight").value}`)[0];if(e)g.edges=g.edges.filter(x=>!((x.u===e.u&&x.v===e.v)||(x.u===e.v&&x.v===e.u)));s.steps=[{data:g,line:2,text:e?`ลบ edge ${e.u}-${e.v}`:"ข้อมูล edge ไม่ถูกต้อง"}]}
 if(op==="search"){const v=$("graphVertex").value.trim(),found=g.vertices.includes(v);s.steps=[{data:g,activeVertex:found?v:"",line:2,text:found?`พบ vertex ${v}`:`ไม่พบ vertex ${v}`}]}
 refreshGraphEdgeEditor(Number($("graphEdgeSelect")?.value||0));
 updateAlgorithmDashboard(id);renderGraph(id,{});setStatus(id,`เตรียม ${op} แล้ว`);
}
function graphAdj(g){
 const a={};g.vertices.forEach(v=>a[v]=[]);
 g.edges.forEach(e=>{a[e.u]?.push({v:e.v,w:e.w});a[e.v]?.push({v:e.u,w:e.w})});return a;
}
function edgeKey(u,v){return [u,v].sort().join("-")}
function graphAlgoTracks(algo){
 const t={
  dfs:["Push start ลง Stack","Pop vertex","หากยังไม่เยี่ยมชม → Visit","Push เพื่อนบ้าน","ทำซ้ำจน Stack ว่าง"],
  bfs:["Enqueue start","Dequeue vertex","Visit vertex","Enqueue เพื่อนบ้านที่ยังไม่พบ","ทำซ้ำจน Queue ว่าง"],
  dijkstra:["กำหนด distance(start)=0","เลือก vertex ระยะต่ำสุด","Relax edges","อัปเดต distance/previous","เสร็จสิ้น"],
  prim:["เลือก start","เลือก edge น้ำหนักต่ำสุดที่เชื่อมต้นไม้","เพิ่ม vertex และ edge","ทำซ้ำจนครบ","ได้ MST"],
  kruskal:["เรียง edges ตามน้ำหนัก","เลือก edge ต่ำสุด","ตรวจ cycle","เพิ่ม edge หากไม่เกิด cycle","ได้ MST"]
 };return t[algo];
}
function prepareGraphAlgorithm(id){
 const cfg=configs.find(x=>x.id===id),s=states[id];stopAlgorithmAuto(id);s.steps=[];s.step=0;s.comparisons=0;s.swaps=0;
 setSelectedFunction(id,cfg.algorithm);
 const g=graphData(parseVertices($(id+"Vertices").value),parseEdges($(id+"Edges").value)),start=$(id+"Start").value.trim(),adj=graphAdj(g);
 s.data=g;setAlgorithmTrack(id,graphAlgoTracks(cfg.algorithm));
 if(cfg.algorithm==="dfs"){
   const stack=[{v:start,from:null}],visited=[],seen=new Set();
   while(stack.length){
     const top=stack.at(-1);
     s.steps.push({
       data:g,
       visited:[...visited],
       activeVertex:top.v,
       activeEdge:top.from?edgeKey(top.from,top.v):"",
       line:1,
       text:`Stack = [${stack.map(x=>x.v).join(", ")}]`,
       detail:`Stack: ${stack.map(x=>x.v).join(" → ")}`,
       matrix:buildDistanceMatrix(g),
       matrixActivePairs:top.from?[
         [g.vertices.indexOf(top.from),g.vertices.indexOf(top.v)],
         [g.vertices.indexOf(top.v),g.vertices.indexOf(top.from)]
       ]:[]
     });
     const current=stack.pop(),u=current.v;
     if(seen.has(u))continue;
     seen.add(u);visited.push(u);
     s.steps.push({
       data:g,
       visited:[...visited],
       activeVertex:u,
       activeEdge:current.from?edgeKey(current.from,u):"",
       line:3,
       text:`Visit ${u}`,
       detail:`Visited: ${visited.join(" → ")}`,
       matrix:buildDistanceMatrix(g),
       matrixActivePairs:current.from?[
         [g.vertices.indexOf(current.from),g.vertices.indexOf(u)],
         [g.vertices.indexOf(u),g.vertices.indexOf(current.from)]
       ]:[]
     });
     [...(adj[u]||[])].reverse().forEach(n=>{
       if(!seen.has(n.v)){
         s.steps.push({
           data:g,
           visited:[...visited],
           activeVertex:u,
           activeEdge:edgeKey(u,n.v),
           line:4,
           text:`ตรวจเส้นเชื่อม ${u}-${n.v}`,
           detail:`Push ${n.v}`,
           matrix:buildDistanceMatrix(g),
           matrixActivePairs:[
             [g.vertices.indexOf(u),g.vertices.indexOf(n.v)],
             [g.vertices.indexOf(n.v),g.vertices.indexOf(u)]
           ]
         });
         stack.push({v:n.v,from:u});
       }
     });
   }
 }
 if(cfg.algorithm==="bfs"){
   const q=[{v:start,from:null}],seen=new Set([start]),visited=[];
   while(q.length){
     const front=q[0];
     s.steps.push({
       data:g,
       visited:[...visited],
       activeVertex:front.v,
       activeEdge:front.from?edgeKey(front.from,front.v):"",
       line:1,
       text:`Queue = [${q.map(x=>x.v).join(", ")}]`,
       detail:`Queue: ${q.map(x=>x.v).join(" → ")}`,
       matrix:buildDistanceMatrix(g),
       matrixActivePairs:front.from?[
         [g.vertices.indexOf(front.from),g.vertices.indexOf(front.v)],
         [g.vertices.indexOf(front.v),g.vertices.indexOf(front.from)]
       ]:[]
     });
     const current=q.shift(),u=current.v;
     visited.push(u);
     s.steps.push({
       data:g,
       visited:[...visited],
       activeVertex:u,
       activeEdge:current.from?edgeKey(current.from,u):"",
       line:3,
       text:`Visit ${u}`,
       detail:`Visited: ${visited.join(" → ")}`,
       matrix:buildDistanceMatrix(g),
       matrixActivePairs:current.from?[
         [g.vertices.indexOf(current.from),g.vertices.indexOf(u)],
         [g.vertices.indexOf(u),g.vertices.indexOf(current.from)]
       ]:[]
     });
     (adj[u]||[]).forEach(n=>{
       s.steps.push({
         data:g,
         visited:[...visited],
         activeVertex:u,
         activeEdge:edgeKey(u,n.v),
         line:4,
         text:`ตรวจเส้นเชื่อม ${u}-${n.v}`,
         detail:seen.has(n.v)?`${n.v} ถูกค้นพบแล้ว`:`Enqueue ${n.v}`,
         matrix:buildDistanceMatrix(g),
         matrixActivePairs:[
           [g.vertices.indexOf(u),g.vertices.indexOf(n.v)],
           [g.vertices.indexOf(n.v),g.vertices.indexOf(u)]
         ]
       });
       if(!seen.has(n.v)){
         seen.add(n.v);
         q.push({v:n.v,from:u});
       }
     });
   }
 }
 if(cfg.algorithm==="dijkstra"){
   const dist={},prev={},un=new Set(g.vertices);g.vertices.forEach(v=>dist[v]=Infinity);dist[start]=0;
   while(un.size){let u=[...un].sort((a,b)=>dist[a]-dist[b])[0];if(dist[u]===Infinity)break;un.delete(u);s.steps.push({
   data:g,
   activeVertex:u,
   visited:g.vertices.filter(v=>!un.has(v)),
   line:2,
   text:`เลือก ${u}, distance=${dist[u]}`,
   detail:Object.entries(dist).map(([v,d])=>`${v}:${d===Infinity?"∞":d}`).join(" | "),
   matrix:distancesToMatrix(g.vertices,dist),
   matrixActive:[0,g.vertices.indexOf(u)]
 });for(const e of adj[u]||[]){if(!un.has(e.v))continue;const alt=dist[u]+e.w;s.comparisons++;s.steps.push({
   data:g,
   activeVertex:u,
   activeEdge:edgeKey(u,e.v),
   line:3,
   text:`Relax ${u}-${e.v}: ${dist[u]}+${e.w}`,
   detail:`candidate=${alt}, current=${dist[e.v]===Infinity?"∞":dist[e.v]}`,
   comparisons:s.comparisons,
   matrix:distancesToMatrix(g.vertices,dist),
   matrixActive:[0,g.vertices.indexOf(e.v)]
 });if(alt<dist[e.v]){dist[e.v]=alt;prev[e.v]=u;s.steps.push({
   data:g,
   activeVertex:e.v,
   activeEdge:edgeKey(u,e.v),
   line:4,
   text:`update distance(${e.v})=${alt}`,
   detail:Object.entries(dist).map(([v,d])=>`${v}:${d===Infinity?"∞":d}`).join(" | "),
   matrix:distancesToMatrix(g.vertices,dist),
   matrixActive:[0,g.vertices.indexOf(e.v)]
 })}}}
 }
 if(cfg.algorithm==="prim"){
   const visited=new Set([start]),selected=[];while(visited.size<g.vertices.length){let best=null;for(const e of g.edges){const cross=visited.has(e.u)!==visited.has(e.v);if(cross&&(!best||e.w<best.w))best=e}s.steps.push({data:g,visited:[...visited],selectedEdges:[...selected],line:2,text:"ค้นหา edge น้ำหนักต่ำสุด",detail:`Visited: ${[...visited].join(", ")}`});if(!best)break;selected.push(edgeKey(best.u,best.v));visited.add(visited.has(best.u)?best.v:best.u);s.steps.push({data:g,visited:[...visited],selectedEdges:[...selected],activeEdge:edgeKey(best.u,best.v),matrix:buildDistanceMatrix(g),matrixActivePairs:[[g.vertices.indexOf(best.u),g.vertices.indexOf(best.v)],[g.vertices.indexOf(best.v),g.vertices.indexOf(best.u)]],line:3,text:`เลือก ${best.u}-${best.v} (${best.w})`,detail:`MST weight = ${g.edges.filter(e=>selected.includes(edgeKey(e.u,e.v))).reduce((a,e)=>a+e.w,0)}`})}
 }
 if(cfg.algorithm==="kruskal"){
   const parent={};g.vertices.forEach(v=>parent[v]=v);const find=x=>parent[x]===x?x:(parent[x]=find(parent[x]));const selected=[];
   const edges=[...g.edges].sort((a,b)=>a.w-b.w);s.steps.push({data:g,line:1,text:"เรียง edges ตามน้ำหนัก",detail:edges.map(e=>`${e.u}-${e.v}:${e.w}`).join(", ")});
   for(const e of edges){s.steps.push({data:g,selectedEdges:[...selected],activeEdge:edgeKey(e.u,e.v),matrix:buildDistanceMatrix(g),matrixActivePairs:[[g.vertices.indexOf(e.u),g.vertices.indexOf(e.v)],[g.vertices.indexOf(e.v),g.vertices.indexOf(e.u)]],line:2,text:`พิจารณา ${e.u}-${e.v} (${e.w})`,detail:"ตรวจ cycle"});let a=find(e.u),b=find(e.v);if(a!==b){parent[a]=b;selected.push(edgeKey(e.u,e.v));s.steps.push({data:g,selectedEdges:[...selected],activeEdge:edgeKey(e.u,e.v),matrix:buildDistanceMatrix(g),matrixActivePairs:[[g.vertices.indexOf(e.u),g.vertices.indexOf(e.v)],[g.vertices.indexOf(e.v),g.vertices.indexOf(e.u)]],line:4,text:"ไม่เกิด cycle → เลือก edge",detail:`Selected: ${selected.join(", ")}`})}else s.steps.push({data:g,selectedEdges:[...selected],activeEdge:edgeKey(e.u,e.v),matrix:buildDistanceMatrix(g),matrixActivePairs:[[g.vertices.indexOf(e.u),g.vertices.indexOf(e.v)],[g.vertices.indexOf(e.v),g.vertices.indexOf(e.u)]],line:3,text:"เกิด cycle → ข้าม",detail:""})}
 }
 if(cfg.algorithm!=="dijkstra"){
   s.steps=s.steps.map(st=>({...st,matrix:buildDistanceMatrix(g)}));
 }
 updateAlgorithmDashboard(id);renderGraph(id,{matrix:buildDistanceMatrix(g)});setStatus(id,"เตรียม Algorithm แล้ว");
}


function arrangeHeapSortControls(){
 const panel=$("heapsort");
 if(!panel)return;

 const controls=panel.querySelector(":scope > .controls");
 const tools=panel.querySelector(":scope > .tools");
 if(!controls||!tools||panel.querySelector(":scope > .heap-first-row"))return;

 const firstRow=document.createElement("div");
 firstRow.className="heap-first-row";

 while(controls.firstChild)firstRow.appendChild(controls.firstChild);
 while(tools.firstChild)firstRow.appendChild(tools.firstChild);

 controls.remove();
 tools.remove();

 const heading=panel.querySelector("h2");
 heading.insertAdjacentElement("afterend",firstRow);
}

function initialSelectedFunction(cfg){
 if(cfg.kind==="stackapp")return "infix_to_postfix";
 if(cfg.kind==="recursion")return "factorial";
 if(cfg.kind==="graph")return "create";
 if(["sorting","searching","graphalgo"].includes(cfg.kind))return cfg.algorithm||cfg.id;
 return "create";
}

function arrangeAnimationControls(){
 configs.forEach(cfg=>{
   const panel=$(cfg.id);
   if(!panel)return;

   const controlHost=panel.querySelector(":scope > .controls")
     || panel.querySelector(":scope > .heap-first-row");
   if(!controlHost)return;

   controlHost.classList.add("animation-controls-host");

   const tools=panel.querySelector(":scope > .tools");
   let topAnimationGroup=null;
   if(tools){
     if(["arraylist","sll","dll"].includes(cfg.id)){
       tools.className="top-animation-controls";
       const anchor=cfg.id==="arraylist"
         ? panel.querySelector("#arraylistCapacity")?.closest("label")
         : cfg.id==="sll"
           ? panel.querySelector('button[onclick="clearSllList()"]')
           : panel.querySelector("#dllIndex")?.closest("label");
       if(anchor)anchor.insertAdjacentElement("afterend",tools);
       else controlHost.appendChild(tools);
       topAnimationGroup=tools;
     }else{
       while(tools.firstChild)controlHost.appendChild(tools.firstChild);
       tools.remove();
     }
   }

   let badge=panel.querySelector(".selected-function-badge");
   if(!badge){
     badge=document.createElement("div");
     badge.className="selected-function-badge";
     badge.innerHTML=`ฟังก์ชันที่เลือก: <strong id="${cfg.id}SelectedFunction">${initialSelectedFunction(cfg)}</strong>`;
   }
   badge.classList.add("simulation-function-badge");
   const simulationTarget=panel.querySelector(":scope > .algo-layout")
     || panel.querySelector(":scope > .expr-grid")
     || panel.querySelector(`#${cfg.id}Visual`);
   if(simulationTarget)simulationTarget.insertAdjacentElement("beforebegin",badge);
   else if(topAnimationGroup)topAnimationGroup.insertAdjacentElement("afterend",badge);
   else controlHost.appendChild(badge);
 });
}

build();
arrangeHeapSortControls();
arrangeAnimationControls();







function syncBSTTraversalSummary(){
 const mode=$("bstTraversal")?.value||"inorder";
 const s=states.bst;
 let values=[];

 if(Array.isArray(s?.traversalResult)){
   values=s.traversalResult;
 }else if(Array.isArray(s?.result)){
   values=s.result;
 }else if(Array.isArray(s?.steps)){
   values=s.steps
    .map(step=>step?.visitValue ?? step?.value ?? step?.nodeValue)
    .filter(v=>v!==undefined && v!==null);
   values=[...new Set(values)];
 }

 renderTraversalSummary(mode,values);
}

document.addEventListener("change",e=>{
 if(e.target?.id==="bstTraversal"){
   renderTraversalSummary(e.target.value,[]);
 }
});

</script>
